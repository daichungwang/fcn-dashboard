<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>M7 Basket Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 20px;
}

.section {
  margin-bottom: 30px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin: 6px 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  cursor: pointer;
}

.detail {
  display: none;
  margin-top: 8px;
  font-size: 13px;
  color: #555;
}

.tier-優先 { color: green; font-weight: bold; }
.tier-穩健 { color: goldenrod; font-weight: bold; }
.tier-追蹤 { color: orange; }

.積極 { border-left: 6px solid red; }
.理性 { border-left: 6px solid gold; }
.保守 { border-left: 6px solid blue; }
</style>
</head>

<body>

<h1>M7 Basket Dashboard</h1>

<div id="highlight" class="section"></div>
<div id="simulation" class="section"></div>
<div id="watch" class="section"></div>

<script type="module">
import { runM7Basket } from "./js/m7/basket_engine.js";

async function init() {
  const res = await fetch("./data/m7/m7_new_stock_today.json");
  const data = await res.json();

  const result = runM7Basket(data);

  renderHighlight(result.highlight);
  renderSimulation(result.simulation);
  renderWatch(result.watch);
}

function toggle(el) {
  const d = el.querySelector(".detail");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

// ---------- Highlight ----------
function renderHighlight(list) {
  const div = document.getElementById("highlight");
  div.innerHTML = "<h2>🔥 Today Highlight</h2>";

  list.forEach(s => {
    div.innerHTML += `
      <div class="card ${s.type}" onclick="toggle(this)">
        ${s.symbol} ｜ ${s.score.toFixed(1)} ｜ ${s.type}
        <div class="detail">
          Valuation: ${s.raw.valuation_raw}<br>
          Structure: ${s.raw.structure_score}<br>
          Timing: ${s.raw.timing_state}
        </div>
      </div>
    `;
  });
}

// ---------- Simulation ----------
function renderSimulation(list) {
  const div = document.getElementById("simulation");
  div.innerHTML = "<h2>📊 Simulation Pool</h2>";

  const group = {};

  list.forEach(s => {
    if (!group[s.category]) group[s.category] = [];
    group[s.category].push(s);
  });

  for (const g in group) {
    div.innerHTML += `<h3>${g}</h3>`;

    group[g].forEach(s => {
      div.innerHTML += `
        <div class="card tier-${s.tier}" onclick="toggle(this)">
          ${s.symbol} ｜ ${s.score.toFixed(1)} ｜ ${s.tier}
          <div class="detail">
            Trend: ${s.raw.trend_score}<br>
            Snapshot: ${s.raw.snapshot}<br>
            Growth: ${s.raw.growth_score}
          </div>
        </div>
      `;
    });
  }
}

// ---------- Watch ----------
function renderWatch(list) {
  const div = document.getElementById("watch");
  div.innerHTML = "<h2>👀 Watch Pool</h2>";

  list.forEach(s => {
    div.innerHTML += `
      <div class="card" onclick="toggle(this)">
        ${s.symbol} ｜ ${s.score.toFixed(1)}
        <div class="detail">
          等待更好時機
        </div>
      </div>
    `;
  });
}

window.toggle = toggle;

init();
</script>

</body>
</html>
