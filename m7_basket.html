<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>📊 M7 Basket Manual Review</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #2563eb;
      --green: #059669;
      --amber: #d97706;
      --red: #dc2626;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(37,99,235,0.96), rgba(29,78,216,0.92));
      color: #fff;
      border-radius: 22px;
      padding: 22px 20px;
      box-shadow: 0 18px 36px rgba(37,99,235,0.18);
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
      font-weight: 800;
    }

    .hero p {
      margin: 0;
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255,255,255,0.92);
      max-width: 920px;
    }

    .section {
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      overflow: hidden;
    }

    .section-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.94));
    }

    .section-title {
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 4px;
    }

    .section-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .section-body {
      padding: 16px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .summary-item {
      background: #f8fafc;
      border: 1px solid #edf2f7;
      border-radius: 14px;
      padding: 14px;
    }

    .summary-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .summary-item strong {
      font-size: 22px;
      font-weight: 800;
    }

    .structure-comment {
      background: #eff6ff;
      border: 1px solid #dbeafe;
      color: #1d4ed8;
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.8;
      font-size: 14px;
      font-weight: 600;
    }

    .basket-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .basket-card {
      background: #fff;
      border: 1px solid #e9edf3;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
    }

    .basket-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .basket-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .basket-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .basket-score {
      font-size: 13px;
      background: #0f172a;
      color: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .basket-condition {
      background: #f8fafc;
      border: 1px solid #edf2f7;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 12px;
      line-height: 1.7;
    }

    .basket-block {
      margin-top: 12px;
      background: #fbfcfe;
      border: 1px solid #ebeff5;
      border-radius: 14px;
      padding: 12px;
      line-height: 1.8;
      font-size: 13px;
    }

    .block-title {
      font-weight: 800;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .muted {
      color: var(--muted);
      margin-top: 4px;
    }

    .ok {
      color: var(--green);
      font-weight: 700;
    }

    .warn {
      color: var(--amber);
      font-weight: 700;
    }

    .stats-line {
      margin-bottom: 4px;
    }

    .stock-line {
      padding: 10px 0;
      border-bottom: 1px dashed #e5e7eb;
    }

    .stock-line:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .stock-main {
      margin-bottom: 4px;
      font-size: 14px;
    }

    .stock-score {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .pill {
      display: inline-block;
      margin-left: 8px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #dbeafe;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      vertical-align: middle;
    }

    #basket-error {
      color: var(--red);
      font-weight: 700;
      margin-top: 12px;
    }

    @media (max-width: 1100px) {
      .basket-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .summary-grid {
        grid-template-columns: 1fr 1fr;
      }

      .basket-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>📊 M7 Basket Manual Review</h1>
      <p>
        這一頁不是正式報價引擎，而是 M7 最後考驗：先用 M7 已挑出的股票，人工檢視積極 / 理性 / 保守各一組 basket，
        驗證系統的品質判斷、推估能力與 FCN 可做性。通過後，再交由 M8 rate engine 自動化。
      </p>
    </section>

    <section class="section">
      <div class="section-head">
        <div class="section-title">今日股票結構</div>
        <div class="section-desc">先看今天可做股票的五大分類分布，再決定積極 / 理性 / 保守應該偏向哪種 basket 結構。</div>
      </div>
      <div class="section-body">
        <div id="today-structure"></div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div class="section-title">三種 Basket 建議</div>
        <div class="section-desc">固定 FCN 條件：55 / 65 / 6m / AKI / 3~5檔。先人工檢視，再決定是否導入 M8 rate engine。</div>
      </div>
      <div class="section-body">
        <div class="basket-grid">
          <div class="basket-card" id="aggressive-card"></div>
          <div class="basket-card" id="rational-card"></div>
          <div class="basket-card" id="conservative-card"></div>
        </div>
        <div id="basket-error"></div>
      </div>
    </section>
  </div>

  <script src="./js/m7/m7_basket_engine.js"></script>
</body>
</html>
