<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M1 | Stock Pool Review Console</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#dbe3ee;
      --blue:#2563eb;
      --green:#16a34a;
      --orange:#d97706;
      --red:#dc2626;
      --purple:#7c3aed;
      --shadow:0 8px 24px rgba(15,23,42,0.06);
      --radius:16px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,"Microsoft JhengHei",sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .page{
      max-width:1400px;
      margin:0 auto;
      padding:28px 18px 48px;
    }

    .hero{
      background:linear-gradient(135deg,#ffffff 0%,#eef4ff 100%);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:22px 22px 16px;
      margin-bottom:18px;
    }

    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
    }

    .title-wrap h1{
      margin:0;
      font-size:28px;
      line-height:1.2;
      font-weight:800;
      letter-spacing:0.2px;
    }

    .title-wrap .sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    button{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-size:14px;
      cursor:pointer;
      background:#e5edf8;
      color:var(--text);
      transition:all .15s ease;
    }
    button:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--blue); color:#fff}
    .btn-green{background:var(--green); color:#fff}
    .btn-purple{background:var(--purple); color:#fff}
    .btn-red{background:var(--red); color:#fff}

    .summary-grid{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(7,minmax(120px,1fr));
      gap:12px;
    }

    .metric{
      background:rgba(255,255,255,.78);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      min-height:82px;
    }

    .metric .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }
    .metric .value{
      font-size:24px;
      font-weight:800;
      line-height:1;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:16px;
    }

    .filters{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:12px;
      align-items:end;
    }

    .field label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    select,input[type="text"]{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      background:#fff;
      color:var(--text);
    }

    .bucket{
      margin-bottom:18px;
    }

    .bucket-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
      padding:0 4px;
    }

    .bucket-title{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:20px;
      font-weight:800;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      font-weight:700;
      color:#fff;
      min-width:72px;
    }

    .b-pool30{background:var(--green)}
    .b-stock{background:var(--blue)}
    .b-watch{background:var(--orange)}
    .b-reject{background:var(--red)}
    .b-core{background:var(--green)}
    .b-growth{background:var(--blue)}
    .b-defensive{background:var(--orange)}
    .b-income{background:var(--purple)}
    .b-speculative{background:var(--red)}

    .bucket-count{
      color:var(--muted);
      font-size:14px;
      font-weight:600;
    }

    .table-head{
      display:grid;
      grid-template-columns:210px 110px 70px minmax(260px,1fr) 150px 130px;
      gap:10px;
      padding:10px 14px;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      border-bottom:1px solid var(--line);
      margin-bottom:10px;
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      margin-bottom:10px;
      overflow:hidden;
    }

    .card-top{
      display:grid;
      grid-template-columns:210px 110px 70px minmax(260px,1fr) 150px 130px;
      gap:10px;
      align-items:center;
      padding:14px;
    }

    .op-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .checks{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .checks label{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:13px;
      color:var(--text);
      white-space:nowrap;
    }

    .card select{
      min-width:120px;
    }

    .expand-btn{
      width:38px;
      height:38px;
      border-radius:10px;
      padding:0;
      background:#edf3fb;
      color:var(--text);
      font-size:16px;
      font-weight:800;
    }

    .symbol-block .main{
      font-size:15px;
      font-weight:800;
      margin-bottom:4px;
    }

    .symbol-block .sub{
      font-size:13px;
      color:var(--muted);
    }

    .score-block{
      font-size:13px;
      line-height:1.55;
    }

    .score-block .main{
      font-weight:800;
      font-size:15px;
    }

    .system-line{
      font-size:13px;
      line-height:1.55;
    }

    .system-line .main{
      font-weight:800;
      margin-bottom:4px;
    }

    .status-tags{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      justify-content:flex-end;
    }

    .detail{
      display:none;
      border-top:1px solid var(--line);
      background:#fafcff;
      padding:16px 16px 18px;
    }

    .detail.open{display:block}

    .detail-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .detail-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
    }

    .detail-card h4{
      margin:0 0 10px;
      font-size:15px;
    }

    .detail-card p{
      margin:0 0 8px;
      line-height:1.6;
      font-size:13px;
    }

    .detail-card ul{
      margin:0;
      padding-left:18px;
    }

    .detail-card li{
      margin-bottom:6px;
      font-size:13px;
      line-height:1.5;
    }

    .kv{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:8px;
      font-size:13px;
      margin-bottom:6px;
    }

    .kv .k{color:var(--muted)}
    .empty{
      text-align:center;
      color:var(--muted);
      padding:24px 10px;
      border:1px dashed var(--line);
      border-radius:16px;
      background:#fff;
    }

    .footer-note{
      color:var(--muted);
      font-size:12px;
      text-align:right;
      margin-top:10px;
    }

    @media (max-width: 1100px){
      .summary-grid{grid-template-columns:repeat(4,minmax(120px,1fr))}
      .filters{grid-template-columns:repeat(2,minmax(0,1fr))}
      .table-head,.card-top{
        grid-template-columns:1fr;
      }
      .table-head{display:none}
      .card-top{gap:12px}
      .status-tags{justify-content:flex-start}
      .detail-grid{grid-template-columns:1fr}
    }

    @media (max-width: 700px){
      .summary-grid{grid-template-columns:repeat(2,minmax(120px,1fr))}
      .filters{grid-template-columns:1fr}
      .hero-top{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-top">
        <div class="title-wrap">
          <h1>M1｜Stock Pool Review Console</h1>
          <div class="sub">讀取 engine 正式輸出，先分區，再由人工在第一層直接確認與修正。</div>
        </div>
        <div class="toolbar">
          <button onclick="applySystemDefaults()">套用系統預設</button>
          <button onclick="clearAll()" class="btn-red">全部清除</button>
          <button onclick="exportPoolStock()" class="btn-primary">匯出 Pool Stock</button>
          <button onclick="exportPool30()" class="btn-green">匯出 Pool30</button>
          <button onclick="exportReviewLog()" class="btn-purple">匯出 Review Log</button>
        </div>
      </div>

      <div class="summary-grid" id="summaryGrid"></div>
    </section>

    <section class="panel">
      <div class="filters">
        <div class="field">
          <label>分區</label>
          <select id="filterBucket" onchange="renderAll()">
            <option value="all">All</option>
            <option value="pool30_candidate">建議納入 Pool30</option>
            <option value="stock_pool_candidate">建議納入大池</option>
            <option value="watch_candidate">建議觀察</option>
            <option value="reject_candidate">建議排除</option>
          </select>
        </div>

        <div class="field">
          <label>身分</label>
          <select id="filterIdentity" onchange="renderAll()">
            <option value="all">全部</option>
            <option value="new">新股</option>
            <option value="existing">舊股</option>
            <option value="already_pool30">已在 Pool30</option>
            <option value="not_in_pool30">不在 Pool30</option>
          </select>
        </div>

        <div class="field">
          <label>分類</label>
          <select id="filterCategory" onchange="renderAll()">
            <option value="all">全部</option>
            <option value="core">core</option>
            <option value="growth">growth</option>
            <option value="defensive">defensive</option>
            <option value="income">income</option>
            <option value="speculative">speculative</option>
          </select>
        </div>

        <div class="field">
          <label>狀態</label>
          <select id="filterStatus" onchange="renderAll()">
            <option value="all">全部</option>
            <option value="engine_pool30_true">engine 建議進 Pool30</option>
            <option value="engine_pool30_false">engine 不進 Pool30</option>
            <option value="engine_stock_true">engine 建議進 Stock Pool</option>
            <option value="research_not_started">research 未開始</option>
          </select>
        </div>

        <div class="field">
          <label>搜尋</label>
          <input type="text" id="filterSearch" placeholder="輸入 symbol / name / sector" oninput="renderAll()" />
        </div>
      </div>
    </section>

    <div id="bucketContainer"></div>
    <div class="footer-note">M1 真資料版｜資料來源：data/m1/pool_stock_evaluated_v1.json</div>
  </div>

  <script>
    const CATEGORY_OPTIONS = ["core","growth","defensive","income","speculative"];
    const BUCKET_META = {
      pool30_candidate: { title: "建議納入 Pool30", className: "b-pool30" },
      stock_pool_candidate: { title: "建議納入大池", className: "b-stock" },
      watch_candidate: { title: "建議持續觀察", className: "b-watch" },
      reject_candidate: { title: "建議排除", className: "b-reject" }
    };

    let rawData = null;
    let rows = [];

    async function init() {
      try {
        const res = await fetch("data/m1/pool_stock_evaluated_v1.json?_=" + Date.now());
        if (!res.ok) throw new Error("無法讀取 pool_stock_evaluated_v1.json");
        rawData = await res.json();

        rows = (rawData.all || []).map((row, idx) => ({
          ...row,
          _id: `${row.symbol || "row"}_${idx}`
        }));

        renderAll();
      } catch (err) {
        document.getElementById("bucketContainer").innerHTML =
          `<div class="panel"><div class="empty">載入資料失敗：${err.message}</div></div>`;
      }
    }

    function applySystemDefaults() {
      rows = rows.map(row => ({
        ...row,
        human_override: {
          into_stock_pool: row.system_recommendation?.into_stock_pool ?? false,
          into_pool30: row.system_recommendation?.into_pool30 ?? false,
          final_category: row.system_recommendation?.suggested_category || "growth",
          note: row.human_override?.note || ""
        }
      }));
      renderAll();
    }

    function clearAll() {
      rows = rows.map(row => ({
        ...row,
        human_override: {
          into_stock_pool: false,
          into_pool30: false,
          final_category: row.human_override?.final_category || row.system_recommendation?.suggested_category || "growth",
          note: row.human_override?.note || ""
        }
      }));
      renderAll();
    }

    function getFinal(row) {
      return {
        into_stock_pool: row?.human_override?.into_stock_pool ?? row?.system_recommendation?.into_stock_pool ?? false,
        into_pool30: row?.human_override?.into_pool30 ?? row?.system_recommendation?.into_pool30 ?? false,
        final_category: row?.human_override?.final_category || row?.system_recommendation?.suggested_category || "growth",
        note: row?.human_override?.note || ""
      };
    }

    function updateRow(rowId, key, value) {
      rows = rows.map(row => {
        if (row._id !== rowId) return row;
        const final = getFinal(row);
        return {
          ...row,
          human_override: {
            ...final,
            [key]: value
          }
        };
      });
      renderAll();
    }

    function toggleDetail(rowId) {
      const el = document.getElementById(`detail-${rowId}`);
      const btn = document.getElementById(`toggle-${rowId}`);
      const isOpen = el.classList.contains("open");
      if (isOpen) {
        el.classList.remove("open");
        btn.textContent = "▶";
      } else {
        el.classList.add("open");
        btn.textContent = "▼";
      }
    }

    function renderSummary() {
      const s = rawData?.summary || {};
      const metrics = [
        ["Candidate", s.total_count ?? rows.length],
        ["Pool30 建議", s.pool30_candidate_count ?? 0],
        ["大池建議", s.stock_pool_candidate_count ?? 0],
        ["Watch", s.watch_candidate_count ?? 0],
        ["Reject", s.reject_candidate_count ?? 0],
        ["新股", s.new_stock_count ?? 0],
        ["舊股", s.existing_stock_count ?? 0]
      ];

      document.getElementById("summaryGrid").innerHTML = metrics.map(([label, value]) => `
        <div class="metric">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
        </div>
      `).join("");
    }

    function matchesFilters(row) {
      const bucket = document.getElementById("filterBucket").value;
      const identity = document.getElementById("filterIdentity").value;
      const category = document.getElementById("filterCategory").value;
      const status = document.getElementById("filterStatus").value;
      const search = document.getElementById("filterSearch").value.trim().toLowerCase();

      const final = getFinal(row);

      if (bucket !== "all" && row.system_recommendation?.bucket !== bucket) return false;

      if (identity === "new" && !row.identity?.is_new_stock) return false;
      if (identity === "existing" && row.identity?.is_new_stock) return false;
      if (identity === "already_pool30" && !row.identity?.already_in_pool30) return false;
      if (identity === "not_in_pool30" && row.identity?.already_in_pool30) return false;

      if (category !== "all" && final.final_category !== category) return false;

      if (status === "engine_pool30_true" && !row.system_recommendation?.into_pool30) return false;
      if (status === "engine_pool30_false" && row.system_recommendation?.into_pool30) return false;
      if (status === "engine_stock_true" && !row.system_recommendation?.into_stock_pool) return false;
      if (status === "research_not_started" && row.research?.status !== "not_started") return false;

      if (search) {
        const text = [
          row.symbol, row.name, row.sector, row.subsector,
          row.system_recommendation?.bucket, final.final_category
        ].join(" ").toLowerCase();
        if (!text.includes(search)) return false;
      }

      return true;
    }

    function categoryBadgeClass(category) {
      const map = {
        core: "b-core",
        growth: "b-growth",
        defensive: "b-defensive",
        income: "b-income",
        speculative: "b-speculative"
      };
      return map[category] || "b-growth";
    }

    function renderCard(row) {
      const final = getFinal(row);
      const bucket = row.system_recommendation?.bucket || "watch_candidate";
      const bucketMeta = BUCKET_META[bucket] || BUCKET_META.watch_candidate;

      const whyYes = row.system_reason?.why_yes || [];
      const whyNo = row.system_reason?.why_no || [];
      const aiShort = row.ai_reason_short || [];
      const aiDetail = row.ai_reason_detail || {};
      const score = row.engine_score || {};
      const note = final.note || "";
      const showOriginalCategory =
        final.final_category !== (row.system_recommendation?.suggested_category || "");

      return `
        <div class="card">
          <div class="card-top">
            <div class="op-wrap">
              <div class="checks">
                <label>
                  <input type="checkbox" ${final.into_stock_pool ? "checked" : ""} onchange="updateRow('${row._id}','into_stock_pool',this.checked)">
                  Stock Pool
                </label>
                <label>
                  <input type="checkbox" ${final.into_pool30 ? "checked" : ""} onchange="updateRow('${row._id}','into_pool30',this.checked)">
                  Pool30
                </label>
              </div>
            </div>

            <div>
              <select onchange="updateRow('${row._id}','final_category',this.value)">
                ${CATEGORY_OPTIONS.map(opt =>
                  `<option value="${opt}" ${opt === final.final_category ? "selected" : ""}>${opt}</option>`
                ).join("")}
              </select>
              ${showOriginalCategory ? `<div style="margin-top:6px;font-size:12px;color:#64748b">原建議：${row.system_recommendation?.suggested_category || "-"}</div>` : ""}
            </div>

            <div>
              <button class="expand-btn" id="toggle-${row._id}" onclick="toggleDetail('${row._id}')">▶</button>
            </div>

            <div class="symbol-block">
              <div class="main">${row.symbol || "-"} ｜ ${row.name || "-"}</div>
              <div class="sub">${row.sector || "-"} / ${row.subsector || "-"}</div>
              <div class="sub" style="margin-top:4px">
                ${row.identity?.is_new_stock ? "新股" : "舊股"} ｜ 
                ${row.identity?.already_in_pool30 ? "已在 Pool30" : "未在 Pool30"}
              </div>
            </div>

            <div class="score-block">
              <div class="main">Pure ${fmt(score.pure)} ｜ Std ${fmt(score.std)}</div>
              <div>Baseline ${fmt(score.baseline)} ｜ Valuation ${fmt(score.valuation)}</div>
              <div>Trend ${fmt(score.trend)} ｜ Raw ${fmt(score.raw)}</div>
            </div>

            <div>
              <div class="status-tags">
                <span class="badge ${bucketMeta.className}">${bucketLabel(bucket)}</span>
                <span class="badge ${categoryBadgeClass(final.final_category)}">${final.final_category}</span>
              </div>
            </div>
          </div>

          <div class="detail" id="detail-${row._id}">
            <div class="detail-grid">
              <div class="detail-card">
                <h4>Level 2｜System Recommendation</h4>
                <div class="kv"><div class="k">Bucket</div><div>${bucketLabel(bucket)}</div></div>
                <div class="kv"><div class="k">Engine 建議</div><div>${row.system_recommendation?.into_stock_pool ? "納入 Stock Pool" : "不納入 Stock Pool"} ｜ ${row.system_recommendation?.into_pool30 ? "納入 Pool30" : "不納入 Pool30"}</div></div>
                <div class="kv"><div class="k">Research</div><div>${row.research?.status || "not_started"}</div></div>
                <div class="kv"><div class="k">人工備註</div><div>${escapeHtml(note || "-")}</div></div>

                <p><b>Why Yes</b></p>
                ${whyYes.length ? `<ul>${whyYes.map(x => `<li>${escapeHtml(x)}</li>`).join("")}</ul>` : `<p>-</p>`}

                <p style="margin-top:10px"><b>Why No</b></p>
                ${whyNo.length ? `<ul>${whyNo.map(x => `<li>${escapeHtml(x)}</li>`).join("")}</ul>` : `<p>-</p>`}
              </div>

              <div class="detail-card">
                <h4>Level 3｜Engine Score</h4>
                ${kvBlock("baseline", score.baseline)}
                ${kvBlock("vol_score", score.vol_score)}
                ${kvBlock("pure", score.pure)}
                ${kvBlock("valuation", score.valuation)}
                ${kvBlock("trend", score.trend)}
                ${kvBlock("raw", score.raw)}
                ${kvBlock("std", score.std)}
              </div>

              <div class="detail-card">
                <h4>Level 4｜AI Reason Short</h4>
                ${aiShort.length ? `<ul>${aiShort.map(x => `<li>${escapeHtml(x)}</li>`).join("")}</ul>` : `<p>-</p>`}
              </div>

              <div class="detail-card">
                <h4>Level 5｜AI Reason Detail</h4>
                <p><b>Growth：</b>${escapeHtml(aiDetail.growth || "-")}</p>
                <p><b>Industry：</b>${escapeHtml(aiDetail.industry || "-")}</p>
                <p><b>Competition：</b>${escapeHtml(aiDetail.competition || "-")}</p>
                <p><b>Valuation：</b>${escapeHtml(aiDetail.valuation || "-")}</p>
                <p><b>Risk：</b>${escapeHtml(aiDetail.risk || "-")}</p>
              </div>

              <div class="detail-card">
                <h4>Level 6｜Research</h4>
                <div class="kv"><div class="k">status</div><div>${row.research?.status || "not_started"}</div></div>
                <div class="kv"><div class="k">fundamental</div><div>${escapeHtml(row.research?.fundamental || "-")}</div></div>
                <div class="kv"><div class="k">industry</div><div>${escapeHtml(row.research?.industry || "-")}</div></div>
                <div class="kv"><div class="k">valuation</div><div>${escapeHtml(row.research?.valuation_analysis || "-")}</div></div>
                <div class="kv"><div class="k">trading_plan</div><div>${escapeHtml(row.research?.trading_plan || "-")}</div></div>
                <div class="kv"><div class="k">technical</div><div>${escapeHtml(row.research?.technical_analysis || "-")}</div></div>
                <div class="kv"><div class="k">pool30_fit</div><div>${escapeHtml(row.research?.pool30_fit || "-")}</div></div>
                <div class="kv"><div class="k">risk</div><div>${escapeHtml(row.research?.risk || "-")}</div></div>
                <div class="kv"><div class="k">final</div><div>${escapeHtml(row.research?.final_conclusion || "-")}</div></div>
              </div>

              <div class="detail-card">
                <h4>人工備註</h4>
                <textarea style="width:100%;min-height:110px;border:1px solid #dbe3ee;border-radius:12px;padding:10px;font-size:13px" oninput="updateRow('${row._id}','note',this.value)">${escapeHtml(note)}</textarea>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderBucket(bucketKey, items) {
      const meta = BUCKET_META[bucketKey];
      if (!meta) return "";

      if (!items.length) {
        return `
          <section class="bucket panel">
            <div class="bucket-header">
              <div class="bucket-title">
                <span class="badge ${meta.className}">${meta.title}</span>
              </div>
              <div class="bucket-count">0 檔</div>
            </div>
            <div class="empty">此分區目前沒有符合條件的股票。</div>
          </section>
        `;
      }

      return `
        <section class="bucket panel">
          <div class="bucket-header">
            <div class="bucket-title">
              <span class="badge ${meta.className}">${meta.title}</span>
            </div>
            <div class="bucket-count">${items.length} 檔</div>
          </div>

          <div class="table-head">
            <div>操作</div>
            <div>分類</div>
            <div>明細</div>
            <div>股票 / 產業</div>
            <div>分數</div>
            <div>系統分區</div>
          </div>

          ${items.map(renderCard).join("")}
        </section>
      `;
    }

    function renderAll() {
      if (!rawData) return;
      renderSummary();

      const filtered = rows.filter(matchesFilters);

      const grouped = {
        pool30_candidate: filtered.filter(x => x.system_recommendation?.bucket === "pool30_candidate"),
        stock_pool_candidate: filtered.filter(x => x.system_recommendation?.bucket === "stock_pool_candidate"),
        watch_candidate: filtered.filter(x => x.system_recommendation?.bucket === "watch_candidate"),
        reject_candidate: filtered.filter(x => x.system_recommendation?.bucket === "reject_candidate")
      };

      const html = [
        renderBucket("pool30_candidate", grouped.pool30_candidate),
        renderBucket("stock_pool_candidate", grouped.stock_pool_candidate),
        renderBucket("watch_candidate", grouped.watch_candidate),
        renderBucket("reject_candidate", grouped.reject_candidate)
      ].join("");

      document.getElementById("bucketContainer").innerHTML = html;
    }

    function exportPoolStock() {
      const out = rows
        .map(row => {
          const final = getFinal(row);
          if (!final.into_stock_pool) return null;
          return {
            symbol: row.symbol || "",
            name: row.name || "",
            sector: row.sector || "",
            subsector: row.subsector || "",
            category: final.final_category || "",
            in_pool30: !!final.into_pool30,
            source: row.identity?.source || "",
            note: final.note || ""
          };
        })
        .filter(Boolean);

      downloadJson(out, "pool_stock_final.json");
    }

    function exportPool30() {
      const out = rows
        .map(row => {
          const final = getFinal(row);
          if (!final.into_pool30) return null;
          return {
            symbol: row.symbol || "",
            name: row.name || "",
            sector: row.sector || "",
            subsector: row.subsector || "",
            category: final.final_category || ""
          };
        })
        .filter(Boolean);

      downloadJson(out, "pool30_final.json");
    }

    function exportReviewLog() {
      const out = rows.map(row => {
        const final = getFinal(row);
        return {
          symbol: row.symbol || "",
          system: {
            bucket: row.system_recommendation?.bucket || "",
            into_stock_pool: row.system_recommendation?.into_stock_pool ?? false,
            into_pool30: row.system_recommendation?.into_pool30 ?? false,
            category: row.system_recommendation?.suggested_category || ""
          },
          final: {
            into_stock_pool: final.into_stock_pool,
            into_pool30: final.into_pool30,
            category: final.final_category,
            note: final.note || ""
          }
        };
      });

      downloadJson(out, "pool_review_log.json");
    }

    function downloadJson(obj, filename) {
      const blob = new Blob([JSON.stringify(obj, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function fmt(v) {
      if (v === null || v === undefined || v === "") return "-";
      const n = Number(v);
      return Number.isFinite(n) ? n.toFixed(2).replace(/\.00$/,"") : String(v);
    }

    function bucketLabel(bucket) {
      const map = {
        pool30_candidate: "Pool30",
        stock_pool_candidate: "Stock Pool",
        watch_candidate: "Watch",
        reject_candidate: "Reject"
      };
      return map[bucket] || bucket;
    }

    function kvBlock(label, value) {
      return `<div class="kv"><div class="k">${label}</div><div>${fmt(value)}</div></div>`;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    init();
  </script>
</body>
</html>
