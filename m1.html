<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>M1｜市場資訊 V2</title>

<style>
body {
  font-family: Arial, "Microsoft JhengHei";
  background: #f5f5f5;
  margin: 0;
  padding: 16px;
}

.page {
  max-width: 920px;
  margin: auto;
}

h1 {
  font-size: 30px;
  margin-bottom: 16px;
}

.card {
  background: #fff;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 16px;
  border: 1px solid #ddd;
}

.title {
  font-weight: 800;
  margin-bottom: 10px;
}

/* macro */
.macro-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

.macro-box {
  background: #fafafa;
  padding: 10px;
  border-radius: 10px;
}

/* news */
.news-item {
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.news-title {
  font-weight: 700;
}

.fire {
  color: #ff5722;
  font-weight: 800;
}

/* stock */
.stock {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
}

.green { color:#0a8f3c; }
.red { color:#c62828; }

.small {
  color:#666;
  font-size:12px;
}

</style>
</head>

<body>
<div class="page">

<h1>📊 M1｜市場資訊 V2</h1>

<!-- 宏觀 -->
<div class="card">
  <div class="title">🌍 總經儀表板</div>
  <div id="macro"></div>
</div>

<!-- 新聞 -->
<div class="card">
  <div class="title">📰 國際新聞</div>
  <div id="news"></div>
</div>

<!-- AI -->
<div class="card">
  <div class="title">🤖 AI 趨勢</div>
  <div id="ai-news"></div>
</div>

<!-- 股票 -->
<div class="card">
  <div class="title">📈 核心股票動能</div>
  <div id="stocks"></div>
</div>

</div>

<script>

async function loadData() {
  const news = await fetch("./data/news.json").then(r=>r.json());
  const market = await fetch("./data/market_runtime.json").then(r=>r.json());

  renderMacro(market);
  renderNews(news);
  renderAI(news);
  renderStocks(market);
}

// ---------------------
// 🌍 Macro
// ---------------------
function renderMacro(market) {

  const vix = market.VIX?.price_now || "-";
  const spy = market.SPY?.ret_1d || 0;

  document.getElementById("macro").innerHTML = `
    <div class="macro-grid">
      <div class="macro-box">
        VIX：${vix}
      </div>
      <div class="macro-box">
        SP500：${(spy*100).toFixed(2)}%
      </div>
      <div class="macro-box">
        股票數：${Object.keys(market).length}
      </div>
      <div class="macro-box">
        狀態：${spy > 0 ? "風險偏好" : "風險下降"}
      </div>
    </div>
  `;
}

// ---------------------
// 📰 News
// ---------------------
function isImportant(n) {
  const t = n.title.toLowerCase();
  return t.includes("fed") || t.includes("inflation") || t.includes("vix") || t.includes("ai");
}

function renderNews(data) {

  document.getElementById("news").innerHTML =
    data.slice(0,8).map(n => `
      <div class="news-item">
        <div class="news-title">
          ${isImportant(n) ? '<span class="fire">🔥</span>' : ''}
          ${n.title}
        </div>
        <div class="small">${n.summary}</div>
      </div>
    `).join("");
}

// ---------------------
// 🤖 AI News
// ---------------------
function renderAI(data) {

  const ai = data.filter(n =>
    n.title.toLowerCase().includes("ai") ||
    n.title.toLowerCase().includes("nvidia")
  );

  document.getElementById("ai-news").innerHTML =
    ai.slice(0,5).map(n => `
      <div class="news-item">
        ${n.title}
      </div>
    `).join("");
}

// ---------------------
// 📈 Stocks
// ---------------------
function renderStocks(market) {

  const symbols = Object.keys(market).slice(0,10);

  document.getElementById("stocks").innerHTML =
    symbols.map(s => {
      const m = market[s];
      return `
        <div class="stock">
          <div>
            <b>${s}</b>
            <div class="small">
              1D ${(m.ret_1d*100).toFixed(1)}% |
              1W ${(m.ret_1w*100).toFixed(1)}% |
              1M ${(m.ret_1m*100).toFixed(1)}%
            </div>
          </div>
          <div class="${m.ret_1d>=0?'green':'red'}">
            ${m.price_now.toFixed(2)}
          </div>
        </div>
      `;
    }).join("");
}

// start
loadData();

</script>

</body>
</html>
