name: Daily Runtime Refresh

on:
  schedule:
    # 05:30 Asia/Taipei (UTC+8) = 21:30 UTC previous day
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-runtime-refresh
  cancel-in-progress: false

jobs:
  daily-runtime-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install yfinance requests
          fi

      - name: Run market runtime refresh
        run: |
          set -euo pipefail
          python scripts/update_market_runtime.py

      - name: Validate market runtime output
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import sys
          path = "data/market_runtime.json"
          if not os.path.exists(path):
              print(f"missing_required={path}")
              sys.exit(1)
          try:
              with open(path, "r", encoding="utf-8") as f:
                  payload = json.load(f)
              rows = payload.get("rows", payload) if isinstance(payload, dict) else {}
              print(f"market_runtime_symbols={len(rows) if isinstance(rows, dict) else 0}")
          except Exception as exc:
              print(f"market_runtime_schema_check_failed={exc}")
              sys.exit(1)
          PY

      - name: Commit market runtime data
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/market_runtime.json
          if git diff --cached --quiet; then
            echo "No market runtime changes to commit."
            exit 0
          fi
          git commit -m "daily market runtime refresh"
          git pull --rebase origin main
          git push origin main

      - name: Run M1 candidate refresh
        run: |
          set -euo pipefail
          python scripts/build_m1_candidate_80.py

      - name: Validate M1 candidate output
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import sys
          path = "data/m1/m1_candidate_80.json"
          if not os.path.exists(path):
              print(f"missing_required={path}")
              sys.exit(1)
          try:
              with open(path, "r", encoding="utf-8") as f:
                  payload = json.load(f)
              count = len(payload) if isinstance(payload, list) else 0
              print(f"m1_candidate_count={count}")
              symbols = [row.get("symbol") for row in payload if isinstance(row, dict)] if isinstance(payload, list) else []
              focus = [s for s in ["SNPS", "VRT", "ANET", "GLW", "COHR", "LITE", "CRDO", "ALAB"] if s in symbols]
              print("m1_candidate_focus_symbols=" + (", ".join(focus) if focus else "none"))
          except Exception as exc:
              print(f"m1_candidate_schema_check_failed={exc}")
              sys.exit(1)
          PY

      - name: Commit M1 candidate data
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/m1/m1_candidate_80.json
          if git diff --cached --quiet; then
            echo "No M1 candidate changes to commit."
            exit 0
          fi
          git commit -m "daily m1 candidate refresh"
          git pull --rebase origin main
          git push origin main

      - name: Run dashboard data refresh
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          set -euo pipefail
          python scripts/update_data.py

      - name: Validate dashboard data output
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import sys
          path = "data.json"
          if not os.path.exists(path):
              print(f"missing_required={path}")
              sys.exit(1)
          try:
              with open(path, "r", encoding="utf-8") as f:
                  json.load(f)
              print("data_json_status=ok")
          except Exception as exc:
              print(f"data_json_schema_check_failed={exc}")
              sys.exit(1)
          PY

      - name: Commit dashboard data
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No dashboard data changes to commit."
            exit 0
          fi
          git commit -m "daily dashboard data refresh"
          git pull --rebase origin main
          git push origin main
