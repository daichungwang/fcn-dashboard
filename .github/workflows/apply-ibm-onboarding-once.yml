name: Apply IBM onboarding once

on:
  push:
    branches: [codex/ibm-onboarding-base-data]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/ibm-onboarding-base-data
      - name: Apply IBM base data
        shell: bash
        run: |
          python - <<'PY'
          import base64, json, pathlib, zlib

          payload_b64 = ''
          p = json.loads(zlib.decompress(base64.b64decode(payload_b64)))

          def read_json(path):
              return json.loads(pathlib.Path(path).read_text(encoding='utf-8'))
          def write_json(path, value):
              pathlib.Path(path).write_text(json.dumps(value, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          pool_path = pathlib.Path('data/pool30.json')
          pool_text = pool_path.read_text(encoding='utf-8')
          if '"symbol": "IBM"' not in pool_text:
              needle = '  { "symbol": "ORCL", "name": "Oracle", "sector": "AI_APPLICATION", "subsector": "ENTERPRISE_SOFTWARE", "category": "growth" },\n'
              ibm_line = '  { "symbol": "IBM", "name": "IBM", "sector": "SOFTWARE", "subsector": "ENTERPRISE_SOFTWARE", "category": "core" },\n'
              if needle not in pool_text:
                  raise RuntimeError('pool30 insertion point missing')
              pool_path.write_text(pool_text.replace(needle, needle + ibm_line, 1), encoding='utf-8')

          universe = read_json('data/m1/universe_150.json')
          universe = [row for row in universe if row.get('symbol') != 'IBM'] + [p['universe']]
          write_json('data/m1/universe_150.json', universe)

          profile = read_json('data/m1/m1_stock_profile.json')
          profile['IBM'] = p['profile']
          write_json('data/m1/m1_stock_profile.json', profile)

          eps = read_json('data/m1/eps_history_ai.json')
          eps['meta'] = p['eps_meta']
          eps['data']['IBM'] = p['eps']
          eps['summary'] = p['eps_summary']
          write_json('data/m1/eps_history_ai.json', eps)

          radar_path = pathlib.Path('js/mm/modules/mm_c2_stock_radar_v2.js')
          radar = radar_path.read_text(encoding='utf-8')
          if 'IBM:"NYSE:IBM"' not in radar:
              needle = 'SMH:["AMEX:SMH","NASDAQ:SMH"]'
              if needle not in radar:
                  raise RuntimeError('TradingView symbol map insertion point missing')
              radar_path.write_text(radar.replace(needle, 'IBM:"NYSE:IBM", ' + needle, 1), encoding='utf-8')

          assert any(row.get('symbol') == 'IBM' for row in read_json('data/pool30.json'))
          assert any(row.get('symbol') == 'IBM' for row in read_json('data/m1/universe_150.json'))
          assert 'IBM' in read_json('data/m1/m1_stock_profile.json')
          assert 'IBM' in read_json('data/m1/eps_history_ai.json')['data']
          assert 'IBM:"NYSE:IBM"' in radar_path.read_text(encoding='utf-8')
          PY
      - name: Commit IBM onboarding files and remove publisher
        shell: bash
        run: |
          rm .github/workflows/apply-ibm-onboarding-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/pool30.json data/m1/universe_150.json data/m1/m1_stock_profile.json data/m1/eps_history_ai.json js/mm/modules/mm_c2_stock_radar_v2.js .github/workflows/apply-ibm-onboarding-once.yml
          git commit -m "feat: onboard IBM base data"
          git push origin HEAD:codex/ibm-onboarding-base-data
