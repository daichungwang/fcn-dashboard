name: M1 Stock Profile Coverage Check

on:
  schedule:
    # Sunday 09:30 Asia/Taipei (UTC+8) = Sunday 01:30 UTC
    - cron: "30 1 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m1-stock-profile-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check M1 stock profile coverage
        run: |
          set -euo pipefail
          python scripts/m1/check_stock_profile_coverage.py

      - name: Upload missing profile report
        uses: actions/upload-artifact@v4
        with:
          name: m1-stock-profile-missing-report
          path: data/m1/m1_stock_profile_missing_report.json
          if-no-files-found: error
