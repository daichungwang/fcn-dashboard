name: Fix IBM profile formatting once
on:
  push:
    branches: [codex/ibm-onboarding-base-data]
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/ibm-onboarding-base-data
      - name: Preserve latest main profile and append IBM
        shell: bash
        run: |
          git fetch origin main --depth=1
          python - <<'PY'
          import base64, json, pathlib, subprocess, zlib
          payload = ''
          ibm = json.loads(zlib.decompress(base64.b64decode(payload)))
          base = subprocess.check_output(['git','show','origin/main:data/m1/m1_stock_profile.json']).decode('utf-8')
          obj = json.loads(base)
          if 'IBM' in obj:
              raise RuntimeError('IBM already exists on main; manual reconciliation required')
          entry = json.dumps({'IBM': ibm}, ensure_ascii=False, indent=2)
          entry = entry[2:-2]
          pos = base.rfind('\n}')
          if pos < 0:
              raise RuntimeError('profile closing brace missing')
          out = base[:pos] + ',\n' + entry + base[pos:]
          pathlib.Path('data/m1/m1_stock_profile.json').write_text(out, encoding='utf-8')
          json.loads(out)
          PY
      - name: Commit clean profile diff and remove workflow
        shell: bash
        run: |
          rm .github/workflows/fix-ibm-profile-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/m1/m1_stock_profile.json .github/workflows/fix-ibm-profile-once.yml
          git commit -m "fix: preserve main profile formatting"
          git push origin HEAD:codex/ibm-onboarding-base-data
