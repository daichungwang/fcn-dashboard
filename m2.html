<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M2｜FCN 持倉健檢</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f5f6f8;
      color: #111;
    }
    .page {
      max-width: 1220px;
      margin: 0 auto;
      padding: 20px 14px 50px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .subtitle {
      color: #555;
      font-size: 15px;
      margin-bottom: 18px;
      line-height: 1.6;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: #111;
      color: #fff;
    }
    button.secondary { background: #666; }
    button.light { background: #e9ecef; color: #111; }

    .note {
      font-size: 13px;
      background: #fffbe6;
      border: 1px solid #f1df9a;
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.6;
      margin-top: 8px;
    }
    .muted { color: #666; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .summary-box {
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }
    .summary-label {
      color: #666;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .summary-value {
      font-size: 28px;
      font-weight: 700;
    }
    .summary-sub {
      margin-top: 4px;
      color: #666;
      font-size: 13px;
    }

    .zone-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .zone-card {
      border-radius: 14px;
      padding: 14px;
      border: 1px solid #ddd;
      background: #fff;
    }
    .zone-danger {
      background: #fff5f5;
      border-color: #efb0b0;
    }
    .zone-watch {
      background: #fffaf0;
      border-color: #ecd7a3;
    }
    .zone-healthy {
      background: #f5fff7;
      border-color: #b9e2c0;
    }

    .zone-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .zone-meta {
      font-size: 13px;
      color: #555;
      margin-bottom: 10px;
    }

    .fcn-card {
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      margin-top: 10px;
    }
    .fcn-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .fcn-id {
      font-size: 16px;
      font-weight: 700;
    }
    .fcn-line {
      margin: 3px 0;
      font-size: 14px;
      line-height: 1.55;
    }

    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #ddd;
      background: #fafafa;
    }
    .pill-danger {
      background: #fff0f0;
      border-color: #f1b5b5;
    }
    .pill-watch {
      background: #fff7e8;
      border-color: #f0d298;
    }
    .pill-healthy {
      background: #ecfff1;
      border-color: #a9e2b4;
    }

    .expand-btn {
      margin-top: 8px;
      background: #f0f2f5;
      color: #111;
      border: 1px solid #d8dde6;
    }

    .detail-box {
      display: none;
      margin-top: 10px;
      border-top: 1px dashed #ddd;
      padding-top: 10px;
    }
    .detail-box.show {
      display: block;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
      white-space: nowrap;
    }
    th {
      font-size: 13px;
      color: #666;
      font-weight: 700;
      background: #fafafa;
    }

    .stock-danger-row { background: #fff7f7; }
    .stock-watch-row { background: #fffdf7; }
    .stock-healthy-row { background: #fbfffb; }

    .stock-analysis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .list-box {
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .item-card {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 10px;
      margin-top: 8px;
      background: #fafafa;
    }
    .item-line {
      margin: 2px 0;
      line-height: 1.55;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .zone-grid { grid-template-columns: 1fr; }
      .stock-analysis-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 680px) {
      h1 { font-size: 26px; }
      h2 { font-size: 20px; }
      .summary-grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>M2｜FCN 持倉健檢</h1>
    <div class="subtitle">
      只看 <b>active</b> 持倉。核心判斷依據是：
      <b>現價 vs KI / Strike</b>，不是 event_fcn。
    </div>

    <div class="card">
      <div class="toolbar">
        <button id="runHealthBtn">執行 M2 Health Engine</button>
        <button class="secondary" id="refreshBtn">刷新 M2 畫面</button>
      </div>
      <div id="runtimeMeta" class="muted">尚未執行 M2 Health Engine</div>
      <div class="note">
        M2 會讀：
        <b>fcn_pool.json</b>、<b>market_runtime.json</b>，
        並只取 <b>status = active</b> 的 FCN。
      </div>
    </div>

    <div class="card">
      <h2>1. 全貌 Summary</h2>
      <div id="summaryBlock"></div>
    </div>

    <div class="card">
      <h2>2. 持倉分區</h2>
      <div id="zoneBlock"></div>
    </div>

    <div class="card">
      <h2>3. 股票風險分析</h2>
      <div id="stockAnalysisBlock"></div>
    </div>
  </div>

  <script type="module">
    import { runM2HealthEngine, buildFCNMeta, limitDisplay } from "./js/core/m2_health_engine_v1.js";
        
    const M2_HEALTH_CACHE_KEY = "m2_health_cache_v1";

    function toNumber(v, fallback = 0) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function fmt(num, digits = 2) {
      return toNumber(num).toLocaleString("en-US", {
        minimumFractionDigits: 0,
        maximumFractionDigits: digits
      });
    }

    function fmtAmt(num, currency = "USD") {
      return `${currency} ${fmt(num, 0)}`;
    }

    function fmtPct(num) {
      return `${fmt(num, 2)}%`;
    }

    function readCache() {
      try {
        const raw = localStorage.getItem(M2_HEALTH_CACHE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function writeCache(data) {
      localStorage.setItem(M2_HEALTH_CACHE_KEY, JSON.stringify(data));
    }

    function healthLabel(v) {
      if (v === "danger") return "積極處理";
      if (v === "watch") return "持續追蹤";
      return "健康";
    }

    function healthPillClass(v) {
      if (v === "danger") return "pill pill-danger";
      if (v === "watch") return "pill pill-watch";
      return "pill pill-healthy";
    }

    function stockRowClass(v) {
      if (v === "danger") return "stock-danger-row";
      if (v === "watch") return "stock-watch-row";
      return "stock-healthy-row";
    }

    function buildSummary(data) {
      const dangerAmt = data.danger.reduce((s, x) => s + toNumber(x.amt), 0);
      const watchAmt = data.watch.reduce((s, x) => s + toNumber(x.amt), 0);
      const healthyAmt = data.healthy.reduce((s, x) => s + toNumber(x.amt), 0);

      return `
        <div class="summary-grid">
          <div class="summary-box">
            <div class="summary-label">持倉總擋數</div>
            <div class="summary-value">${data.total}</div>
            <div class="summary-sub">總金額：${fmtAmt(data.total_amt)}</div>
          </div>

          <div class="summary-box">
            <div class="summary-label">積極處理</div>
            <div class="summary-value">${data.danger.length}</div>
            <div class="summary-sub">${fmtAmt(dangerAmt)}</div>
          </div>

          <div class="summary-box">
            <div class="summary-label">持續追蹤</div>
            <div class="summary-value">${data.watch.length}</div>
            <div class="summary-sub">${fmtAmt(watchAmt)}</div>
          </div>

          <div class="summary-box">
            <div class="summary-label">健康</div>
            <div class="summary-value">${data.healthy.length}</div>
            <div class="summary-sub">${fmtAmt(healthyAmt)}</div>
          </div>
        </div>
      `;
    }

    function toggleDetail(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.toggle("show");
    }
    window.toggleDetail = toggleDetail;

    function buildStockDetailTable(stocks = []) {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>股票</th>
                <th>狀態</th>
                <th>現價</th>
                <th>進場價</th>
                <th>KI%</th>
                <th>KI價</th>
                <th>距 KI</th>
                <th>Strike%</th>
                <th>Strike價</th>
                <th>距 Strike</th>
                <th>Pure</th>
                <th>Snapshot</th>
                <th>Event</th>
                <th>Trend</th>
              </tr>
            </thead>
            <tbody>
              ${stocks.map(s => `
                <tr class="${stockRowClass(s.stock_health)}">
                  <td><b>${s.symbol}</b></td>
                  <td><span class="${healthPillClass(s.stock_health)}">${healthLabel(s.stock_health)}</span></td>
                  <td>${fmt(s.price_now)}</td>
                  <td>${fmt(s.entry_price)}</td>
                  <td>${fmt(s.ki_pct)}</td>
                  <td>${fmt(s.ki_price)}</td>
                  <td>${fmtPct(s.dist_to_ki_pct)}</td>
                  <td>${fmt(s.strike_pct)}</td>
                  <td>${fmt(s.strike_price)}</td>
                  <td>${fmtPct(s.dist_to_strike_pct)}</td>
                  <td>${s.pure_stock ?? "-"}</td>
                  <td>${s.snapshot_score ?? "-"}</td>
                  <td>${s.event_stock ?? "-"}</td>
                  <td>${s.trend || "-"}</td>
                </tr>
                <tr>
                  <td colspan="14" style="white-space: normal; color:#666;">
                    ${s.trend_note || ""}
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderZoneColumn(title, zoneClass, rows, code) {
      const zoneAmt = rows.reduce((s, x) => s + toNumber(x.amt), 0);

      return `
        <div class="zone-card ${zoneClass}">
          <div class="zone-title">${title}</div>
          <div class="zone-meta">${rows.length} 檔 ｜ ${fmtAmt(zoneAmt)}</div>

          ${rows.length ? rows.map((f, idx) => {
            const detailId = `${code}_${idx}_${f.fcn_id}`;
            return `
              <div class="fcn-card">
                <div class="fcn-head">
                  <div>
                    <div class="fcn-id">${f.fcn_id}</div>
                    <div class="fcn-line">Basket：${(f.basket || []).join(" / ")}</div>
                  </div>
                  <span class="${healthPillClass(f.fcn_health)}">${healthLabel(f.fcn_health)}</span>
                </div>

                <div class="fcn-line"><b>Worst-of：</b>${f.worst_of}</div>
                <div class="fcn-line"><b>金額：</b>${fmtAmt(f.amt, f.currency || "USD")}</div>
                <div class="fcn-line"><b>Danger / Watch / Healthy：</b>${f.danger_count} / ${f.watch_count} / ${f.healthy_count}</div>
                <div class="fcn-line"><b>Worst 距 KI：</b>${fmtPct(f.worst_dist_to_ki_pct)}</div>
                <div class="fcn-line"><b>Worst 距 Strike：</b>${fmtPct(f.worst_dist_to_strike_pct)}</div>

                <button class="expand-btn" onclick="toggleDetail('${detailId}')">展開明細</button>

                <div id="${detailId}" class="detail-box">
                  ${buildFCNMeta(f)}
${buildStockDetailTable(f.stocks || [])}
                </div>
              </div>
            `;
          }).join("") : `<div class="muted">目前沒有資料</div>`}
        </div>
      `;
    }

    function buildZoneBlock(data) {
  return `
    <div class="zone-grid">
      ${renderZoneColumn("🚨 積極處理", "zone-danger", limitDisplay(data.danger, "danger"), "danger")}
      ${renderZoneColumn("⚠️ 持續追蹤", "zone-watch", limitDisplay(data.watch, "watch"), "watch")}
      ${renderZoneColumn("✅ 健康", "zone-healthy", limitDisplay(data.healthy, "healthy"), "healthy")}
    </div>
      `;
    }

    function buildStockAnalysis(data) {
      const dangerStockMap = {};
      const watchStockMap = {};
      const exposureMap = {};

      data.fcns.forEach(f => {
        (f.stocks || []).forEach(s => {
          if (s.stock_health === "danger") {
            if (!dangerStockMap[s.symbol]) {
              dangerStockMap[s.symbol] = { count: 0, amt: 0, fcns: [] };
            }
            dangerStockMap[s.symbol].count += 1;
            dangerStockMap[s.symbol].amt += toNumber(f.amt);
            dangerStockMap[s.symbol].fcns.push(f.fcn_id);
          }

          if (s.stock_health === "watch") {
            if (!watchStockMap[s.symbol]) {
              watchStockMap[s.symbol] = { count: 0, amt: 0, fcns: [] };
            }
            watchStockMap[s.symbol].count += 1;
            watchStockMap[s.symbol].amt += toNumber(f.amt);
            watchStockMap[s.symbol].fcns.push(f.fcn_id);
          }

          if (!exposureMap[s.symbol]) {
            exposureMap[s.symbol] = {
              count: 0,
              amt: 0,
              danger: 0,
              watch: 0,
              healthy: 0,
              fcns: []
            };
          }

          exposureMap[s.symbol].count += 1;
          exposureMap[s.symbol].amt += toNumber(f.amt);
          exposureMap[s.symbol].fcns.push(f.fcn_id);

          if (s.stock_health === "danger") exposureMap[s.symbol].danger += 1;
          else if (s.stock_health === "watch") exposureMap[s.symbol].watch += 1;
          else exposureMap[s.symbol].healthy += 1;
        });
      });

      const dangerRows = Object.entries(dangerStockMap)
        .sort((a, b) => b[1].amt - a[1].amt);

      const watchRows = Object.entries(watchStockMap)
        .sort((a, b) => b[1].amt - a[1].amt);

      const exposureRows = Object.entries(exposureMap)
        .sort((a, b) => b[1].amt - a[1].amt);

      return `
        <div class="stock-analysis-grid">
          <div class="list-box">
            <h3>5.1 跌破下限價的股票</h3>
            ${dangerRows.length ? dangerRows.map(([sym, info]) => `
              <div class="item-card">
                <div class="item-line"><b>${sym}</b></div>
                <div class="item-line">使用次數：${info.count}</div>
                <div class="item-line">投資金額：${fmtAmt(info.amt)}</div>
                <div class="item-line">來自 FCN：${info.fcns.join(" / ")}</div>
              </div>
            `).join("") : `<div class="muted">目前沒有跌破 KI 的股票</div>`}
          </div>

          <div class="list-box">
            <h3>5.2 跌破執行價的股票</h3>
            ${watchRows.length ? watchRows.map(([sym, info]) => `
              <div class="item-card">
                <div class="item-line"><b>${sym}</b></div>
                <div class="item-line">使用次數：${info.count}</div>
                <div class="item-line">投資金額：${fmtAmt(info.amt)}</div>
                <div class="item-line">來自 FCN：${info.fcns.join(" / ")}</div>
              </div>
            `).join("") : `<div class="muted">目前沒有跌破 Strike 的股票</div>`}
          </div>
        </div>

        <div class="card" style="margin-top:14px; padding:14px;">
          <h3>5.3 股票投資屬性分析</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>股票</th>
                  <th>使用次數</th>
                  <th>投資金額</th>
                  <th>Danger / Watch / Healthy</th>
                  <th>來自 FCN</th>
                </tr>
              </thead>
              <tbody>
                ${exposureRows.map(([sym, info]) => `
                  <tr>
                    <td><b>${sym}</b></td>
                    <td>${info.count}</td>
                    <td>${fmtAmt(info.amt)}</td>
                    <td>${info.danger} / ${info.watch} / ${info.healthy}</td>
                    <td>${info.fcns.join(" / ")}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    async function runM2() {
      try {
        const [fcnPool, marketRuntime, runtimeCache] = await Promise.all([
          fetch("./data/fcn_pool.json").then(r => r.json()),
          fetch("./data/market_runtime.json").then(r => r.json()),
          (async () => {
            try {
              return JSON.parse(localStorage.getItem("runtime_cache_v1")) || {};
            } catch {
              return {};
            }
          })()
        ]);

        // 把 runtime_cache_v1 的股票補充資訊併到 marketRuntime
        const marketMerged = {};
        Object.keys(marketRuntime || {}).forEach(sym => {
          marketMerged[sym] = {
            ...(marketRuntime[sym] || {}),
            ...((runtimeCache.stocks || {})[sym] || {})
          };
        });

        const data = runM2HealthEngine({
          fcnPool,
          marketRuntime: marketMerged
        });

        const cache = {
          generated_at: new Date().toISOString(),
          ...data
        };

        writeCache(cache);
        renderM2();
        alert("M2 Health Engine 執行成功");
      } catch (err) {
        console.error("M2 Health Engine 執行失敗", err);
        alert("M2 Health Engine 執行失敗，請看 console");
      }
    }

    function renderM2() {
      const cache = readCache();

      if (!cache || !cache.fcns) {
        document.getElementById("runtimeMeta").innerHTML =
          "尚未找到 m2_health_cache_v1，請先按「執行 M2 Health Engine」";
        document.getElementById("summaryBlock").innerHTML = `<div class="muted">尚無資料</div>`;
        document.getElementById("zoneBlock").innerHTML = `<div class="muted">尚無資料</div>`;
        document.getElementById("stockAnalysisBlock").innerHTML = `<div class="muted">尚無資料</div>`;
        return;
      }

      document.getElementById("runtimeMeta").innerHTML =
        `最新 M2 Health 執行時間：<b>${cache.generated_at || "-"}</b>`;

      document.getElementById("summaryBlock").innerHTML = buildSummary(cache);
      document.getElementById("zoneBlock").innerHTML = buildZoneBlock(cache);
      document.getElementById("stockAnalysisBlock").innerHTML = buildStockAnalysis(cache);
    }

    document.getElementById("runHealthBtn").addEventListener("click", runM2);
    document.getElementById("refreshBtn").addEventListener("click", renderM2);

    renderM2();
  </script>
</body>
</html>
