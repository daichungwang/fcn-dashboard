<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>M8 Batch Pricing Tool v2</title>
<style>
body { font-family: Arial; padding:20px; background:#f5f7fa; }
textarea { width:100%; height:140px; font-family: monospace; }
button { margin:5px; padding:8px 12px; }
table { border-collapse: collapse; width:100%; font-size:12px; }
th, td { border:1px solid #ccc; padding:6px; text-align:center; }
th { background:#eee; }
.ok { color:green; font-weight:bold; }
.warn { color:orange; font-weight:bold; }
.bad { color:red; font-weight:bold; }
</style>
</head>

<body>

<h2>M8 Batch Pricing Tool v2</h2>

<textarea id="input">
Case1,TSM|AMD|NVDA|AVGO,55,68,12,EKI,19.16
Case2,ARM|GOOG|INTC|TSM,60,70,6,EKI,23.62
Case3,AAPL|COIN|GOOG|META,50,60,10,EKI,17.31
Case4,AMD|NVDA|TSLA|TSM,55,65,6,EKI,17.24
Case5,AAPL|NVDA|TSM,77,77,6,AKI,15
</textarea>

<br>
<button onclick="run()">執行</button>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="exportJSON()">Export JSON</button>

<p id="status"></p>

<table id="table">
<thead>
<tr>
<th>Case</th>
<th>Basket</th>
<th>KI</th>
<th>Strike</th>
<th>Tenor</th>
<th>Type</th>
<th>Market</th>

<th>Score</th>
<th>BW</th>

<th>Basket</th>
<th>KIAdj</th>
<th>TenorAdj</th>
<th>StrikeAdj</th>
<th>TypeAdj</th>
<th>Reson</th>

<th>Structure</th>
<th>Fair</th>
<th>Δ</th>
<th>View</th>
<th>Note</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="js/core/m8_batch_engine.js"></script>

<script>
let results = [];

function viewClass(v){
  if(v==="便宜") return "warn";
  if(v==="合理") return "ok";
  return "bad";
}

function render(){
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML="";

  results.forEach(r=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
<td>${r.case_name}</td>
<td>${r.symbols.join("/")}</td>
<td>${r.KI}</td>
<td>${r.strike}</td>
<td>${r.tenor}</td>
<td>${r.type}</td>
<td>${r.market_yield}</td>

<td>${r.scores.join("/")}</td>
<td>${r.BW}</td>

<td>${r.basket_premium}</td>
<td>${r.ki_adj}</td>
<td>${r.tenor_adj}</td>
<td>${r.strike_adj}</td>
<td>${r.type_adj}</td>
<td>${r.resonance_adj}</td>

<td>${r.structure_total}</td>
<td><b>${r.fair_yield}</b></td>
<td>${r.pricing_delta}</td>
<td class="${viewClass(r.pricing_view)}">${r.pricing_view}</td>
<td>${r.note||""}</td>
`;
    tbody.appendChild(tr);
  });
}

async function run(){
  const lines = document.getElementById("input").value.trim().split("\n");

  results = [];

  for(const line of lines){
    if(!line.trim()) continue;

    const [name, basket, KI, strike, tenor, type, market] = line.split(",");

    const res = await runM8Case({
      caseName: name,
      symbols: basket.split("|"),
      KI: Number(KI),
      Strike: Number(strike),
      T: Number(tenor),
      type: type,
      marketYield: Number(market)
    });

    results.push(res);
  }

  render();
  document.getElementById("status").innerText = "完成 "+results.length+" 筆";
}

function exportCSV(){
  let csv = Object.keys(results[0]).join(",")+"\n";
  results.forEach(r=>{
    csv += Object.values(r).join(",")+"\n";
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "m8.csv";
  a.click();
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(results,null,2)]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "m8.json";
  a.click();
}
</script>

</body>
</html>
