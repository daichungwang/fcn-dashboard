<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M8 FCN 定價模型</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 18px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      border: 1px solid #e8ebf2;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #444;
      font-weight: 600;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #cfd6e4;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
    }

    .form-group textarea {
      min-height: 90px;
      resize: vertical;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .btn-primary {
      background: #2f6fed;
      color: #fff;
    }

    .btn-secondary {
      background: #eef2ff;
      color: #2447b2;
    }

    .btn-danger {
      background: #ffe8e8;
      color: #b42318;
    }

    .btn-success {
      background: #ecfdf3;
      color: #027a48;
    }

    .muted {
      color: #667085;
      font-size: 13px;
    }

    .result-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .pill.ok {
      background: #ecfdf3;
      color: #027a48;
    }

    .pill.warn {
      background: #fff7ed;
      color: #b54708;
    }

    .pill.bad {
      background: #fef3f2;
      color: #b42318;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-box {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      background: #fafafa;
    }

    .summary-box .k {
      font-size: 12px;
      color: #667085;
      margin-bottom: 6px;
    }

    .summary-box .v {
      font-size: 22px;
      font-weight: 800;
      color: #111827;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #fff;
    }

    th, td {
      border: 1px solid #e5e7eb;
      padding: 10px 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f8fafc;
      font-weight: 700;
    }

    .section-title {
      margin: 18px 0 10px;
      font-size: 16px;
      font-weight: 800;
      color: #1d2939;
    }

    .mono {
      font-family: Consolas, Monaco, monospace;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .blueprint-card {
      margin-top: 18px;
    }

    .bp-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .bp-block {
      margin-top: 14px;
    }

    .bp-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 14px;
    }

    .bp-table th,
    .bp-table td {
      border: 1px solid #ddd;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }

    .bp-table th {
      width: 220px;
      background: #f7f7f7;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: #667085;
      border: 1px dashed #cbd5e1;
      border-radius: 12px;
      background: #fff;
    }

    .explain-box {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fafafa;
      padding: 14px;
      margin-top: 12px;
    }

    .explain-box .row {
      margin-bottom: 12px;
    }

    .explain-box .label {
      font-weight: 700;
      color: #344054;
      margin-bottom: 4px;
    }

    .small-note {
      font-size: 12px;
      color: #667085;
      margin-top: 6px;
    }

    .split-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .clickable-row {
      cursor: pointer;
    }

    .clickable-row:hover {
      background: #f8fafc;
    }

    .sticky-box {
      max-height: 360px;
      overflow: auto;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
    }

    @media (max-width: 1080px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .split-2 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      th, td {
        font-size: 13px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>FCN M8 定價模型（詢價單管理版）</h1>

    <div class="grid">
      <section class="card">
        <h2>詢價單輸入</h2>

        <div class="split-2">
          <div class="form-group">
            <label for="inquiryDate">詢價日期</label>
            <input id="inquiryDate" type="date" />
          </div>

          <div class="form-group">
            <label for="inquiryNo">詢價單號</label>
            <input id="inquiryNo" type="text" readonly />
          </div>
        </div>

        <div class="form-group">
          <label for="inputMode">輸入模式</label>
          <select id="inputMode">
            <option value="single">單筆輸入</option>
            <option value="batch">整批輸入</option>
          </select>
        </div>

        <div id="singleInputPanel">
          <div class="form-group">
            <label for="caseName">案例名稱</label>
            <input id="caseName" type="text" value="Case 1" />
          </div>

          <div class="form-group">
            <label for="symbols">股票代號（逗號分隔，2~5 檔）</label>
            <textarea id="symbols">TSM,AAPL,MSFT,LQD</textarea>
          </div>

          <div class="split-2">
            <div class="form-group">
              <label for="ki">KI</label>
              <input id="ki" type="number" value="55" />
            </div>

            <div class="form-group">
              <label for="strike">Strike</label>
              <input id="strike" type="number" value="65" />
            </div>
          </div>

          <div class="split-2">
            <div class="form-group">
              <label for="tenor">Tenor（月）</label>
              <input id="tenor" type="number" value="6" />
            </div>

            <div class="form-group">
              <label for="type">Type</label>
              <select id="type">
                <option value="EKI">EKI</option>
                <option value="DACN">DACN</option>
                <option value="AKI">AKI</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="marketYield">Market Yield (%)</label>
            <input id="marketYield" type="number" step="0.01" value="14" />
          </div>

          <div class="btn-row">
            <button class="btn-primary" id="runBtn">執行 M8 並留存</button>
            <button class="btn-secondary" id="demoBtn">載入示範案例</button>
            <button class="btn-danger" id="clearBtn">清空結果</button>
          </div>
        </div>

        <div id="batchInputPanel" style="display:none;">
          <div class="form-group">
            <label for="batchInput">整批貼上</label>
            <textarea id="batchInput" placeholder="Case1,TSM|AMD|NVDA|AVGO,55,68,12,EKI,19.16
Case2,ARM|GOOG|INTC|TSM,60,70,6,EKI,23.62"></textarea>
            <div class="small-note">格式：CaseName,股票1|股票2|股票3,KI,Strike,Tenor,Type,MarketYield</div>
          </div>

          <div class="btn-row">
            <button class="btn-success" id="importBatchBtn">匯入整批詢價單</button>
          </div>
        </div>

        <p class="muted" style="margin-top:12px;">
          說明：Vol 模組已正式納入，不再另外加 ResonanceAdj。
        </p>

        <div class="section-title">歷史詢價單</div>
        <div class="sticky-box">
          <div id="historyList" class="muted" style="padding:12px;">尚無資料</div>
        </div>

        <div class="section-title">同 Basket 歷史比較</div>
        <div class="sticky-box">
          <div id="basketCompare" class="muted" style="padding:12px;">尚無資料</div>
        </div>
      </section>

      <section class="card">
        <div class="result-top">
          <h2 style="margin:0;">M8 結果</h2>
          <span id="pricingBadge" class="pill ok">尚未執行</span>
        </div>

        <div id="resultArea">
          <div class="empty">請先輸入案例後，按「執行 M8 並留存」</div>
        </div>
      </section>
    </div>

    <section class="card blueprint-card">
      <div class="bp-header">
        <h2 style="margin:0;">M8 Blueprint（完整邏輯 / 公式 / 參數）</h2>
        <button id="toggleBlueprintBtn" class="btn-secondary" type="button">一鍵展開</button>
      </div>

      <div id="blueprintPanel" style="display:none; margin-top:12px;">
        <div id="blueprintContent"></div>
      </div>
    </section>
  </div>

  <script type="module">
    import { runM8Case, getM8Blueprint } from "./js/core/m8_batch_engine.js";

    const $ = (id) => document.getElementById(id);

    function badgeClass(view) {
      if (view === "便宜" || view === "略便宜") return "pill ok";
      if (view === "合理") return "pill warn";
      return "pill bad";
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function fmt(v) {
      return Number(num(v).toFixed(2));
    }

    function parseSymbols(text) {
      return String(text || "")
        .split(",")
        .map(s => s.trim().toUpperCase())
        .filter(Boolean);
    }

    function todayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function generateInquiryNo(dateStr) {
      const key = `fcn_inquiry_seq_${dateStr}`;
      let seq = Number(localStorage.getItem(key) || "0") + 1;
      localStorage.setItem(key, String(seq));

      const pureDate = dateStr.replaceAll("-", "");
      const seq3 = String(seq).padStart(3, "0");
      return `FCN${pureDate}${seq3}`;
    }

    function previewInquiryNo(dateStr) {
      const key = `fcn_inquiry_seq_${dateStr}`;
      const seq = Number(localStorage.getItem(key) || "0") + 1;
      const pureDate = dateStr.replaceAll("-", "");
      return `FCN${pureDate}${String(seq).padStart(3, "0")}`;
    }

    function refreshInquiryNo() {
      const dateStr = $("inquiryDate").value || todayStr();
      $("inquiryNo").value = previewInquiryNo(dateStr);
    }

    function normalizeBasket(symbols) {
      return [...(symbols || [])].map(s => String(s).toUpperCase()).sort().join("|");
    }

    function getInquiryStore() {
      return JSON.parse(localStorage.getItem("fcn_inquiries") || "[]");
    }

    function saveInquiryStore(rows) {
      localStorage.setItem("fcn_inquiries", JSON.stringify(rows));
    }

    function parseBatchText(text, inquiryDate) {
      const lines = String(text || "")
        .split("\n")
        .map(x => x.trim())
        .filter(Boolean);

      const output = [];

      for (const line of lines) {
        const parts = line.split(",").map(x => x.trim());
        if (parts.length < 7) continue;

        const [caseName, symbolText, ki, strike, tenor, type, marketYield] = parts;

        output.push({
          inquiry_date: inquiryDate,
          inquiry_no: generateInquiryNo(inquiryDate),
          case_name: caseName,
          symbols: symbolText.split("|").map(x => x.trim().toUpperCase()).filter(Boolean),
          KI: Number(ki),
          Strike: Number(strike),
          T: Number(tenor),
          type,
          marketYield: Number(marketYield),
          basket_key: normalizeBasket(symbolText.split("|").map(x => x.trim().toUpperCase()).filter(Boolean)),
          created_at: new Date().toISOString(),
          status: "imported_only"
        });
      }

      return output;
    }

    function renderBlueprint() {
      const bp = getM8Blueprint() || {};
      const container = $("blueprintContent");
      if (!container) return;

      const summary = Array.isArray(bp.summary) ? bp.summary : [];
      const formulas = bp.formulas || {};
      const parameters = bp.parameters || {};
      const typeMap = parameters.type_map || {};
      const tenor = parameters.tenor || {};

      container.innerHTML = `
        <div class="bp-block">
          <h3>${bp.version || "M8 Blueprint"}</h3>
          <ul>
            ${summary.map(x => `<li>${x}</li>`).join("")}
          </ul>
        </div>

        <div class="bp-block">
          <h3>完整公式</h3>
          <table class="bp-table">
            <tbody>
              ${Object.entries(formulas).map(([k, v]) => `
                <tr>
                  <th>${k}</th>
                  <td>${v}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>

        <div class="bp-block">
          <h3>參數設定</h3>
          <table class="bp-table">
            <tbody>
              <tr><th>Base</th><td>${parameters.base ?? "-"}</td></tr>
              <tr><th>Type</th><td>EKI=${typeMap.EKI ?? "-"}, DACN=${typeMap.DACN ?? "-"}, AKI=${typeMap.AKI ?? "-"}</td></tr>
              <tr><th>Tenor</th><td>${tenor.short || "-"} / ${tenor.mid || "-"} / ${tenor.long || "-"} / max=${tenor.max ?? "-"}</td></tr>
              <tr><th>Vol Note</th><td>${parameters.vol_note || "-"}</td></tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function setupBlueprintToggle() {
      const btn = $("toggleBlueprintBtn");
      const panel = $("blueprintPanel");
      if (!btn || !panel) return;

      btn.addEventListener("click", () => {
        const isOpen = panel.style.display !== "none";
        panel.style.display = isOpen ? "none" : "block";
        btn.textContent = isOpen ? "一鍵展開" : "一鍵收合";
      });
    }

    function buildShortSwingFormula(days) {
      const d = Array.isArray(days) ? days : [];
      const d0 = fmt(d[0]);
      const d1 = fmt(d[1]);
      const d2 = fmt(d[2]);
      const d3 = fmt(d[3]);
      const d4 = fmt(d[4]);
      const d5 = fmt(d[5]);

      return `0.35×${d0} + 0.25×${d1} + 0.15×${d2} + 0.10×${d3} + 0.08×${d4} + 0.07×${d5}`;
    }

    function buildVolAdjExplain(v) {
      const basketVol = num(v);

      if (basketVol <= 3.0) {
        return {
          bucket: "v ≤ 3",
          formula: "-0.6 + 0.35×v",
          substitution: `-0.6 + 0.35×${fmt(basketVol)}`
        };
      }

      if (basketVol <= 6.0) {
        const d = basketVol - 3.0;
        return {
          bucket: "3 < v ≤ 6",
          formula: "0.45 + 0.85×(v-3) + 0.22×(v-3)^2",
          substitution: `0.45 + 0.85×${fmt(d)} + 0.22×${fmt(d)}^2`
        };
      }

      const d = basketVol - 6.0;
      return {
        bucket: "v > 6",
        formula: "4.03 + 0.45×(v-6) - 0.04×(v-6)^2",
        substitution: `4.03 + 0.45×${fmt(d)} - 0.04×${fmt(d)}^2`
      };
    }

    function renderResult(r) {
      $("pricingBadge").className = badgeClass(r.pricing_view);
      $("pricingBadge").textContent = r.pricing_view;

      const sortedSwings = (r.short_swings || [])
        .map((v, idx) => ({ idx, v: num(v), symbol: r.symbols?.[idx] || "" }))
        .sort((a, b) => b.v - a.v);

      const rankMap = {};
      const roleMap = {};

      sortedSwings.forEach((x, i) => {
        rankMap[x.idx] = i + 1;
        if (i === 0) roleMap[x.idx] = "s1";
        else if (i === 1) roleMap[x.idx] = "s2";
        else roleMap[x.idx] = "avg only";
      });

      const s1 = sortedSwings[0]?.v || 0;
      const s2 = sortedSwings[1]?.v || 0;
      const avgSwing = sortedSwings.length
        ? sortedSwings.reduce((sum, x) => sum + x.v, 0) / sortedSwings.length
        : 0;

      const volAdjExplain = buildVolAdjExplain(r.basket_vol);

      const stockRows = (r.stock_sources || []).map((s, idx) => `
        <tr>
          <td>${idx + 1}</td>
          <td>${s.symbol || ""}</td>
          <td>${s.source || ""}</td>
          <td>${s.sector || ""}</td>
          <td>${s.subsector || ""}</td>
          <td>${s.risk || ""}</td>
          <td>${fmt(r.scores?.[idx])}</td>
          <td>${fmt(r.weaknesses?.[idx])}</td>
          <td>${fmt(r.short_swings?.[idx])}</td>
        </tr>
      `).join("");

      const swingRows = (r.short_swing_days || []).map((days, idx) => {
        const ds = Array.isArray(days) ? days : [];
        return `
          <tr>
            <td>${r.symbols?.[idx] || ""}</td>
            <td>${fmt(ds[0])}</td>
            <td>${fmt(ds[1])}</td>
            <td>${fmt(ds[2])}</td>
            <td>${fmt(ds[3])}</td>
            <td>${fmt(ds[4])}</td>
            <td>${fmt(ds[5])}</td>
            <td>${fmt(r.short_swings?.[idx])}</td>
            <td>${rankMap[idx] || ""}</td>
            <td>${roleMap[idx] || ""}</td>
          </tr>
        `;
      }).join("");

      const shortSwingExplainRows = (r.short_swing_days || []).map((days, idx) => `
        <tr>
          <td>${r.symbols?.[idx] || ""}</td>
          <td class="mono">${buildShortSwingFormula(days)}</td>
          <td>${fmt(r.short_swings?.[idx])}</td>
        </tr>
      `).join("");

      $("resultArea").innerHTML = `
        <div class="summary-grid">
          <div class="summary-box"><div class="k">Market Yield</div><div class="v">${fmt(r.market_yield)}%</div></div>
          <div class="summary-box"><div class="k">Fair Yield</div><div class="v">${fmt(r.fair_yield)}%</div></div>
          <div class="summary-box"><div class="k">Pricing Delta</div><div class="v">${fmt(r.pricing_delta)}%</div></div>
          <div class="summary-box"><div class="k">BasketVol / VolAdj</div><div class="v">${fmt(r.basket_vol)} / ${fmt(r.vol_adj)}%</div></div>
        </div>

        <div class="section-title">案例摘要</div>
        <table>
          <tbody>
            <tr><th>Case Name</th><td>${r.case_name}</td></tr>
            <tr><th>Symbols</th><td>${(r.symbols || []).join(", ")}</td></tr>
            <tr><th>KI / Strike / Tenor / Type</th><td>${fmt(r.KI)} / ${fmt(r.strike)} / ${fmt(r.tenor)} / ${r.type}</td></tr>
            <tr><th>Note</th><td>${r.note || "-"}</td></tr>
          </tbody>
        </table>

        <div class="section-title">Basket / Structure / Vol / Brake</div>
        <table>
          <thead>
            <tr>
              <th>Base</th>
              <th>BW</th>
              <th>BasketPremium</th>
              <th>TailAdj</th>
              <th>KIAdj</th>
              <th>TenorAdj</th>
              <th>StrikeAdj</th>
              <th>TypeAdj</th>
              <th>StructureTotal</th>
              <th>BasketVol</th>
              <th>VolAdj</th>
              <th>PreRate</th>
              <th>HighRateBrake</th>
              <th>FairYield</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>${fmt(r.base)}</td>
              <td>${fmt(r.BW)}</td>
              <td>${fmt(r.basket_premium)}</td>
              <td>${fmt(r.tail_adj)}</td>
              <td>${fmt(r.ki_adj)}</td>
              <td>${fmt(r.tenor_adj)}</td>
              <td>${fmt(r.strike_adj)}</td>
              <td>${fmt(r.type_adj)}</td>
              <td>${fmt(r.structure_total)}</td>
              <td>${fmt(r.basket_vol)}</td>
              <td>${fmt(r.vol_adj)}</td>
              <td>${fmt(r.pre_rate)}</td>
              <td>${fmt(r.high_rate_brake)}</td>
              <td>${fmt(r.fair_yield)}</td>
            </tr>
          </tbody>
        </table>

        <div class="section-title">股票明細</div>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Symbol</th>
              <th>Source</th>
              <th>Sector</th>
              <th>Subsector</th>
              <th>Risk</th>
              <th>Today Score</th>
              <th>Weakness</th>
              <th>ShortSwing</th>
            </tr>
          </thead>
          <tbody>
            ${stockRows || `<tr><td colspan="9">無資料</td></tr>`}
          </tbody>
        </table>

        <div class="section-title">6日振幅輸入</div>
        <table>
          <thead>
            <tr>
              <th>Symbol</th>
              <th>d0</th>
              <th>d1</th>
              <th>d2</th>
              <th>d3</th>
              <th>d4</th>
              <th>d5</th>
              <th>ShortSwing</th>
              <th>Vol Rank</th>
              <th>Basket Role</th>
            </tr>
          </thead>
          <tbody>
            ${swingRows || `<tr><td colspan="10">無資料</td></tr>`}
          </tbody>
        </table>

        <div class="section-title">綜合說明</div>
        <div class="explain-box">
          <div class="row">
            <div class="label">ShortSwing 公式</div>
            <div class="mono">ShortSwing = 0.35×d0 + 0.25×d1 + 0.15×d2 + 0.10×d3 + 0.08×d4 + 0.07×d5</div>
          </div>

          <div class="row">
            <div class="label">各股 ShortSwing 計算過程</div>
            <table>
              <thead>
                <tr>
                  <th>Symbol</th>
                  <th>計算式</th>
                  <th>結果</th>
                </tr>
              </thead>
              <tbody>
                ${shortSwingExplainRows || `<tr><td colspan="3">無資料</td></tr>`}
              </tbody>
            </table>
          </div>

          <div class="row">
            <div class="label">BasketVol 計算過程</div>
            <div class="mono">排序後 ShortSwing：${sortedSwings.map(x => `${x.symbol}:${fmt(x.v)}`).join(" , ") || "-"}</div>
            <div class="mono">s1 = ${fmt(s1)}, s2 = ${fmt(s2)}, avg = ${fmt(avgSwing)}</div>
            <div class="mono">BasketVol = 0.5×${fmt(s1)} + 0.3×${fmt(s2)} + 0.2×${fmt(avgSwing)} = ${fmt(r.basket_vol)}</div>
          </div>

          <div class="row">
            <div class="label">VolAdj 計算過程</div>
            <div class="mono">BasketVol = ${fmt(r.basket_vol)}，落在區間：${volAdjExplain.bucket}</div>
            <div class="mono">公式：${volAdjExplain.formula}</div>
            <div class="mono">代入：${volAdjExplain.substitution}</div>
            <div class="mono">VolAdj = ${fmt(r.vol_adj)}</div>
          </div>
        </div>
      `;
    }

    function renderHistory() {
      const store = getInquiryStore().slice().sort((a, b) => (b.inquiry_no || "").localeCompare(a.inquiry_no || ""));
      const box = $("historyList");

      if (!store.length) {
        box.innerHTML = "尚無資料";
        return;
      }

      box.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>詢價單號</th>
              <th>日期</th>
              <th>Case</th>
              <th>Symbols</th>
              <th>Yield</th>
              <th>Fair</th>
            </tr>
          </thead>
          <tbody>
            ${store.map((r, idx) => `
              <tr class="clickable-row" data-load-index="${idx}">
                <td>${r.inquiry_no || ""}</td>
                <td>${r.inquiry_date || ""}</td>
                <td>${r.case_name || ""}</td>
                <td>${(r.symbols || []).join("|")}</td>
                <td>${r.marketYield != null ? fmt(r.marketYield) : "-"}</td>
                <td>${r.result?.fair_yield != null ? fmt(r.result.fair_yield) : "-"}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;

      box.querySelectorAll("[data-load-index]").forEach((tr) => {
        tr.addEventListener("click", () => {
          const idx = Number(tr.getAttribute("data-load-index"));
          loadHistoryBySortedIndex(idx);
        });
      });
    }

    function renderBasketCompare(symbols = null) {
      const store = getInquiryStore();
      const box = $("basketCompare");

      if (!store.length) {
        box.innerHTML = "尚無資料";
        return;
      }

      let basketKey = null;

      if (symbols && symbols.length) {
        basketKey = normalizeBasket(symbols);
      } else {
        const currentSymbols = parseSymbols($("symbols").value);
        if (currentSymbols.length) basketKey = normalizeBasket(currentSymbols);
      }

      if (!basketKey) {
        box.innerHTML = "尚無資料";
        return;
      }

      const rows = store
        .filter(x => x.basket_key === basketKey)
        .sort((a, b) => String(a.inquiry_date).localeCompare(String(b.inquiry_date)));

      if (!rows.length) {
        box.innerHTML = "尚無資料";
        return;
      }

      box.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>單號</th>
              <th>Market</th>
              <th>Fair</th>
              <th>BasketVol</th>
              <th>VolAdj</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${r.inquiry_date || ""}</td>
                <td>${r.inquiry_no || ""}</td>
                <td>${r.marketYield != null ? fmt(r.marketYield) : "-"}</td>
                <td>${r.result?.fair_yield != null ? fmt(r.result.fair_yield) : "-"}</td>
                <td>${r.result?.basket_vol != null ? fmt(r.result.basket_vol) : "-"}</td>
                <td>${r.result?.vol_adj != null ? fmt(r.result.vol_adj) : "-"}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function fillSingleFormFromRecord(r) {
      $("caseName").value = r.case_name || "Case 1";
      $("symbols").value = (r.symbols || []).join(",");
      $("ki").value = r.KI ?? 0;
      $("strike").value = r.Strike ?? 0;
      $("tenor").value = r.T ?? 0;
      $("type").value = r.type || "EKI";
      $("marketYield").value = r.marketYield ?? 0;
      $("inputMode").value = "single";
      setupInputMode();
    }

    function loadHistoryBySortedIndex(sortedIndex) {
      const sorted = getInquiryStore().slice().sort((a, b) => (b.inquiry_no || "").localeCompare(a.inquiry_no || ""));
      const r = sorted[sortedIndex];
      if (!r) return;

      fillSingleFormFromRecord(r);
      renderBasketCompare(r.symbols || []);

      if (r.result) {
        $("pricingBadge").className = badgeClass(r.result.pricing_view || "合理");
        $("pricingBadge").textContent = r.result.pricing_view || "已載入";
      }
    }

    async function saveCurrentRun(result, payload) {
      const inquiryDate = $("inquiryDate").value || todayStr();
      const inquiryNo = generateInquiryNo(inquiryDate);

      const row = {
        inquiry_date: inquiryDate,
        inquiry_no: inquiryNo,
        case_name: payload.caseName,
        symbols: payload.symbols,
        KI: payload.KI,
        Strike: payload.Strike,
        T: payload.T,
        type: payload.type,
        marketYield: payload.marketYield,
        basket_key: normalizeBasket(payload.symbols),
        created_at: new Date().toISOString(),
        result: {
          fair_yield: result.fair_yield,
          basket_vol: result.basket_vol,
          vol_adj: result.vol_adj,
          pricing_view: result.pricing_view,
          scores: result.scores,
          short_swings: result.short_swings,
          pricing_delta: result.pricing_delta
        }
      };

      const store = getInquiryStore();
      store.push(row);
      saveInquiryStore(store);

      $("inquiryNo").value = inquiryNo;
      refreshInquiryNo();
      renderHistory();
      renderBasketCompare(payload.symbols);
    }

    async function runCase() {
      try {
        const payload = {
          caseName: $("caseName").value.trim() || "Case 1",
          symbols: parseSymbols($("symbols").value),
          KI: num($("ki").value),
          Strike: num($("strike").value),
          T: num($("tenor").value),
          type: $("type").value,
          marketYield: num($("marketYield").value)
        };

        const result = await runM8Case(payload);
        renderResult(result);
        await saveCurrentRun(result, payload);

      } catch (err) {
        $("pricingBadge").className = "pill bad";
        $("pricingBadge").textContent = "執行失敗";
        $("resultArea").innerHTML = `<div class="empty" style="color:#b42318;">${err.message || err}</div>`;
      }
    }

    function importBatchInquiry() {
      const inquiryDate = $("inquiryDate").value || todayStr();
      const rows = parseBatchText($("batchInput").value, inquiryDate);

      if (!rows.length) {
        alert("沒有可匯入的資料");
        return;
      }

      const store = getInquiryStore();
      store.push(...rows);
      saveInquiryStore(store);

      renderHistory();
      refreshInquiryNo();
      alert(`已匯入 ${rows.length} 筆詢價單`);
    }

    function setupInputMode() {
      const mode = $("inputMode").value;
      $("singleInputPanel").style.display = mode === "single" ? "block" : "none";
      $("batchInputPanel").style.display = mode === "batch" ? "block" : "none";
    }

    function loadDemo() {
      $("caseName").value = "Case Demo";
      $("symbols").value = "ARM,GOOG,INTC,TSM";
      $("ki").value = 60;
      $("strike").value = 70;
      $("tenor").value = 6;
      $("type").value = "EKI";
      $("marketYield").value = 23.35;
      $("inputMode").value = "single";
      setupInputMode();
      renderBasketCompare(parseSymbols($("symbols").value));
    }

    function clearResult() {
      $("pricingBadge").className = "pill ok";
      $("pricingBadge").textContent = "尚未執行";
      $("resultArea").innerHTML = `<div class="empty">請先輸入案例後，按「執行 M8 並留存」</div>`;
    }

    document.addEventListener("DOMContentLoaded", () => {
      console.log("m8_batch html loaded");

      $("inquiryDate").value = todayStr();
      refreshInquiryNo();

      renderBlueprint();
      setupBlueprintToggle();
      renderHistory();
      renderBasketCompare();
      setupInputMode();

      $("inquiryDate").addEventListener("change", refreshInquiryNo);
      $("inputMode").addEventListener("change", setupInputMode);

      $("runBtn").addEventListener("click", runCase);
      $("demoBtn").addEventListener("click", loadDemo);
      $("clearBtn").addEventListener("click", clearResult);
      $("importBatchBtn").addEventListener("click", importBatchInquiry);

      ["symbols", "ki", "strike", "tenor", "type", "marketYield"].forEach(id => {
        const el = $(id);
        if (el) {
          el.addEventListener("change", () => {
            renderBasketCompare(parseSymbols($("symbols").value));
          });
        }
      });
    });
  </script>
</body>
</html>
