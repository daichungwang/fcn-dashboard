<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M8 FCN 系統</title>

  <style>
    body { margin:0; padding:20px; font-family: Arial; background:#f5f7fb; }
    .grid { display:grid; grid-template-columns:420px 1fr; gap:16px; }
    .card { background:#fff; padding:16px; border-radius:12px; }
    table { width:100%; border-collapse:collapse; }
    th,td { border:1px solid #ddd; padding:6px; }
    textarea,input,select { width:100%; padding:8px; }
    button { padding:8px 12px; cursor:pointer; }
    .section-title { margin-top:12px; font-weight:bold; }
  </style>
</head>

<body>

<h1>M8 FCN 系統</h1>

<div class="grid">

  <!-- 左側 -->
  <div class="card">

    <div>
      <label>日期</label>
      <input id="inquiryDate" type="date">
    </div>

    <div>
      <label>詢價單號</label>
      <input id="inquiryNo" readonly>
    </div>

    <div>
      <label>模式</label>
      <select id="inputMode">
        <option value="single">單筆</option>
        <option value="batch">整批</option>
      </select>
    </div>

    <!-- 單筆 -->
    <div id="singlePanel">
      <input id="caseName" placeholder="Case name">
      <textarea id="symbols"></textarea>
      <input id="ki">
      <input id="strike">
      <input id="tenor">
      <select id="type">
        <option>EKI</option>
        <option>AKI</option>
      </select>
      <input id="marketYield">

      <button id="runBtn">Run</button>
    </div>

    <!-- 批次 -->
    <div id="batchPanel" style="display:none">
      <textarea id="batchInput"></textarea>
      <button id="importBtn">Import</button>
    </div>

    <div class="section-title">歷史</div>
    <div id="historyList"></div>

    <div class="section-title">Basket比較</div>
    <div id="basketCompare"></div>

  </div>

  <!-- 右側 -->
  <div class="card">
    <div id="resultArea"></div>
  </div>

</div>

<script type="module" src="./js/m8/m8_entry.js"></script>

</body>
</html>
