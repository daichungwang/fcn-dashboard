  <script>
  (function(){if(window.__M2_MARKET_HISTORY_WINDOW_V080__)return;window.__M2_MARKET_HISTORY_WINDOW_V080__=true;var STORAGE_KEY='m2_market_history_window_days_v080';var currentMode=localStorage.getItem(STORAGE_KEY)||'2';var rawCache=null;function normalizeMode(v){v=String(v||'2').toLowerCase();return v==='2'||v==='5'||v==='all'?v:'2'}currentMode=normalizeMode(currentMode);localStorage.setItem(STORAGE_KEY,currentMode);function getRowDate(row){return row&&(row.generated_at||row.date||row.trade_date||row.quote_date||row.created_at||row.updated_at)}function dateKey(v){if(!v)return'';var s=String(v);var m=s.match(/\d{4}-\d{2}-\d{2}/);if(m)return m[0];var d=new Date(v);if(Number.isNaN(d.getTime()))return'';return d.toISOString().slice(0,10)}function latestDateKeys(rows,count){var keys=Array.from(new Set((Array.isArray(rows)?rows:[]).map(getRowDate).map(dateKey).filter(Boolean)));keys.sort().reverse();return keys.slice(0,Number(count)||0)}function filterRows(rows,mode){rows=Array.isArray(rows)?rows:[];mode=normalizeMode(mode);if(mode==='all')return rows.slice();var keys=latestDateKeys(rows,Number(mode));if(!keys.length)return rows.slice();var allow=new Set(keys);return rows.filter(function(row){var k=dateKey(getRowDate(row));return !k||allow.has(k)})}function modeLabel(mode){mode=normalizeMode(mode);return mode==='2'?'最新2個日期':mode==='5'?'最新5個日期':'ALL'}function refreshActiveButtons(){document.querySelectorAll('[data-m2-window]').forEach(function(btn){btn.classList.toggle('m2-window-active',normalizeMode(btn.getAttribute('data-m2-window'))===currentMode)});var hint=document.getElementById('m2MarketWindowHintV080');if(hint)hint.textContent=(currentMode==='all'?'ALL':modeLabel(currentMode))+'｜2日 = market_fcn_history 內最新2個不同日期，不用日曆連續日。'}var nativeFetch=window.fetch.bind(window);window.fetch=function(input,init){var url=typeof input==='string'?input:(input&&input.url)||'';var isMarketHistory=url.indexOf('data/mm/market_fcn_history.json')>=0||url.indexOf('market_fcn_history.json')>=0;if(!isMarketHistory)return nativeFetch(input,init);return nativeFetch(input,init).then(function(resp){return resp.clone().json().then(function(data){rawCache=Array.isArray(data)?data:(data&&Array.isArray(data.rows)?data.rows:[]);var filtered=filterRows(rawCache,currentMode);var body=Array.isArray(data)?filtered:Object.assign({},data,{rows:filtered,_window_filter:{mode:currentMode,label:modeLabel(currentMode),selected_dates:latestDateKeys(rawCache,currentMode==='all'?999:Number(currentMode)),raw_count:rawCache.length,filtered_count:filtered.length}});return new Response(JSON.stringify(body),{status:resp.status,statusText:resp.statusText,headers:{'Content-Type':'application/json'}})}).catch(function(){return resp})})};function hardReloadMarketModule(){var run=document.getElementById('runBtn');if(run)run.click();setTimeout(function(){var active=document.querySelector('.menu-btn[data-module="market"]');if(active)active.click();},120)}function injectPanel(){var market=document.getElementById('m2MarketFcnSubnav');if(!market)return;var box=document.getElementById('m2MarketWindowFilterV080');if(!box){box=document.createElement('div');box.id='m2MarketWindowFilterV080';box.style.cssText='margin-top:8px;padding:8px;border:1px solid #dbeafe;background:#f8fbff;border-radius:12px;display:grid;gap:6px;';box.innerHTML='<div style="font-size:12px;font-weight:950;color:#334155">History Data Window</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px"><button type="button" data-m2-window="2" class="m2-hz-subnav-btn">2日</button><button type="button" data-m2-window="5" class="m2-hz-subnav-btn">5日</button><button type="button" data-m2-window="all" class="m2-hz-subnav-btn">ALL</button></div><div id="m2MarketWindowHintV080" style="font-size:11px;color:#64748b;line-height:1.4"></div>';market.appendChild(box);box.addEventListener('click',function(ev){var btn=ev.target.closest('[data-m2-window]');if(!btn)return;ev.preventDefault();ev.stopPropagation();currentMode=normalizeMode(btn.getAttribute('data-m2-window'));localStorage.setItem(STORAGE_KEY,currentMode);refreshActiveButtons();hardReloadMarketModule();});}refreshActiveButtons()}document.addEventListener('DOMContentLoaded',injectPanel);document.addEventListener('click',function(){setTimeout(injectPanel,120)},true);new MutationObserver(injectPanel).observe(document.documentElement,{childList:true,subtree:true});setTimeout(injectPanel,200)})();
  </script>
