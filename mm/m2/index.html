<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MM / M2 作戰中心｜FCN Cockpit</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#f5f6f8;color:#111;font-family:Arial,'Microsoft JhengHei',sans-serif}
    .page{max-width:1540px;margin:0 auto;padding:18px 14px 64px}
    h1{margin:0;font-size:30px;letter-spacing:.2px}h2{margin:0;font-size:21px}h3{margin:0 0 10px;font-size:16px}.subtitle{color:#555;line-height:1.55;font-size:14px;margin-top:6px}.muted{color:#666;font-size:13px}.bad{color:#c62828}.good{color:#188b58}.warn{color:#b9770e}
    .topbar{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn,button{border:0;border-radius:10px;padding:9px 12px;background:#111;color:#fff;font-weight:800;cursor:pointer;text-decoration:none;font-size:13px}.light{background:#e9ecef;color:#111;border:1px solid #d8dde6}.secondary{background:#666;color:#fff}
    .card{background:#fff;border:1px solid #ddd;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.03)}.note{font-size:13px;background:#fffbe6;border:1px solid #f1df9a;border-radius:10px;padding:10px;line-height:1.6}.decision-note{font-size:14px;background:#f8fbff;border:1px solid #dbeafe;border-radius:12px;padding:12px;margin-top:10px;line-height:1.7}
    .dashboard{display:none;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}.dashboard.m2-dashboard-open{display:grid}.kpi{position:relative;overflow:hidden;border:1px solid #e5e7eb;border-radius:18px;padding:13px 13px 13px 15px;background:linear-gradient(135deg,#fff,#f8fafc);box-shadow:0 10px 20px rgba(15,23,42,.06)}.kpi:before{content:"";position:absolute;left:0;top:0;width:6px;height:100%;background:var(--accent,#64748b)}.kpi-label{font-size:12px;color:#64748b;font-weight:900}.kpi-value{font-size:24px;font-weight:950;margin-top:4px}.kpi-sub{font-size:12px;color:#667085;margin-top:4px;line-height:1.4}.mini-stack{display:grid;gap:5px;margin-top:8px}.mini-line{height:7px;background:#eef2f7;border-radius:999px;overflow:hidden}.mini-line span{display:block;height:100%;background:var(--bar,#111);border-radius:999px}.kpi-chip{display:inline-block;margin-right:4px;margin-top:5px;border-radius:999px;padding:3px 7px;font-size:11px;font-weight:900;background:#eef2ff;color:#1e3a8a}
    .cockpit{display:grid;grid-template-columns:250px 1fr;gap:14px;align-items:start}.side{position:sticky;top:12px}.menu{display:grid;gap:8px}.menu-btn{text-align:left;width:100%;background:#f8fafc;color:#111;border:1px solid #e2e8f0;border-radius:14px;padding:12px}.menu-btn.active{background:#111;color:#fff;border-color:#111}.menu-title{font-weight:950}.menu-sub{font-size:12px;opacity:.75;margin-top:4px;line-height:1.35}.m2-hz-subnav{display:none;margin:-2px 0 4px 10px;padding:8px 8px 8px 10px;border-left:3px solid #111;background:#f8fafc;border-radius:0 12px 12px 0}.m2-hz-subnav.show{display:grid;gap:6px}.m2-hz-subnav-title{font-size:12px;font-weight:950;color:#334155;margin-bottom:2px}.m2-hz-subnav-btn{width:100%;text-align:left;border:1px solid #d8dde6;background:#fff;color:#111!important;border-radius:10px;padding:7px 9px;font-size:12px;font-weight:900;box-shadow:none}.m2-hz-subnav-btn:hover{background:#111;color:#fff!important;border-color:#111}.m2-hz-subnav-btn.action{background:#eef2ff;border-color:#c7d2fe;color:#1e3a8a!important}.m2-hz-subnav-btn.action:hover{background:#1e3a8a;color:#fff!important}.main{display:grid;gap:14px}.detail-grid{display:grid;grid-template-columns:1.05fr 1.25fr;gap:14px}.detail-panel,.query-panel{min-height:260px}.panel-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}.query-panel{min-height:430px}.module-title{font-size:20px;font-weight:950}.module-sub{font-size:13px;color:#666;margin-top:3px;line-height:1.45}
    .flow-panel{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.flow-card{position:relative;overflow:hidden;border:1px solid #e5e7eb;border-radius:16px;padding:12px;background:#fff}.flow-card:before,.mini-metric:before{content:"";position:absolute;left:0;top:0;width:5px;height:100%;background:var(--accent,#64748b)}.flow-label{font-size:12px;color:#64748b;font-weight:900}.flow-value{font-size:22px;font-weight:950;margin-top:4px}.flow-sub{font-size:12px;color:#667085;margin-top:4px;line-height:1.4}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.panel{border:1px solid #e5e7eb;border-radius:14px;padding:12px;background:#fff}.list-card{border:1px solid #eee;border-radius:12px;padding:10px;margin:8px 0;background:#fafafa;font-size:13px;line-height:1.55}.list-card b{font-size:14px}.cash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.cash-card{border:1px solid #e5e7eb;border-radius:16px;padding:14px;background:#fff;min-height:160px}.cash-title{font-weight:900;margin-bottom:8px}
    .broker-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.broker-card{border:1px solid #e5e7eb;border-radius:16px;padding:13px;background:linear-gradient(135deg,#fff,#f8fafc)}.broker-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}.broker-avail{font-size:23px;font-weight:950;color:#0f766e}.broker-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.mini-metric{position:relative;overflow:hidden;border:1px solid #eee;border-radius:12px;padding:10px 9px 10px 13px;background:#fff}.metric-title{font-size:12px;color:#666}.metric-main{font-size:15px;font-weight:900;margin-top:4px}.metric-sub{font-size:12px;color:#666;margin-top:3px;line-height:1.35}
    .alloc-layout{display:grid;grid-template-columns:260px 1fr 1fr;gap:12px;align-items:start}.pie{width:180px;height:180px;border-radius:50%;margin:14px auto;border:8px solid #fff;box-shadow:inset -12px -16px 24px rgba(0,0,0,.13),0 14px 24px rgba(15,23,42,.14)}.legend-row,.alloc-row{display:grid;grid-template-columns:1fr auto;gap:8px;border-bottom:1px solid #eee;padding:8px 0;font-size:13px}.legend-dot{display:inline-block;width:10px;height:10px;border-radius:999px;margin-right:6px}.alloc-row{grid-template-columns:1.1fr 1fr}.bar{height:8px;background:#eef2f7;border-radius:999px;overflow:hidden;margin-top:5px}.bar span{display:block;height:100%;background:var(--bar,#111);border-radius:999px}.interpret-box{border:1px solid #dbeafe;background:#f8fbff;border-radius:14px;padding:12px;margin-bottom:10px;line-height:1.65;font-size:13px}.interpret-title{font-weight:900;margin-bottom:4px}
    .table-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.table-tools input,.table-tools select{border:1px solid #cbd5e1;border-radius:10px;padding:8px 10px;background:#fff;min-width:160px}.table-wrap{overflow:auto;border:1px solid #e5e5e5;border-radius:14px}table{width:100%;border-collapse:collapse;min-width:1080px}th,td{border-bottom:1px solid #eee;padding:8px;text-align:left;white-space:nowrap;font-size:13px}th{background:#fafafa;color:#555;position:sticky;top:0}.row-bad{background:#fff7f7}.row-warn{background:#fffdf7}.row-good{background:#fbfffb}.pill{display:inline-block;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;border:1px solid #ddd;background:#fafafa}.pill-good{background:#ecfff1;color:#188b58;border-color:#a9e2b4}.pill-warn{background:#fff7e8;color:#b9770e;border-color:#f0d298}.pill-bad{background:#fff0f0;color:#c62828;border-color:#f1b5b5}.pill-blue{background:#eef6ff;color:#1e3a8a;border-color:#cfe1ff}
    .zone-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.zone-card{border:1px solid #e5e7eb;border-radius:16px;padding:13px;background:#fff;min-height:150px}.zone-card.danger{background:#fff7f7;border-color:#f1b5b5}.zone-card.watch{background:#fffaf0;border-color:#ecd7a3}.zone-card.good{background:#f5fff7;border-color:#b9e2c0}.zone-card.blue{background:#f0fdfa;border-color:#99f6e4}.zone-num{font-size:24px;font-weight:950;margin:5px 0}.hidden-detail{margin-top:8px;padding-top:8px;border-top:1px dashed #ddd;color:#555;font-size:12px;line-height:1.45}.zone-card .pill{margin-top:6px}.compact-fcn{display:grid;grid-template-columns:1.2fr auto auto auto;gap:8px;align-items:center;border-bottom:1px solid #eee;padding:8px 0;font-size:13px}.compact-fcn:last-child{border-bottom:0}.compact-main{font-weight:900}.compact-sub{color:#666;font-size:12px;margin-top:2px}.compact-amt{font-weight:900}.detail-toggle{background:#f1f5f9;color:#111;border:1px solid #d8dde6;padding:5px 8px;border-radius:9px}.fcn-more{display:none;grid-column:1/-1;background:#fbfdff;border:1px dashed #dbeafe;border-radius:10px;padding:8px;line-height:1.55;color:#444}.compact-fcn.open .fcn-more{display:block}
    @media(max-width:1180px){.dashboard{grid-template-columns:repeat(3,1fr)}.cockpit,.detail-grid{grid-template-columns:1fr}.side{position:static}.alloc-layout,.broker-grid,.zone-grid{grid-template-columns:1fr}.flow-panel,.grid-3,.grid-2,.cash-grid{grid-template-columns:1fr}}@media(max-width:680px){.dashboard{grid-template-columns:1fr}.toolbar{flex-direction:column;align-items:stretch}.btn,button{width:100%}.compact-fcn{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>MM / M2 作戰中心｜FCN Cockpit</h1>
        <div class="subtitle">新版 M2 = 舊 M2 Health + M2 Planner + 市場單分析 + Pool 作業。版型：上方 dashboard、左側主選單、右側明細、下方大型查詢區。</div>
      </div>
      <div class="toolbar">
        <button id="runBtn">執行</button>
        <button class="light" id="reloadBtn">重新載入</button>
        <a class="btn light" href="../../m2.html">舊 M2</a>
        <a class="btn light" href="../../m2_planner.html">Planner</a>
        <a class="btn light" href="../engine_progress_dashboard.html">MM</a>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div id="runtimeMeta" class="muted">尚未執行</div>
    </div>

    <div id="topDashboard" class="dashboard"></div>

    <div class="cockpit">
      <aside class="card side">
        <h3>M2 主選單</h3>
        <div class="menu">
          <button class="menu-btn active" data-module="summary"><div class="menu-title">1. Summary Dashboard</div><div class="menu-sub">資金水位 / 配置 / 健康 / 預計出場</div></button>
          <button class="menu-btn" data-module="zones"><div class="menu-title">2. Holding Zones</div><div class="menu-sub">到期專區 / 預計提前到期 / Danger / Watch</div></button>
          <div id="m2HoldingZonesSubnav" class="m2-hz-subnav">
            <div class="m2-hz-subnav-title">Holding Zones 快速導航</div>
            <button class="m2-hz-subnav-btn" data-hz-nav="exit" type="button">📌 到期專區</button>
            <button class="m2-hz-subnav-btn" data-hz-nav="danger" type="button">🚨 Danger</button>
            <button class="m2-hz-subnav-btn" data-hz-nav="watch" type="button">⚠️ Watch</button>
            <button class="m2-hz-subnav-btn" data-hz-nav="healthy" type="button">✅ Healthy</button>
            <button class="m2-hz-subnav-btn action" data-hz-action="expand-all" type="button">全部展開</button>
            <button class="m2-hz-subnav-btn action" data-hz-action="collapse-all" type="button">全部收合</button>
            <button class="m2-hz-subnav-btn action" data-hz-action="risk-only" type="button">只展開風險</button>
          </div>
          <button class="menu-btn" data-module="planning"><div class="menu-title">3. Maturity Cashflow</div><div class="menu-sub">Planner A/B/C/D/E0</div></button>
          <div id="m2MaturityCashflowSubnav" class="m2-hz-subnav">
            <div class="m2-hz-subnav-title">Maturity Cashflow 快速導航</div>
            <button class="m2-hz-subnav-btn action" data-planner-action="toggle-dashboard" type="button">Dashboard 展開 / 收合</button>
            <button class="m2-hz-subnav-btn" data-planner-nav="decision" type="button">Planner Decision</button>
            <button class="m2-hz-subnav-btn" data-planner-nav="cash" type="button">A. 本月可用資金</button>
            <button class="m2-hz-subnav-btn" data-planner-nav="bank" type="button">B. 銀行資金水位</button>
            <button class="m2-hz-subnav-btn" data-planner-nav="alloc" type="button">配置重建</button>
            <button class="m2-hz-subnav-btn" data-planner-nav="detail" type="button">FCN 明細</button>
            <button class="m2-hz-subnav-btn" data-planner-nav="hard" type="button">Hard Release</button>
            <button class="m2-hz-subnav-btn" data-planner-nav="soft" type="button">Soft Candidate</button>
            <button class="m2-hz-subnav-btn" data-planner-nav="base" type="button">Planning Base</button>
          </div>
          <button class="menu-btn" data-module="market"><div class="menu-title">4. Market FCN Analysis</div><div class="menu-sub">市場單分析與推薦</div></button>
          <button class="menu-btn" data-module="management"><div class="menu-title">5. FCN / Stock Management</div><div class="menu-sub">FCN 查詢 + 股票風險</div></button>
          <button class="menu-btn" data-module="pool"><div class="menu-title">6. Pool Manual Ops</div><div class="menu-sub">手動建新單 / 編輯 / 匯出</div></button>
        </div>
      </aside>

      <main class="main">
        <div class="detail-grid">
          <section class="card detail-panel">
            <div class="panel-title"><div><div id="activeTitle" class="module-title">1. Summary Dashboard</div><div id="activeSub" class="module-sub">資金水位 / 配置 / 健康 / 預計出場</div></div></div>
            <div id="rightDetail"></div>
          </section>

          <section class="card detail-panel">
            <div class="panel-title"><div><div class="module-title">模組重點判讀</div><div class="module-sub">把結果說成人話，避免只看表格。</div></div></div>
            <div id="rightInsight"></div>
          </section>
        </div>

        <section class="card query-panel">
          <div class="panel-title"><div><div id="bottomTitle" class="module-title">大型資訊查詢區</div><div id="bottomSub" class="module-sub">依左側主選單切換卡片、明細與表格。</div></div></div>
          <div id="bottomQuery"></div>
        </section>
      </main>
    </div>
  </div>
  <script src="../../js/mm/modules/m8_overlay_engine_v1.js"></script>
  <script src="../../js/mm/modules/m8_regression_engine_v1.js"></script>
  <script src="../../js/mm/m2/m8_single_ui_mirror.js?v=20260515_v105"></script>
  <script type="module" src="./m2_mm_engine.js?v=20260515_v055"></script>
</body>
</html>
