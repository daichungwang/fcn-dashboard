<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<base href="../" />
<title>MM System Operations & Evolution Center</title>
<style>
:root{--bg:#f4f6f8;--panel:#fff;--ink:#142033;--muted:#667085;--line:#d7dee8;--green:#057a55;--blue:#2563eb;--amber:#b7791f;--red:#b91c1c;--gray:#475467;--soft-green:#ecfdf3;--soft-blue:#eff6ff;--soft-amber:#fffbeb;--soft-red:#fef3f2;--soft-gray:#f8fafc;--shadow:0 6px 18px rgba(16,24,40,.06)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,"Microsoft JhengHei","Noto Sans TC",sans-serif}.page{max-width:1560px;margin:0 auto;padding:18px 16px 40px}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:12px}h1{font-size:28px;margin:0}.subtitle{font-size:14px;color:var(--muted);line-height:1.55;margin-top:6px;max-width:980px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}a.btn,button{border:1px solid #cbd5e1;border-radius:8px;background:#172033;color:#fff;padding:8px 11px;text-decoration:none;font-weight:800;cursor:pointer}button.ghost,a.btn.light,button.light{background:#fff;color:#172033}.card,.kpi,.module-btn{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.card{padding:14px}.grid{display:grid;gap:12px}.summary-grid{grid-template-columns:repeat(5,1fr);margin-bottom:12px}.console{display:grid;grid-template-columns:300px 1fr;gap:12px;align-items:start}.left-nav{position:sticky;top:12px}.module-list{display:grid;gap:8px}.module-btn{width:100%;text-align:left;padding:11px;background:#fff;cursor:pointer}.module-btn.active{border-color:#2563eb;background:#eff6ff}.module-name{font-weight:900}.module-meta{font-size:12px;color:var(--muted);line-height:1.45;margin-top:4px}.bottom-panel{margin-top:12px}.kpi{padding:13px}.kpi-label{font-size:12px;color:var(--muted);font-weight:900}.kpi-value{font-size:26px;font-weight:950;margin-top:5px}.kpi-note{font-size:12px;color:var(--muted);line-height:1.45;margin-top:4px}.section-title{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}h2{font-size:18px;margin:0}h3{font-size:14px;margin:0 0 8px}.small{font-size:12px;color:var(--muted);line-height:1.55}.pill{display:inline-flex;align-items:center;border:1px solid #d8dee8;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;background:#f8fafc;white-space:nowrap}.pill.p0,.pill.critical,.pill.failed{color:var(--red);background:var(--soft-red);border-color:#fecaca}.pill.p1,.pill.watch,.pill.observation,.pill.pending,.pill.waiting_approval{color:var(--amber);background:var(--soft-amber);border-color:#f1d99b}.pill.p2,.pill.runtime,.pill.evolution,.pill.executing,.pill.verifying{color:var(--blue);background:var(--soft-blue);border-color:#bfdbfe}.pill.p3,.pill.future,.pill.maintenance,.pill.onboarding,.pill.not_started{color:var(--gray);background:var(--soft-gray);border-color:#d8dee8}.pill.good,.pill.ok,.pill.completed,.pill.passed{color:var(--green);background:var(--soft-green);border-color:#b7ead3}.table-wrap{overflow:auto;max-height:560px;border:1px solid var(--line);border-radius:8px}table{width:100%;min-width:1380px;border-collapse:collapse;background:#fff}th,td{border-bottom:1px solid #edf1f7;padding:8px;text-align:left;vertical-align:top;font-size:12px}th{position:sticky;top:0;background:#f8fafc;color:#344054;z-index:1}.explain{background:#f8fbff;border:1px solid #dbeafe;border-radius:8px;padding:12px;line-height:1.75;font-size:14px}.error{background:#fef3f2;border:1px solid #fecaca;color:#991b1b;border-radius:8px;padding:12px;margin-bottom:12px}ul.clean{margin:0;padding-left:18px;line-height:1.65}.raw-tools{display:grid;grid-template-columns:310px 1fr;gap:12px}.searchbox{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:10px;font-size:14px}pre{margin:0;white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e2e8f0;border-radius:8px;padding:12px;max-height:360px;overflow:auto;font-size:12px;line-height:1.5}.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.mini{padding:6px 8px;font-size:12px}.module-panel{display:grid;gap:12px}.three{grid-template-columns:repeat(3,1fr)}@media(max-width:1180px){.topbar{display:block}.toolbar{margin-top:10px;justify-content:flex-start}.summary-grid,.console,.raw-tools,.three{grid-template-columns:1fr}.left-nav{position:static}}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div>
      <h1>MM System Operations & Evolution Center</h1>
      <div class="subtitle">Focused layout：頂部只保留今日 5 個 action KPI；Today Action Center 與 System Summary 已移入 modules。</div>
    </div>
    <div class="toolbar">
      <button id="reloadBtn" class="light" type="button">Reload</button>
      <a class="btn light" href="docs/codegraph/mm_operation_queue_design.md" target="_blank">Design Doc</a>
      <a class="btn light" href="data/mm/mm_operation_queue.json" target="_blank">Center JSON</a>
    </div>
  </div>
  <div id="errorBox"></div>
  <section class="grid summary-grid" id="summary"></section>
  <main class="console">
    <aside class="card left-nav">
      <div class="section-title"><div><h2>Modules</h2><div class="small">第一個是今日行動中心，第二個是系統摘要。</div></div></div>
      <div class="module-list" id="moduleList"></div>
    </aside>
    <section class="card">
      <div class="section-title">
        <div><h2 id="moduleTitle">Selected Module Details</h2><div class="small" id="moduleSubtitle"></div></div>
        <div id="moduleStatus"></div>
      </div>
      <div id="moduleContent"></div>
    </section>
  </main>
  <section class="card bottom-panel">
    <div class="section-title"><div><h2>Raw Data / JSON / Search / Logs</h2><div class="small">底部保留原始資料、搜尋與操作紀錄。</div></div></div>
    <div class="raw-tools"><div><input id="searchBox" class="searchbox" type="search" placeholder="Search operation / type / status / action" /><div class="explain" style="margin-top:10px" id="logsBox"></div></div><pre id="rawJson"></pre></div>
  </section>
</div>
<script>
const QUEUE_PATH="data/mm/mm_operation_queue.json";
const $=id=>document.getElementById(id);
let state={data:null,selectedModule:"today_action_center",query:""};
const value=(v,fallback="")=>v===undefined||v===null?fallback:v;
const esc=v=>String(value(v)).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const cls=v=>String(v||"").toLowerCase();
const pill=(text,type="p3")=>`<span class="pill ${cls(type)}">${esc(text)}</span>`;
const list=items=>`<ul class="clean">${(items||[]).map(item=>`<li>${esc(item)}</li>`).join("")}</ul>`;
async function loadJson(path){const res=await fetch(path,{cache:"no-store"});if(!res.ok)throw new Error(`${path} ${res.status}`);return res.json();}
function allOps(data){return [...(data.today_operations||[])].sort((a,b)=>(b.sort_score||0)-(a.sort_score||0));}
function opByIds(data,ids){const set=new Set(ids||[]);return allOps(data).filter(op=>set.has(op.operation_id));}
function selectedModule(data){return (data.modules||[]).find(m=>m.module_id===state.selectedModule)||(data.modules||[])[0]||{};}
function actionButtons(){return `<div class="actions"><button class="mini ghost" type="button">Approve</button><button class="mini ghost" type="button">Reject</button><button class="mini ghost" type="button">Observation Only</button></div>`;}
function opCard(op,showActions=false){return `<div class="explain" style="margin-bottom:8px"><strong>${esc(op.issue)}</strong> ${pill(op.priority,op.priority)} ${pill(op.queue_type,op.queue_type)} ${pill(op.operation_status,op.operation_status)}<br><span class="small">${esc(op.reason)}</span><br><strong>Action：</strong>${esc(op.suggested_action)}<br><strong>Effort：</strong>${esc(op.estimated_effort_minutes)} min · <strong>Confidence：</strong>${esc(op.confidence)}<br><strong>Verify：</strong>${esc((op.verification_target||[])[0]||"")}${showActions?actionButtons():""}</div>`;}
function renderSummary(data){const s=data.summary||{};$("summary").innerHTML=[["waiting_approval_count",s.waiting_approval_count,"Waiting For Approval"],["executing_operations_count",s.executing_operations_count,"Executing"],["verifying_operations_count",s.verifying_operations_count,"Verifying"],["completed_today",s.completed_today,"Completed Today"],["rejected_or_observation_count",s.rejected_or_observation_count,"Rejected / Observation Only"]].map(([a,b,c])=>`<div class="kpi"><div class="kpi-label">${a}</div><div class="kpi-value">${esc(value(b,0))}</div><div class="kpi-note">${esc(c)}</div></div>`).join("");}
function renderModules(data){$("moduleList").innerHTML=(data.modules||[]).map(m=>`<button class="module-btn ${m.module_id===state.selectedModule?"active":""}" type="button" data-module="${esc(m.module_id)}"><div class="module-name">${esc(m.module_name)} ${pill(m.status,m.status)}</div><div class="module-meta">${esc(m.summary)}</div></button>`).join("");document.querySelectorAll("[data-module]").forEach(btn=>btn.addEventListener("click",()=>{state.selectedModule=btn.dataset.module;render(data);}));}
function renderSystemSummary(data){const s=data.system_summary||{};return `<div class="grid three"><div class="card"><h3>System Health Summary</h3><div class="explain">${esc(s.system_health_summary||"")}</div></div><div class="card"><h3>Today's Critical Issues</h3>${list(s.todays_critical_issues||[])}</div><div class="card"><h3>Next Recommended Operations</h3>${list(s.next_recommended_operations||[])}</div></div>`;}
function renderActionCenter(data){const ac=data.action_center||{};return `<div class="grid three"><div><h3>WAITING FOR APPROVAL</h3>${opByIds(data,ac.waiting_for_approval).map(op=>opCard(op,true)).join("")||"<div class='small'>No waiting approvals.</div>"}</div><div><h3>EXECUTING OPERATIONS</h3>${opByIds(data,ac.executing_operations).map(op=>opCard(op)).join("")||"<div class='small'>No executing operations.</div>"}</div><div><h3>VERIFICATION RESULTS</h3>${opByIds(data,[...(ac.verifying_operations||[]),...(ac.completed_today||[]),...(ac.rejected_or_observation_only||[])]).map(op=>`<div class="explain" style="margin-bottom:8px"><strong>${esc(op.issue)}</strong> ${pill(op.verification_result,op.verification_result)}<br>${esc(op.verification_summary||"")}<br><span class="small">${esc(op.result_feedback||"")}</span></div>`).join("")}</div></div>`;}
function moduleOps(data,module){const ids=new Set(module.operation_ids||[]);let rows=ids.size?allOps(data).filter(op=>ids.has(op.operation_id)):[];if(state.query){const q=state.query.toLowerCase();rows=rows.filter(op=>JSON.stringify(op).toLowerCase().includes(q));}return rows;}
function renderOpsTable(data,module){const rows=moduleOps(data,module);return `<div class="explain" style="margin-bottom:12px"><strong>模組狀態：</strong>${esc(module.summary||"")}<br><strong>下一步：</strong>${esc(module.next_focus||"")}</div><div class="table-wrap"><table><thead><tr><th>Priority</th><th>Type</th><th>Confidence</th><th>Status</th><th>Approval</th><th>Issue</th><th>Reason</th><th>Suggested Action</th><th>Effort</th><th>Verification</th><th>Result Feedback</th><th>Score</th></tr></thead><tbody>${rows.map(op=>`<tr><td>${pill(op.priority,op.priority)}</td><td>${pill(op.queue_type,op.queue_type)}</td><td>${esc(op.confidence)}</td><td>${pill(op.operation_status,op.operation_status)}</td><td>required: ${esc(op.approval_required)}<br><span class="small">${esc(op.approved_by||"")} ${esc(op.approved_at||"")}</span>${op.operation_status==="waiting_approval"?actionButtons():""}</td><td>${esc(op.issue)}</td><td>${esc(op.reason)}</td><td>${esc(op.suggested_action)}<br><span class="small">${esc(op.suggested_script)}</span></td><td>${esc(op.estimated_effort_minutes)} min</td><td>${pill(op.verification_result,op.verification_result)}<br>${list(op.verification_target)}<span class="small">${esc(op.verification_summary||"")}</span></td><td>${esc(op.result_feedback||"")}<br><span class="small">${esc(op.observation_reason||"")}</span></td><td>${esc(op.sort_score)}</td></tr>`).join("")||`<tr><td colspan="12">此模組目前沒有 operation。</td></tr>`}</tbody></table></div>`;}
function renderSelected(data){const module=selectedModule(data);$("moduleTitle").textContent=module.module_name||"Selected Module Details";$("moduleSubtitle").textContent=module.next_focus||"";$("moduleStatus").innerHTML=pill(module.status||"unknown",module.status||"p3");if(module.module_id==="today_action_center"){$("moduleContent").innerHTML=renderActionCenter(data);return;}if(module.module_id==="system_summary"){$("moduleContent").innerHTML=renderSystemSummary(data);return;}$("moduleContent").innerHTML=renderOpsTable(data,module);}
function renderSupport(data){$("logsBox").innerHTML=list(data.raw_data_tools?.logs||[]);$("rawJson").textContent=JSON.stringify(data,null,2);}
function render(data){state.data=data;renderSummary(data);renderModules(data);renderSelected(data);renderSupport(data);}
async function init(){try{$("errorBox").innerHTML="";render(await loadJson(QUEUE_PATH));}catch(err){$("errorBox").innerHTML=`<div class="error">資料讀取失敗：${esc(err.message)}</div>`;}}
$("reloadBtn").addEventListener("click",init);$("searchBox").addEventListener("input",event=>{state.query=event.target.value.trim();if(state.data)renderSelected(state.data);});init();
</script>
</body>
</html>
