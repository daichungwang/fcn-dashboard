<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MM Dashboard v2 — Decision Cockpit</title>
<script>
  document.addEventListener('DOMContentLoaded',()=>{
    const links=document.querySelector('.hero-links');
    if(links&&!document.getElementById('mm-operation-link')){
      const a=document.createElement('a');
      a.id='mm-operation-link';
      a.href='./mm_operation_queue_dashboard.html';
      a.textContent='MM Operation';
      a.style.background='linear-gradient(135deg,#ffb020,#ff6b00)';
      a.style.color='#11283f';
      a.style.borderColor='rgba(255,255,255,.45)';
      a.style.boxShadow='0 6px 16px rgba(255,107,0,.28)';
      a.title='Open MM operation queue dashboard';
      const warn=document.getElementById('mm-warning-badge');
      links.insertBefore(a,warn||null);
    }
  });
</script>
</head>
<body>
<script>
  location.replace('./engine_progress_dashboard.html');
</script>
</body>
</html>
