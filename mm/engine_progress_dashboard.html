<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>MM Dashboard v2</title><style>body{font-family:Arial;margin:0;padding:16px;background:#f5f7fb}.section{border:1px solid #d9e2ef;border-radius:12px;background:#fff;margin:0 0 12px}.section>summary{padding:10px 12px;font-weight:700;cursor:pointer}.section-body{padding:12px}.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.module-card,.panel,.mini-card{border:1px solid #d9e2ef;border-radius:10px;padding:10px}.metric{display:flex;justify-content:space-between;border-bottom:1px dashed #eee;padding:4px 0}.search-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:8px 0}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}td,th{border:1px solid #e5e7eb;padding:6px}.pill{padding:3px 8px;border-radius:999px;border:1px solid #ddd;font-size:12px}.warn{background:#fffbeb}</style></head><body>
<h1>MM Dashboard v2</h1><div id='mm-warning-badge'></div><div id='top-dashboard'></div>
<details class='section' open><summary>A. Top Dashboard</summary><div class='section-body'><div class='grid-5'><div class='module-card'>A1</div><div class='module-card'>A2</div><div class='module-card'>A3</div><div class='module-card'>A4</div><div class='module-card'>A5</div></div></div></details>
<details class='section' open><summary>B. Module Summary Layer</summary><div class='section-body grid-5'><div class='module-card'><h3>B1 M2</h3><div id='b1-m2-summary'></div></div><div class='module-card'><h3>B2 M6</h3><div id='b2-m6-summary'></div></div><div class='module-card'><h3>B3 M3</h3><div id='b3-m3-summary'></div></div><div class='module-card'><h3>B4 M7</h3><div id='b4-m7-summary'></div></div><div class='module-card'><h3>B5 M1</h3><div id='b5-m1-summary'></div></div></div></details>
<details class='section' open><summary>C. Stock Decision Layer</summary><div class='section-body grid-2'><div class='panel'><h3>C1 Single Stock Cockpit</h3><div id='c1-stock-cockpit'></div></div><div class='panel'><h3>C2 All Stocks Radar</h3><div id='c2-all-stock-radar'></div></div></div></details>
<details class='section' open><summary>D. Governance Layer</summary><div class='section-body'><details open><summary>D1 Stocks Display / legacy compatibility</summary><div class='section-body'><input id='stock-table-search'><select id='stock-table-sort'></select><select id='stock-table-category'></select><button id='stock-table-refresh'>Refresh</button><table><tbody id='stocks-display-tbody'></tbody></table><table id='stocks-display-table'></table></div></details><details open><summary>D2 Blueprint</summary><div class='section-body'><div id='m7-formula-registry'></div><div id='param-controller'></div><div id='m7-readiness'></div></div></details><details open><summary>D3 Ops Memory</summary><div class='section-body'><div id='active-build-context'></div><div id='handoff-memory'></div><div id='risk-list'></div><div id='milestone-list'></div><div id='overview'></div><table><tbody id='engine-table'></tbody></table><table><tbody id='data-table'></tbody></table><table><tbody id='formula-table'></tbody></table><table><tbody id='module-table'></tbody></table></div></details></div></details>
<script src='../js/mm/modules/mm_parameter_brain.js'></script><script src='../js/mm/modules/mm_stock_explainability.js'></script><script src='../js/mm/modules/mm_ranking_impact.js'></script><script src='../js/mm/modules/mm_stock_table.js'></script><script src='../js/mm/modules/mm_blueprint.js'></script><script src='../js/mm/modules/mm_ops_memory.js'></script>
<script src='../js/mm/core/mm_data_loader.js'></script><script src='../js/mm/core/mm_state_manager.js'></script><script src='../js/mm/core/mm_ui_helpers.js'></script>
<script src='../js/mm/modules/mm_top_dashboard.js'></script><script src='../js/mm/modules/mm_m2_summary.js'></script><script src='../js/mm/modules/mm_m6_summary.js'></script><script src='../js/mm/modules/mm_m3_summary.js'></script><script src='../js/mm/modules/mm_m7_summary.js'></script><script src='../js/mm/modules/mm_m1_summary.js'></script><script src='../js/mm/modules/mm_stock_cockpit.js'></script><script src='../js/mm/modules/mm_alert_engine.js'></script><script src='../js/mm/modules/mm_all_stock_radar.js'></script><script src='../js/mm/modules/mm_dashboard_app.js'></script>
</body></html>
