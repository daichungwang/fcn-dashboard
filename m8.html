<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M8 Engine</title>
</head>

<body>

<h2>M8 Fair Yield Test</h2>

Symbols:
<input id="s1" value="AMD">
<input id="s2" value="AVGO">
<input id="s3" value="NVDA">
<input id="s4" value="TSM"><br><br>

KI <input id="ki" value="55">
Strike <input id="strike" value="68">
Tenor <input id="tenor" value="12"><br><br>

<button onclick="run()">Run</button>

<pre id="out"></pre>

<script src="js/core/m8_fair_yield_engine.js"></script>

<script>
async function run(){
  const symbols = [s1.value,s2.value,s3.value,s4.value];

  const res = await runM8(
    symbols,
    Number(ki.value),
    Number(strike.value),
    Number(tenor.value),
    "AKI"
  );

  document.getElementById("out").textContent =
    JSON.stringify(res,null,2);
}
</script>

</body>
</html>
