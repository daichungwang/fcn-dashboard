<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M8 Engine</title>
</head>

<body>
<h2>M8 Fair Yield Test</h2>

Symbols:
<input id="s1" value="AMD">
<input id="s2" value="NVDA">
<input id="s3" value="">
<input id="s4" value="">
<input id="s5" value=""><br><br>

KI <input id="ki" value="60">
Strike <input id="strike" value="70">
Tenor <input id="tenor" value="6"><br><br>

Type
<select id="type">
  <option value="AKI">AKI</option>
  <option value="DACN">DACN</option>
  <option value="EKI">EKI</option>
</select>

Market Yield
<input id="marketYield" value="19.28"><br><br>

<button onclick="run()">Run</button>

<pre id="out"></pre>

<script src="js/core/m8_fair_yield_engine.js"></script>
<script>
async function run(){
  try {
    const rawSymbols = [
      document.getElementById("s1").value,
      document.getElementById("s2").value,
      document.getElementById("s3").value,
      document.getElementById("s4").value,
      document.getElementById("s5").value
    ];

    const symbols = rawSymbols
      .map(s => s.trim().toUpperCase())
      .filter(s => s !== "");

    const res = await runM8(
      symbols,
      Number(document.getElementById("ki").value),
      Number(document.getElementById("strike").value),
      Number(document.getElementById("tenor").value),
      document.getElementById("type").value,
      Number(document.getElementById("marketYield").value)
    );

    document.getElementById("out").textContent =
      JSON.stringify(res, null, 2);
  } catch (err) {
    document.getElementById("out").textContent = "Error: " + err.message;
  }
}
</script>
</body>
</html>
