<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>📊 M8 FCN Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 0;
      color: #111827;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 16px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 30px;
    }

    #m8-time {
      font-size: 13px;
      color: #666;
      margin-bottom: 2px;
    }

    #m8-subtitle {
      font-size: 12px;
      color: #999;
      margin-bottom: 16px;
    }

    .hidden {
      display: none;
    }

    .dash-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .dash-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .dash-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .dash-value {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.7;
    }

    .dash-desc {
      font-size: 12px;
      color: #888;
      line-height: 1.6;
    }

    .main-card {
      background: #fff;
      border-radius: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .main-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }

    .main-title {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 4px;
    }

    .main-desc {
      font-size: 12px;
      color: #888;
      line-height: 1.6;
    }

    .main-count {
      font-size: 13px;
      background: #111827;
      color: #fff;
      padding: 6px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .main-body {
      padding: 12px;
    }

    .name-summary {
      font-size: 12px;
      margin-bottom: 10px;
      color: #444;
      line-height: 1.6;
    }

    .toggle-row {
      margin-top: 8px;
    }

    .toggle-btn,
    .detail-btn {
      border: 0;
      background: #111827;
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .stock-card {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fff;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .card-left {
      flex: 1;
      min-width: 0;
    }

    .title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 4px;
    }

    .stock-title {
      font-weight: bold;
      font-size: 17px;
    }

    .today-tag {
      font-size: 12px;
      background: #eef2ff;
      color: #4338ca;
      padding: 2px 8px;
      border-radius: 999px;
    }

    .stock-sub {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }

    .card-right {
      text-align: right;
      min-width: 70px;
    }

    .score {
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }

    .score-good { color: #0a8; }
    .score-mid { color: #f90; }
    .score-bad { color: #c33; }

    .action-pill {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 12px;
    }

    .pill-add {
      background: #e6f7f2;
      color: #0a8;
    }

    .pill-watch {
      background: #fff5e6;
      color: #f90;
    }

    .pill-remove {
      background: #ffeaea;
      color: #c33;
    }

    .summary-box,
    .highlight-box {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.7;
      background: #fafafa;
      border-radius: 8px;
      padding: 8px;
    }

    .detail-btn-row {
      margin-top: 8px;
    }

    .detail-wrap {
      margin-top: 10px;
    }

    .analysis-section {
      margin-top: 10px;
      font-size: 12px;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 10px;
    }

    .analysis-title {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .analysis-row {
      display: flex;
      margin-bottom: 6px;
      gap: 10px;
    }

    .analysis-label {
      width: 100px;
      color: #666;
      flex-shrink: 0;
    }

    .analysis-value {
      flex: 1;
      line-height: 1.7;
    }

    .error-box {
      background: #fff;
      padding: 12px;
      border-radius: 10px;
      color: #c33;
    }

    @media (max-width: 900px) {
      .dash-grid {
        grid-template-columns: 1fr;
      }

      .card-head {
        flex-direction: column;
      }

      .card-right {
        text-align: left;
      }

      .analysis-row {
        flex-direction: column;
      }

      .analysis-label {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 M8 FCN Engine</h1>
    <div id="m8-time"></div>
    <div id="m8-subtitle"></div>

    <div id="m8-dashboard"></div>
    <div id="m8-sections"></div>
  </div>

  <script src="./js/m8/m8_ui.js"></script>
</body>
</html>
