<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>M7 今日選股</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system;
      background: #f5f6f8;
      margin: 0;
      padding: 12px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .meta {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .sub {
      font-size: 13px;
      color: #666;
    }

    .right {
      text-align: right;
    }

    .score {
      font-size: 22px;
      font-weight: bold;
    }

    .good { color: green; }
    .mid { color: orange; }
    .bad { color: red; }

    .action {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      margin-top: 4px;
      display: inline-block;
    }

    .add {
      background: #d1fae5;
      color: #065f46;
    }

    .watch {
      background: #fef3c7;
      color: #92400e;
    }

    .remove {
      background: #fee2e2;
      color: #991b1b;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      font-size: 13px;
      gap: 6px;
    }
  </style>
</head>

<body>

<h1>📊 M7 今日選股</h1>
<div id="m7-time" class="meta"></div>
<div id="m7-summary" class="meta"></div>

<div id="m7-list"></div>

<script src="./js/m7/m7_ui.js"></script>

</body>
</html>
