<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>M7 測試</title>
</head>
<body>

<h1>M7 Pool Converter 測試</h1>
<pre id="output">載入中...</pre>

<script type="module">
const output = document.getElementById("output");

try {
  const mod = await import("./js/m7/m7_pool_converter.js");
  const { convertPool } = mod;

  const data = {
    NVDA: {
      名稱: "NVIDIA",
      現價: 180,
      目前EPS: 6.8,
      明年EPS: 8.29,
      品質等級: "高",
      波動等級: "高"
    },
    TSM: {
      名稱: "TSM",
      現價: 340,
      目前EPS: 12,
      明年EPS: 15,
      品質等級: "中",
      波動等級: "中"
    }
  };

  const result = convertPool(data);
  output.textContent = JSON.stringify(result, null, 2);
} catch (err) {
  output.textContent = "錯誤：\n" + err.message + "\n\n" + err.stack;
}
</script>

</body>
</html>
