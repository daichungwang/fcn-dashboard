<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>M7 今日選股</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 14px;
      color: #111827;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
      font-weight: 800;
    }

    .meta {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .summary-box {
      background: #ffffff;
      border-radius: 16px;
      padding: 14px 16px;
      margin: 14px 0 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.06);
      border: 1px solid #eceff3;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      align-items: flex-start;
    }

    .left-block {
      flex: 1;
      min-width: 0;
    }

    .rank-line {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .rank-badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #ede9fe;
      color: #5b21b6;
      font-weight: 700;
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
    }

    .sub {
      font-size: 14px;
      color: #6b7280;
    }

    .right {
      text-align: right;
      min-width: 72px;
    }

    .score {
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
    }

    .good { color: #15803d; }
    .mid { color: #d97706; }
    .bad { color: #dc2626; }

    .action {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      margin-top: 8px;
      display: inline-block;
      font-weight: 700;
    }

    .add {
      background: #dcfce7;
      color: #166534;
    }

    .watch {
      background: #fef3c7;
      color: #92400e;
    }

    .remove {
      background: #fee2e2;
      color: #991b1b;
    }

    .scorebar-wrap {
      margin-bottom: 12px;
    }

    .scorebar-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .scorebar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .scorebar-fill {
      height: 100%;
      border-radius: 999px;
    }

    .fill-good { background: #22c55e; }
    .fill-mid { background: #f59e0b; }
    .fill-bad { background: #ef4444; }

    .reason-box {
      background: #f9fafb;
      border-left: 4px solid #cbd5e1;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .reason-title {
      font-weight: 800;
    }

    .tag-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tag {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
      font-size: 14px;
    }

    .empty-box,
    .error-box {
      background: #ffffff;
      padding: 16px;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      font-size: 14px;
    }

    .error-box {
      color: #b91c1c;
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      h1 {
        font-size: 24px;
      }

      .title {
        font-size: 18px;
      }

      .score {
        font-size: 28px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>📊 M7 今日選股</h1>

    <div class="summary-box">
      <div id="m7-time" class="meta">更新時間：--</div>
      <div id="m7-summary" class="meta">今日候選 -- / --</div>
    </div>

    <div id="m7-list"></div>
  </div>

  <script src="./js/m7/m7_ui.js"></script>
</body>
</html>
