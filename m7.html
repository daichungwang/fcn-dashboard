<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>M7 Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 14px;
      color: #111827;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
    }

    h1 {
      font-size: 30px;
      margin: 0 0 8px;
      font-weight: 900;
    }

    .top-meta {
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .meta-line {
      color: #6b7280;
      font-size: 14px;
      margin: 4px 0;
    }

    .dash-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .dash-grid-2 {
      margin-top: 0;
    }

    .dash-card {
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #eceff3;
    }

    .dash-title {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .dash-value {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .dash-sub {
      font-size: 13px;
      color: #4b5563;
      line-height: 1.5;
    }

    .dash-notes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .note-card {
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #eceff3;
    }

    .note-title {
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .note-text {
      font-size: 14px;
      color: #374151;
      line-height: 1.7;
    }

    .section-block {
      margin-bottom: 20px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 900;
    }

    .section-desc {
      font-size: 14px;
      color: #6b7280;
      margin-top: 4px;
      line-height: 1.6;
    }

    .section-count {
      background: #111827;
      color: #fff;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .stock-card {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.06);
      border: 1px solid #eceff3;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-left {
      flex: 1;
      min-width: 0;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .stock-title {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.2;
    }

    .bucket-tag {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-weight: 700;
    }

    .stock-sub {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    .card-right {
      text-align: right;
      min-width: 84px;
    }

    .score {
      font-size: 38px;
      font-weight: 900;
      line-height: 1;
    }

    .score-good { color: #15803d; }
    .score-mid { color: #d97706; }
    .score-bad { color: #dc2626; }

    .action-pill {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      border-radius: 999px;
      padding: 6px 10px;
      margin-top: 8px;
    }

    .pill-add {
      background: #dcfce7;
      color: #166534;
    }

    .pill-watch {
      background: #fef3c7;
      color: #92400e;
    }

    .pill-remove {
      background: #fee2e2;
      color: #991b1b;
    }

    .summary-box {
      background: #f9fafb;
      border-left: 4px solid #cbd5e1;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .exposure-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .exposure-head {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .mini-item {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 8px 10px;
    }

    .mini-label {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .mini-value {
      font-size: 14px;
      font-weight: 800;
      color: #111827;
    }

    .warn-box {
      font-size: 13px;
      line-height: 1.6;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 600;
    }

    .warn-box.high {
      background: #fee2e2;
      color: #991b1b;
    }

    .warn-box.medium {
      background: #fef3c7;
      color: #92400e;
    }

    .warn-box.normal {
      background: #ecfdf5;
      color: #166534;
    }

    .detail-btn-row {
      margin-bottom: 8px;
    }

    .detail-btn, .toggle-btn {
      border: 0;
      background: #111827;
      color: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .analysis-section {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .analysis-title {
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .analysis-table {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 8px 12px;
    }

    .analysis-row {
      display: contents;
    }

    .analysis-label {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
    }

    .analysis-value {
      font-size: 14px;
      color: #111827;
      font-weight: 700;
      line-height: 1.7;
    }

    .why-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .why-box {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }

    .why-title {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .why-body {
      font-size: 14px;
      line-height: 1.7;
      color: #374151;
    }

    .why-item {
      margin-bottom: 4px;
    }

    .formula-box {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.8;
    }

    .hidden {
      display: none;
    }

    .section-toggle-row {
      margin-top: 8px;
      margin-bottom: 10px;
    }

    .error-box {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      font-size: 14px;
      color: #b91c1c;
    }

    @media (max-width: 980px) {
      .dash-grid,
      .dash-notes,
      .why-grid {
        grid-template-columns: 1fr 1fr;
      }

      .mini-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .dash-grid,
      .dash-notes,
      .why-grid {
        grid-template-columns: 1fr;
      }

      .analysis-table {
        grid-template-columns: 1fr;
      }

      .card-head {
        flex-direction: column;
      }

      .card-right {
        text-align: left;
      }

      .stock-title {
        font-size: 18px;
      }

      .score {
        font-size: 30px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>📊 M7 Dashboard</h1>

    <div class="top-meta">
      <div id="m7-time" class="meta-line">更新時間：--</div>
      <div id="m7-subtitle" class="meta-line">M7 總樣本 -- 檔</div>
    </div>

    <div id="m7-dashboard"></div>
    <div id="m7-sections"></div>
  </div>

  <script src="./js/m7/m7_ui.js"></script>
</body>
</html>
