<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>振宇FCN投資系統</title>

<style>
body {font-family:-apple-system;background:#0b0b0d;color:#fff;margin:0}
.section{padding:14px;border-bottom:1px solid #222}
h2{margin:0 0 10px}
.card{background:#1c1c1e;padding:12px;border-radius:10px;margin-bottom:10px}
.green{color:#4cd964}.yellow{color:#ffd60a}.red{color:#ff453a}
table{width:100%;border-collapse:collapse}
td,th{padding:6px;border-bottom:1px solid #333}
button{padding:6px 10px;border:none;border-radius:6px;margin-right:6px}
.yes{background:#4cd964}.no{background:#ff453a}
</style>

<script>
async function getPrice(symbol){
    try{
        const res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`);
        const data = await res.json();
        return data.quoteResponse.result[0].regularMarketPrice;
    }catch{
        return null;
    }
}

const fcn = [
    {name:"FCN710H", stock:"ORCL", strike:120, barrier:100, vol:"low"},
    {name:"FCN465K", stock:"TSLA", strike:250, barrier:180, vol:"high"},
    {name:"FCN935K", stock:"MU", strike:140, barrier:100, vol:"high"},
    {name:"FCN791K", stock:"COIN", strike:220, barrier:150, vol:"high"},
    {name:"FCN499G", stock:"NVDA", strike:900, barrier:700, vol:"mid"}
];

function status(p,s,b){
    if(p > s) return "green";
    if(p < b) return "red";
    return "yellow";
}

function knockInProb(dist, vol){
    let base = 50 - dist;
    if(vol==="high") base += 20;
    if(vol==="low") base -= 15;
    return Math.max(5, Math.min(90, base));
}

async function load(){
    let results = [];

    for(let f of fcn){
        let p = await getPrice(f.stock);
        if(!p) p = 0;

        let dist = ((p - f.barrier)/f.barrier*100);
        let stat = status(p,f.strike,f.barrier);
        let prob = knockInProb(dist, f.vol);

        results.push({...f, price:p, dist:dist, stat:stat, prob:prob});
    }

    results.sort((a,b)=>a.dist-b.dist);

    let table = document.getElementById("table");
    table.innerHTML="";

    results.forEach(r=>{
        table.innerHTML += `
        <tr>
        <td>${r.name}</td>
        <td>${r.stock}</td>
        <td>${r.price.toFixed(1)}</td>
        <td class="${r.stat}">${r.dist.toFixed(1)}%</td>
        <td>${r.prob.toFixed(0)}%</td>
        </tr>`;
    });

    let s = document.getElementById("strategy");
    s.innerHTML="";

    results.forEach(r=>{
        let act = "觀察";
        if(r.stat==="green") act="加入";
        if(r.stat==="red") act="移除";

        s.innerHTML += `
        <div class="card">
        ${r.stock} → ${act}（接股機率 ${r.prob.toFixed(0)}%）<br>
        <button class="yes">同意</button>
        <button class="no">拒絕</button>
        </div>`;
    });
}

window.onload = load;
</script>

</head>

<body>

<div class="section">
<h2>📊 FCN 即時風險</h2>
<table>
<tr><th>FCN</th><th>標的</th><th>現價</th><th>距離下限</th><th>接股機率</th></tr>
<tbody id="table"></tbody>
</table>
</div>

<div class="section">
<h2>🧠 今日策略</h2>
<div id="strategy"></div>
</div>

<div class="section">
<h2>🌍 晨報模組（預留）</h2>
<div class="card">國際新聞 / 財經 / AI / 總經（可擴充）</div>
</div>

</body>
</html>
