<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>振宇 FCN 系統</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      background: #f5f5f5;
      padding: 16px;
      margin: 0;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      border: 1px solid #ddd;
    }

    h2 {
      margin-top: 0;
    }
  </style>
</head>

<body>

  <h1>振宇 FCN 系統</h1>

  <!-- 主內容 -->
  <div id="module3"></div>

  <!-- Debug Dashboard -->
  <div id="debug-dashboard"></div>

  <!-- JS -->
  <script src="js/main.js"></script>

  <script>
    // ===== Debug Dashboard =====
    function avg(arr = []) {
      if (!arr.length) return 0;
      return arr.reduce((a,b)=>a+b,0) / arr.length;
    }

    function round(n, d=4){
      return Number(n.toFixed(d));
    }

    function renderDebugDashboard(stockMap, stockPool) {
      const root = document.getElementById("debug-dashboard");

      const stocks = Object.entries(stockMap).map(([s, d]) => ({
        symbol: s,
        ...d
      }));

      const total = stocks.length;
      const hit = stocks.filter(s => s.news_count > 0).length;
      const miss = stocks.filter(s => s.news_count === 0);

      const avgMacro = avg(stocks.map(s => s.macro_avg));
      const avgIndustry = avg(stocks.map(s => s.industry_avg));
      const avgMarket = avg(stocks.map(s => s.market_avg));

      const sorted = [...stocks].sort((a,b)=>b.event_score - a.event_score);
      const top5 = sorted.slice(0,5);
      const bottom5 = sorted.slice(-5);

      // sector heat
      const sectorMap = {};
      stockPool.forEach(s => {
        if (!sectorMap[s.sector]) sectorMap[s.sector] = [];
        sectorMap[s.sector].push(s.symbol);
      });

      const sectorHeat = Object.entries(sectorMap).map(([sector, symbols]) => {
        const vals = symbols.map(sym => stockMap[sym]?.event_score || 0);
        return {
          sector,
          avg: avg(vals)
        };
      }).sort((a,b)=>b.avg - a.avg);

      // anomalies
      const noMacro = stocks.filter(s => s.macro_scores.length === 0);
      const noIndustry = stocks.filter(s => s.industry_scores.length === 0);
      const noMarket = stocks.filter(s => s.market_scores.length === 0);

      root.innerHTML = `
        <div class="card">
          <h2>🧠 Debug Dashboard</h2>

          <h3>📊 系統健康</h3>
          <div>總股票：${total}</div>
          <div style="color:green;">有命中：${hit}</div>
          <div style="color:${miss.length?'red':'green'};">未命中：${miss.length}</div>

          <h3>🌍 市場狀態</h3>
          <div>Macro：${round(avgMacro)}</div>
          <div>Industry：${round(avgIndustry)}</div>
          <div>Market：${round(avgMarket)}</div>

          <h3>🔥 Top 5</h3>
          ${top5.map(s=>`<div>${s.symbol} (${round(s.event_score)})</div>`).join("")}

          <h3>❄️ Bottom 5</h3>
          ${bottom5.map(s=>`<div>${s.symbol} (${round(s.event_score)})</div>`).join("")}

          <h3>🏭 Sector 熱度</h3>
          ${sectorHeat.map(s=>`<div>${s.sector} (${round(s.avg)})</div>`).join("")}

          <h3>⚠️ 異常偵測</h3>
          <div>無 Macro：${noMacro.map(s=>s.symbol).join(", ") || "OK"}</div>
          <div>無 Industry：${noIndustry.map(s=>s.symbol).join(", ") || "OK"}</div>
          <div>無 Market：${noMarket.map(s=>s.symbol).join(", ") || "OK"}</div>
        </div>
      `;
    }
  </script>

</body>
</html>
