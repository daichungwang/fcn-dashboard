<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M6 Stocks Dashboard</title>
  <style>
    :root{
      --bg:#eef6fb;
      --bg-2:#f7fbfe;
      --panel:#ffffff;
      --panel-2:#f8fbfd;
      --text:#0f172a;
      --text-2:#1e293b;
      --muted:#475569;
      --muted-2:#64748b;
      --green:#15803d;
      --red:#dc2626;
      --yellow:#b45309;
      --blue:#0ea5e9;
      --purple:#7c3aed;
      --border:#dbe7f0;
      --shadow:0 10px 28px rgba(15, 23, 42, .08);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
      background:linear-gradient(180deg,var(--bg) 0%, var(--bg-2) 100%);
      color:var(--text);
    }

    .wrap{
      max-width:1440px;
      margin:0 auto;
      padding:16px;
    }

    .top-sticky{
      background:linear-gradient(180deg,var(--bg) 0%, var(--bg-2) 100%);
      padding-top:10px;
      padding-bottom:10px;
    }

    .top-sticky::after{
      content:"";
      display:block;
      height:10px;
      background:linear-gradient(to bottom, rgba(238,246,251,0.95), rgba(238,246,251,0));
      pointer-events:none;
    }

    .hero{
      position:sticky;
      top:0;
      z-index:1000;
      background:linear-gradient(135deg,#173b8f 0%, #0b1220 100%);
      color:#fff;
      border:1px solid #173b8f;
      border-radius:20px;
      padding:18px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .hero h1{
      margin:0 0 6px;
      font-size:24px;
      font-weight:800;
    }

    .hero .sub{
      color:#dbeafe;
      font-size:14px;
      margin-bottom:14px;
    }

    .toolbar{
      display:grid;
      grid-template-columns:1.2fr 1fr 1fr 1fr;
      gap:12px;
    }

    .input,.select,.btn{
      width:100%;
      border-radius:12px;
      border:1px solid var(--border);
      background:#ffffff;
      color:var(--text);
      padding:12px 14px;
      font-size:14px;
      box-shadow:0 1px 2px rgba(15,23,42,.03);
    }

    .btn{
      cursor:pointer;
      font-weight:700;
      width:auto;
      padding:10px 14px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:16px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
    }

    .summary-card{
      grid-column:span 2;
      padding:10px 12px;
      min-height:72px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .full{grid-column:1/-1}
    .list-panel{grid-column:span 4}
    .detail-panel{grid-column:span 8}

    .label{
      font-size:11px;
      color:var(--muted);
      margin-bottom:2px;
      font-weight:700;
      letter-spacing:.2px;
    }

    .metric{
      font-size:16px;
      font-weight:800;
      line-height:1.1;
      color:var(--text);
    }

    .small{
      font-size:13px;
      color:var(--muted-2);
    }

    .green{color:var(--green)}
    .red{color:var(--red)}
    .yellow{color:var(--yellow)}
    .blue{color:var(--blue)}

    .section-title{
      font-size:16px;
      font-weight:800;
      margin:0 0 10px;
    }

    .stock-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:760px;
      overflow:auto;
      padding-right:4px;
    }

    .stock-item{
      background:var(--panel-2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      cursor:pointer;
      transition:.15s ease;
      box-shadow:0 4px 14px rgba(15,23,42,.04);
    }

    .stock-item:hover{
      border-color:rgba(14,165,233,.55);
      transform:translateY(-1px);
    }

    .stock-item.active{
      border-color:rgba(14,165,233,.95);
      box-shadow:inset 0 0 0 1px rgba(14,165,233,.25), 0 8px 18px rgba(14,165,233,.12);
    }

    .stock-item.healthy{background:linear-gradient(180deg,#f0fdf4,#ffffff);}
    .stock-item.watch{background:linear-gradient(180deg,#fffbeb,#ffffff);}
    .stock-item.danger{background:linear-gradient(180deg,#fef2f2,#ffffff);}

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .name{
      font-size:17px;
      font-weight:800;
      color:var(--text);
    }

    .ticker{
      font-size:12px;
      color:var(--muted-2);
      font-weight:600;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      font-weight:800;
      background:#ffffff;
      border:1px solid var(--border);
      color:var(--text-2);
    }

    .badge.red{background:#fee2e2;color:#b91c1c;border-color:#fecaca}
    .badge.yellow{background:#fef3c7;color:#92400e;border-color:#fde68a}
    .badge.green{background:#dcfce7;color:#166534;border-color:#bbf7d0}

    .strength-badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--border);
      background:#ffffff;
    }

    .strength-strong{color:#166534;background:#dcfce7;border-color:#bbf7d0}
    .strength-neutral{color:#92400e;background:#fef3c7;border-color:#fde68a}
    .strength-weak{color:#b91c1c;background:#fee2e2;border-color:#fecaca}

    .rank-no{
      display:inline-flex;
      width:24px;
      height:24px;
      border-radius:999px;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:800;
      background:#e0f2fe;
      border:1px solid #bae6fd;
      color:#075985;
      margin-right:8px;
    }

    .stock-stats{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:6px 12px;
      margin-top:10px;
      font-size:13px;
    }

    .stat-line{
      display:flex;
      justify-content:space-between;
      gap:8px;
      color:var(--text-2);
    }

    .stat-line .k{color:var(--muted)}

    .detail-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
    }

    .detail-title{
      font-size:28px;
      font-weight:800;
      margin:0;
    }

    .detail-sub{
      color:var(--muted-2);
      font-size:13px;
      margin-top:4px;
    }

    .detail-tags{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }

    .detail-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-bottom:16px;
    }

    .mini{
      background:#fbfdff;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
    }

    .kv{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:8px;
      font-size:14px;
      margin:6px 0;
    }

    .chart-box{
      background:#fbfdff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
      margin-bottom:14px;
    }

    .price-chart{
      position:relative;
      height:240px;
      border-radius:12px;
      overflow:hidden;
      background:
        linear-gradient(to top, rgba(14,165,233,.07), rgba(14,165,233,0)),
        linear-gradient(to bottom, rgba(15,23,42,.03), rgba(255,255,255,0));
      border:1px solid var(--border);
    }

    .price-chart svg{
      width:100%;
      height:100%;
      display:block;
    }

    .line-mark{
      position:absolute;
      left:0;
      right:0;
      border-top:1px dashed;
      font-size:11px;
      padding-left:8px;
      color:#64748b;
      pointer-events:none;
      background:linear-gradient(to right, rgba(255,255,255,.9), rgba(255,255,255,0));
    }

    .position-card{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:#ffffff;
      margin-bottom:10px;
    }

    .warn-card{
      background:#fff7ed;
      color:#9a3412;
      border:1px solid #fed7aa;
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .empty{
      padding:24px;
      text-align:center;
      color:var(--muted);
    }

    .comment-box{
      white-space:pre-wrap;
      line-height:1.75;
      font-size:14px;
      color:var(--text-2);
    }

    .trade-panel{
      background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
      box-shadow:0 10px 28px rgba(15, 23, 42, .06);
      margin-bottom:14px;
    }

    .trade-panel-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
    }

    .trade-kicker{
      font-size:12px;
      font-weight:800;
      color:#64748b;
      letter-spacing:.4px;
      margin-bottom:4px;
    }

    .trade-title{
      font-size:22px;
      font-weight:900;
      color:#0f172a;
      line-height:1.2;
    }

    .trade-updated{
      font-size:12px;
      color:#64748b;
      margin-top:6px;
    }

    .trade-head-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 12px;
      border-radius:999px;
      background:linear-gradient(135deg,#173b8f 0%, #0b1220 100%);
      color:#fff;
      font-size:11px;
      font-weight:800;
      letter-spacing:.6px;
    }

    .trade-summary-card{
      background:linear-gradient(180deg,#eef6ff 0%, #ffffff 100%);
      border:1px solid #d7e7fb;
      border-radius:16px;
      padding:14px;
      margin-bottom:12px;
    }

    .trade-card{
      background:#ffffff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      margin-bottom:12px;
    }

    .trade-reminder{
      background:linear-gradient(180deg,#f0fdf4 0%, #ffffff 100%);
      border:1px solid #bbf7d0;
      border-radius:16px;
      padding:14px;
      margin-top:12px;
    }

    .trade-action{
      background:linear-gradient(180deg,#eff6ff 0%, #ffffff 100%);
      border-color:#bfdbfe;
    }

    .trade-cost{
      background:linear-gradient(180deg,#fff1f2 0%, #ffffff 100%);
      border-color:#fecdd3;
    }

    .trade-block-title{
      font-size:15px;
      font-weight:900;
      color:#334155;
      margin-bottom:8px;
      letter-spacing:.2px;
    }

    .m6-market-comment{
      margin-top:12px;
      margin-bottom:14px;
      padding:14px 16px;
      border-radius:14px;
      background:#ffffff;
      border:1px solid #d7e7fb;
      color:#0f172a;
      opacity:1;
    }

    .m6-market-comment-title{
      font-size:16px;
      font-weight:900;
      letter-spacing:.08em;
      color:#1d4ed8;
      margin-bottom:10px;
      text-transform:none;
    }

    .m6-market-comment-text{
      font-size:15px;
      line-height:1.9;
      font-weight:500;
      color:#020617;
      white-space:pre-wrap;
      margin-bottom:10px;
    }

    .summary-grid-sticky{
      margin-top:12px;
    }

    .reading-bar{
      padding:12px 16px;
      margin-top:12px;
    }

    .section-box{
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
      margin-bottom:14px;
      background:#fff;
      box-shadow:var(--shadow);
    }

    .section-head{
      padding:14px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      cursor:pointer;
      font-weight:800;
      background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    }

    .section-head:hover{
      background:linear-gradient(180deg,#f8fbff 0%, #f2f8ff 100%);
    }

    .section-body{
      padding:16px;
      border-top:1px solid var(--border);
    }

    .section-body.is-collapsed{
      display:none;
    }

    .section-tools{
      display:flex;
      gap:8px;
      margin-bottom:12px;
    }

    .mini-btn{
      border:1px solid var(--border);
      background:#fff;
      border-radius:10px;
      padding:8px 12px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .mini-btn:hover{
      background:#f8fbff;
    }

    .m6-action-list{
      margin:0;
      padding-left:18px;
      line-height:1.85;
      font-size:15px;
      color:#0f172a;
    }

    .m6-reason-box{
      white-space:pre-wrap;
      line-height:1.85;
      font-size:15px;
      color:#1e293b;
    }

    .sell-summary-table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    .sell-summary-table th,
    .sell-summary-table td{
      padding:10px 8px;
      border-bottom:1px solid #eef2f7;
      text-align:left;
      vertical-align:top;
    }

    .sell-summary-table th{
      background:#f8fbff;
      color:#475569;
      font-weight:800;
    }

    .sell-summary-empty{
      color:#64748b;
      font-size:14px;
      padding:8px 0;
    }

    .forecast-debug-panel{
      background:linear-gradient(180deg,#f8fbff 0%, #ffffff 100%);
      border:1px solid #d7e7fb;
      border-radius:18px;
      padding:14px;
      margin-bottom:14px;
    }

    .forecast-debug-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:12px;
    }

    .forecast-debug-title{
      font-size:18px;
      font-weight:900;
      color:#0f172a;
    }

    .forecast-debug-sub{
      font-size:12px;
      color:#64748b;
      line-height:1.55;
      margin-top:4px;
    }

    .forecast-result-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:12px;
    }

    .forecast-result-card{
      background:#ffffff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
    }

    .forecast-result-card .result-title{
      font-size:13px;
      font-weight:900;
      color:#334155;
      margin-bottom:8px;
    }

    .forecast-result-card .result-main{
      font-size:24px;
      font-weight:900;
      color:#0f172a;
      line-height:1.15;
    }

    .forecast-result-card .result-sub{
      font-size:12px;
      color:#64748b;
      line-height:1.55;
      margin-top:6px;
    }

    .forecast-model-table{
      width:100%;
      border-collapse:collapse;
      font-size:12px;
      margin-top:10px;
    }

    .forecast-model-table th,
    .forecast-model-table td{
      border-bottom:1px solid #eef2f7;
      padding:8px 6px;
      text-align:left;
      vertical-align:top;
    }

    .forecast-model-table th{
      background:#f8fbff;
      color:#475569;
      font-weight:900;
    }

    .forecast-model-table .m1-row{
      background:#eff6ff;
    }

    .forecast-model-table .m7-row{
      background:#f0fdf4;
    }

    .forecast-bar{
      position:relative;
      height:88px;
      border-radius:16px;
      border:1px solid #dbe7f0;
      background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
      margin:12px 0;
      overflow:hidden;
    }

    .forecast-bar-line{
      position:absolute;
      left:18px;
      right:18px;
      top:44px;
      height:6px;
      border-radius:999px;
      background:#dbeafe;
    }

    .forecast-marker{
      position:absolute;
      top:0;
      width:1px;
      height:88px;
      background:#94a3b8;
    }

    .forecast-marker .marker-label{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      white-space:nowrap;
      font-size:10px;
      font-weight:900;
      padding:2px 5px;
      border-radius:999px;
      border:1px solid #dbe7f0;
      background:#ffffff;
    }

    .forecast-marker.m1 .marker-label{top:8px;color:#1d4ed8;background:#eff6ff;border-color:#bfdbfe}
    .forecast-marker.m7 .marker-label{bottom:8px;color:#166534;background:#f0fdf4;border-color:#bbf7d0}
    .forecast-marker.today{
      width:3px;
      background:#111827;
    }
    .forecast-marker.today .marker-label{
      top:33px;
      color:#111827;
      background:#ffffff;
      border-color:#111827;
    }

    .forecast-small-note{
      font-size:12px;
      color:#64748b;
      line-height:1.6;
      margin-top:8px;
      white-space:pre-wrap;
    }

    .forecast-basis-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin:10px 0 12px;
    }
    .forecast-basis-item{
      border:1px solid #dbe7f0;
      border-radius:14px;
      padding:10px;
      background:#ffffff;
    }
    .forecast-basis-item .k{
      font-size:11px;
      color:#64748b;
      font-weight:800;
      margin-bottom:4px;
    }
    .forecast-basis-item .v{
      font-size:18px;
      color:#0f172a;
      font-weight:900;
    }
    .forecast-basis-item .d{
      font-size:11px;
      color:#64748b;
      line-height:1.45;
      margin-top:4px;
    }


    @media (max-width: 980px){
      .toolbar{grid-template-columns:1fr}
      .summary-card,.list-panel,.detail-panel{grid-column:1/-1}
      .detail-grid{grid-template-columns:1fr}
      .detail-title{font-size:24px}
      html{scroll-padding-top:220px;}
      .sell-summary-table{display:block; overflow:auto; white-space:nowrap;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-sticky">
      <div class="hero">
        <h1>M6 Stocks Dashboard</h1>
        <div class="sub">振宇持股管理沙盒｜專業版 UI（高對比、清晰決策）｜M6 真資料版</div>
        <div class="toolbar">
          <input id="searchInput" class="input" placeholder="搜尋股票代號或名稱，例如 ORCL / COIN" />
          <select id="sourceFilter" class="select">
            <option value="all">全部來源</option>
            <option value="FCN接股">FCN接股</option>
            <option value="主動買進">主動買進</option>
          </select>
          <select id="statusFilter" class="select">
            <option value="all">全部狀態</option>
            <option value="健康">健康</option>
            <option value="觀察">觀察</option>
            <option value="危險">危險</option>
          </select>
          <select id="sortMode" class="select">
            <option value="risk">依風險排序</option>
            <option value="strength">依強弱排序</option>
            <option value="pnl">依損益金額排序</option>
            <option value="return">依損益率排序</option>
            <option value="score">依 today score 排序</option>
            <option value="symbol">依代號排序</option>
          </select>
        </div>
      </div>

      <div class="grid summary-grid-sticky" id="summaryGrid"></div>

      <div class="card full reading-bar">
        <div class="row" style="flex-wrap:wrap; gap:10px;">
          <div class="small">
            <b style="color:var(--text)">閱讀原則：</b>
            白卡看數字、色塊看風險、徽章看強弱；目前已接真價格，1M 代 MA50、3M 代 MA200、12M 作年線。
          </div>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <span class="badge green">健康</span>
            <span class="badge yellow">觀察</span>
            <span class="badge red">危險</span>
            <span class="strength-badge strength-strong">強</span>
            <span class="strength-badge strength-neutral">中</span>
            <span class="strength-badge strength-weak">弱</span>
          </div>
        </div>
      </div>
    </div>

    <div class="grid" style="margin-top:16px;">
      <div class="card list-panel">
        <div class="section-title">多檔持股總覽</div>
        <div class="small" style="margin-bottom:12px;">左邊顯示合併後的持股，右邊展開單一股票的多筆部位與今日評估。</div>
        <div id="stockList" class="stock-list"></div>
      </div>

      <div class="card detail-panel">
        <div id="detailPanel" class="empty">載入中...</div>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      loadM6Data,
      buildM6ViewModel,
      sortAggregates,
      buildPositionDetails
    } from "./js/m6/m6_engine.js?v=20260417z";

    let vm = null;
    let selectedSymbol = "";
    let sellRecordsRaw = [];
    let sellSummary = [];
    let priceForecastDebug = null;

    async function loadJson(url){
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`載入失敗：${url} (${res.status})`);
      }
      return res.json();
    }

    function statusClass(status){
      if (status === "健康") return "green";
      if (status === "觀察") return "yellow";
      return "red";
    }

    function statusTone(status){
      if (status === "健康") return "healthy";
      if (status === "觀察") return "watch";
      return "danger";
    }

    function strengthClass(strength){
      if (strength === "強") return "strength-strong";
      if (strength === "中") return "strength-neutral";
      return "strength-weak";
    }

    function moneyClass(value){
      return Number(value) >= 0 ? "green" : "red";
    }

    function fmtNum(value, digits = 2){
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      return n.toFixed(digits);
    }

    function fmtInt(value){
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      return Math.round(n).toString();
    }

    function safeText(value){
      if (value === null || value === undefined || value === "") return "-";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderSummary(items){
      const totalCost = items.reduce((s, x) => s + (Number(x.total_cost) || 0), 0);
      const totalValue = items.reduce((s, x) => s + (Number(x.market_value) || 0), 0);
      const totalPnl = totalValue - totalCost;
      const healthy = items.filter(x => x.status_eval === "健康").length;
      const watch = items.filter(x => x.status_eval === "觀察").length;
      const danger = items.filter(x => x.status_eval === "危險").length;

      document.getElementById("summaryGrid").innerHTML = `
        <div class="card summary-card">
          <div class="label">檔數</div>
          <div class="metric">${items.length}</div>
        </div>
        <div class="card summary-card">
          <div class="label">總成本</div>
          <div class="metric">$${fmtInt(totalCost)}</div>
        </div>
        <div class="card summary-card">
          <div class="label">總市值</div>
          <div class="metric">$${fmtInt(totalValue)}</div>
        </div>
        <div class="card summary-card">
          <div class="label">總損益</div>
          <div class="metric ${moneyClass(totalPnl)}">${totalPnl >= 0 ? "+" : ""}$${fmtInt(totalPnl)}</div>
        </div>
        <div class="card summary-card">
          <div class="label">健康 / 觀察 / 危險</div>
          <div class="metric">
            <span class="green">${healthy}</span> /
            <span class="yellow">${watch}</span> /
            <span class="red">${danger}</span>
          </div>
        </div>
        <div class="card summary-card">
          <div class="label">引擎</div>
          <div class="metric blue">AUTO</div>

    function getFilteredAggregates(){
      if (!vm) return [];

      const q = document.getElementById("searchInput").value.trim().toLowerCase();
      const source = document.getElementById("sourceFilter").value;
      const status = document.getElementById("statusFilter").value;
      const sortMode = document.getElementById("sortMode").value;

      let items = [...vm.aggregates].filter(item => {
        const hitSearch =
          !q ||
          (item.symbol || "").toLowerCase().includes(q) ||
          (item.name || "").toLowerCase().includes(q);

        const hitSource =
          source === "all" ||
          (item.source_type || "").includes(source);

        const hitStatus =
          status === "all" ||
          item.status_eval === status;

        return hitSearch && hitSource && hitStatus;
      });

      items = sortAggregates(items, sortMode);

      if (!selectedSymbol && items.length) selectedSymbol = items[0].symbol;
      if (selectedSymbol && !items.find(x => x.symbol === selectedSymbol) && items.length) {
        selectedSymbol = items[0].symbol;
      }

      return items;
    }

    function priceToY(value, min, max, h){
      if (!Number.isFinite(value)) return h / 2;
      if (max === min) return h / 2;
      return ((max - value) / (max - min)) * h;
    }

    function renderLineChart(stock){
      const series = [
        stock.line_12m,
        stock.line_6m,
        stock.line_1m,
        stock.line_1w,
        stock.current
      ].filter(v => Number.isFinite(Number(v))).map(Number);

      const allRef = [
        ...series,
        Number(stock.cost),
        Number(stock.current),
        Number(stock.line_1m),
        Number(stock.line_6m),
        Number(stock.line_12m)
      ].filter(v => Number.isFinite(v));

      if (!allRef.length) {
        return `<div class="empty">沒有可畫圖的價格資料。</div>`;
      }

      const min = Math.min(...allRef) * 0.95;
      const max = Math.max(...allRef) * 1.05;
      const w = 880;
      const h = 240;

      const pts = series.map((v, i) => {
        const x = (i / Math.max(series.length - 1, 1)) * w;
        const y = priceToY(v, min, max, h);
        return `${x},${y}`;
      }).join(" ");

      const fillPts = `0,${h} ${pts} ${w},${h}`;

      const marks = [
        { label:`成本 ${fmtNum(stock.cost)}`, value:Number(stock.cost), color:"#22c55e" },
        { label:`現價 ${fmtNum(stock.current)}`, value:Number(stock.current), color:"#ef4444" },
        { label:`1M代MA50 ${fmtNum(stock.line_1m)}`, value:Number(stock.line_1m), color:"#38bdf8" },
        { label:`3M代MA200 ${fmtNum(stock.line_3m ?? stock.line_6m)}`, value:Number(stock.line_3m ?? stock.line_6m), color:"#7c3aed" },
        { label:`年線 ${fmtNum(stock.line_12m)}`, value:Number(stock.line_12m), color:"#f59e0b" }
      ].filter(x => Number.isFinite(x.value));

      return `
        <div class="price-chart">
          ${marks.map(m => {
            const top = priceToY(m.value, min, max, h);
            return `<div class="line-mark" style="top:${top}px;border-color:${m.color};">${safeText(m.label)}</div>`;
          }).join("")}
          <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
            <polyline points="${fillPts}" fill="rgba(56,189,248,.10)" stroke="none"></polyline>
            <polyline points="${pts}" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
          </svg>
        </div>
      `;
    }

    function getSellSummaryForSymbol(symbol){
      return sellSummary.filter(x => x.symbol === symbol);

    function buildSellSummary(records = []) {
      const map = {};

      for (const r of records) {
        const key = `${r.symbol}__${r.from}`;

        if (!map[key]) {
          map[key] = {
            symbol: r.symbol,
            from: r.from,
            cost: Number(r.cost) || 0,
            total_qty: 0,
            total_amount: 0,
            total_pnl: 0
          };
        }

        const qty = Number(r.sell_qty) || 0;
        const price = Number(r.sell_price) || 0;
        const cost = Number(r.cost) || 0;

        map[key].total_qty += qty;
        map[key].total_amount += price * qty;
        map[key].total_pnl += (price - cost) * qty;
      }

      return Object.values(map).map(x => {
        const avg_price = x.total_qty ? (x.total_amount / x.total_qty) : 0;
        const pnl_pct = x.cost ? (((avg_price - x.cost) / x.cost) * 100) : 0;

        return {
          symbol: x.symbol,
          from: x.from,
          cost: x.cost,
          sell_out_qty: x.total_qty,
          avg_sell_price: avg_price,
          net_realized_pnl: x.total_pnl,
          net_realized_pnl_pct: pnl_pct
        };
      });
    }

    function renderForecastBar(row){
      if (!row) {
        return `<div class="empty">沒有可畫的 forecast debug 資料。</div>`;
      }

      const today = Number(row.today_price);
      const f1d = Number(getForecastFinal(row, "1d")?.weighted_price_final);
      const f1w = Number(getForecastFinal(row, "1w")?.weighted_price_final);
      const f1m = Number(getForecastFinal(row, "1m")?.weighted_price_final);
      const before1m = Number(getForecastBeforeDecision(row, "1m")?.weighted_price);

      const prices = [today, f1d, f1w, f1m, before1m].filter(Number.isFinite);
      if (!prices.length) {
        return `<div class="empty">沒有可畫的 M6 prediction 資料。</div>`;
      }

      const min = Math.min(...prices) * 0.98;
      const max = Math.max(...prices) * 1.02;

      const pos = (v) => {
        const n = Number(v);
        if (!Number.isFinite(n) || max === min) return 50;
        return 18 + ((n - min) / (max - min)) * 64;
      };

      const marker = (label, value, cls, top = true) => {
        if (!Number.isFinite(Number(value))) return "";
        return `
          <div class="forecast-marker ${cls}" style="left:${pos(value)}%;">
            <div class="marker-label" style="${top ? "top:8px;" : "bottom:8px;"}">${safeText(label)}</div>
          </div>
        `;
      };

      return `
        <div class="forecast-bar">
          <div class="forecast-bar-line"></div>
          ${marker("1D", f1d, "m7", true)}
          ${marker("1W", f1w, "m1", false)}
          ${marker("1M", f1m, "m7", true)}
          ${Number.isFinite(before1m) ? `
            <div class="forecast-marker" style="left:${pos(before1m)}%;background:#f97316;">
              <div class="marker-label" style="bottom:8px;color:#9a3412;background:#fff7ed;border-color:#fed7aa;">Before</div>
            </div>
          ` : ""}
          <div class="forecast-marker today" style="left:${pos(today)}%;">
            <div class="marker-label">TODAY</div>
          </div>
        </div>
      `;
    }

    function renderForecastDebugPanel(stock){
      const row = getForecastDebugForSymbol(stock.symbol);
      if (!row) {
        return `
          <div class="forecast-debug-panel">
            <div class="forecast-debug-title">M6 Price Forecast / v9.1</div>
            <div class="empty">尚未找到 ${safeText(stock.symbol)} 的 data/m6/price_forecast_debug.json 資料。</div>
          </div>
        `;
      }

      const timing = row.timing_structure || {};
      const f1d = getForecastFinal(row, "1d");
      const f1w = getForecastFinal(row, "1w");
      const f1m = getForecastFinal(row, "1m");
      const b1d = getForecastBeforeDecision(row, "1d");
      const b1w = getForecastBeforeDecision(row, "1w");
      const b1m = getForecastBeforeDecision(row, "1m");
      const d1d = getDecisionAdjustment(row, "1d");
      const d1w = getDecisionAdjustment(row, "1w");
      const d1m = getDecisionAdjustment(row, "1m");

      const oneMonthModels = row.forecast?.["1m"]?.price_models || {};
      const fitSummary = row.debug?.price_fit_summary || {};
      const warnings = Array.isArray(row.debug?.warnings) ? row.debug.warnings : [];

      const modelRows = ["linear", "quadratic", "log"].map(model => {
        const m = oneMonthModels[model] || {};
        const fit = fitSummary[model] || {};
        return `
          <tr class="m7-row">
            <td><b>${safeText(model)}</b><br><span class="small">Pure price / 1M</span></td>
            <td>$${fmtNum(m.raw_today_price)}</td>
            <td>$${fmtNum(m.raw_future_price)}</td>
            <td>${fmtNum(m.today_adjustment_factor, 6)}</td>
            <td>$${fmtNum(m.adjusted_price)}</td>
            <td>${fmtNum(m.adjusted_upside_pct)}%</td>
            <td>${fmtNum(m.r2 ?? fit.r2, 4)}</td>
            <td>${safeText(m.status || fit.status || "-")}</td>
          </tr>
        `;
      }).join("");

      return `
        <div class="forecast-debug-panel">
          <div class="forecast-debug-head">
            <div>
              <div class="forecast-debug-title">M6 Price Forecast / v9.1 決策版</div>
              <div class="forecast-debug-sub">
                讀取 data/m6/price_forecast_debug.json。這版使用 pure price 三模型，先做 today-bias adjustment，再用 timing A/B decision 修正 final price。
              </div>
            </div>
            ${formatDecisionBadge(row)}
          </div>

          ${renderForecastBar(row)}

          <div class="forecast-basis-box">
            <div class="forecast-basis-item">
              <div class="k">Today Price / 今日價格</div>
              <div class="v">$${fmtNum(row.today_price)}</div>
              <div class="d">M6 所有 upside 都以 today_price 為基準。</div>
            </div>
            <div class="forecast-basis-item">
              <div class="k">Decision Mode / 短線狀態</div>
              <div class="v">${safeText(row.decision_label || row.decision_mode || "-")}</div>
              <div class="d">Direction：${safeText(row.short_direction || "-")}；A=盤整/不明，B=短線方向明確。</div>
            </div>
          </div>

          <div class="forecast-result-grid">
            <div class="forecast-result-card">
              <div class="result-title">1D Tomorrow</div>
              <div class="result-main">$${fmtNum(f1d.weighted_price_final)}</div>
              <div class="result-sub">
                Upside：${fmtNum(f1d.weighted_upside_pct_final)}%<br>
                Before decision：$${fmtNum(b1d.weighted_price)}<br>
                Rule：${safeText(d1d.mode || "-")} / ${safeText(d1d.direction || "-")}
              </div>
            </div>
            <div class="forecast-result-card">
              <div class="result-title">1W One Week</div>
              <div class="result-main">$${fmtNum(f1w.weighted_price_final)}</div>
              <div class="result-sub">
                Upside：${fmtNum(f1w.weighted_upside_pct_final)}%<br>
                Before decision：$${fmtNum(b1w.weighted_price)}<br>
                Rule：${safeText(d1w.mode || "-")} / ${safeText(d1w.direction || "-")}
              </div>
            </div>
          </div>

          <div class="forecast-result-grid">
            <div class="forecast-result-card">
              <div class="result-title">1M One Month</div>
              <div class="result-main">$${fmtNum(f1m.weighted_price_final)}</div>
              <div class="result-sub">
                Upside：${fmtNum(f1m.weighted_upside_pct_final)}%<br>
                Before decision：$${fmtNum(b1m.weighted_price)}<br>
                After decision：$${fmtNum(d1m.after_price)}
              </div>
            </div>
            <div class="forecast-result-card">
              <div class="result-title">Timing Structure</div>
              <div class="result-sub">
                1D / 1W / 1M raw：${fmtNum(timing.raw_returns?.ret_1d_pct)}% / ${fmtNum(timing.raw_returns?.ret_1w_pct)}% / ${fmtNum(timing.raw_returns?.ret_1m_pct)}%<br>
                Daily norm：${fmtNum(timing.daily_normalized_returns?.ret_1d_daily_pct, 4)}% / ${fmtNum(timing.daily_normalized_returns?.ret_1w_daily_pct, 4)}% / ${fmtNum(timing.daily_normalized_returns?.ret_1m_daily_pct, 4)}%<br>
                Consistency：${fmtNum(timing.consistency_ratio, 4)}；Dispersion：${fmtNum(timing.dispersion, 6)}；Same sign：${safeText(timing.same_sign)}
              </div>
            </div>
          </div>

          <table class="forecast-model-table">
            <thead>
              <tr>
                <th>Model</th>
                <th>Raw Today</th>
                <th>Raw Future 1M</th>
                <th>Today Bias Factor</th>
                <th>Adjusted 1M</th>
                <th>Adj Upside</th>
                <th>R²</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${modelRows}
            </tbody>
          </table>

          <div class="forecast-small-note">
Decision Rule：${safeText(timing.rule || "-")}
Warnings：${warnings.length ? warnings.join(" / ") : "none"}
          </div>
        </div>
      `;
    }

    function renderDetail(stock){
      const panel = document.getElementById("detailPanel");

      if (!stock) {
        panel.innerHTML = `<div class="empty">沒有可顯示的股票。</div>`;
        return;
      }

      const details = buildPositionDetails(
        stock.symbol,
        vm.positions,
        vm.marketRuntime,
        vm.m7TodayMap,
        vm.m3Map
      );

      const marketComment =
        window.marketComments?.[stock.symbol] ||
        buildAutoComment(stock);

      const sellSummaryRows = getSellSummaryForSymbol(stock.symbol);

      const overviewHtml = `
        <div class="detail-grid">
          <div class="mini">
            <div class="label">持倉概況</div>
            <div class="kv"><div class="small">數量</div><div>${fmtInt(stock.quantity)} 股</div></div>
            <div class="kv"><div class="small">成本</div><div>$${fmtNum(stock.cost)}</div></div>
            <div class="kv"><div class="small">現價</div><div>$${fmtNum(stock.current)}</div></div>
            <div class="kv"><div class="small">損益</div><div class="${moneyClass(stock.pnl_amount)}">${Number(stock.pnl_amount) >= 0 ? "+" : ""}$${fmtInt(stock.pnl_amount)} / ${fmtNum(stock.pnl_pct)}%</div></div>
            <div class="kv"><div class="small">來源</div><div>${safeText(stock.source_id || "-")}</div></div>
          </div>

          <div class="mini">
            <div class="label">Sell Record Summary</div>
            ${renderSellSummaryTable(sellSummaryRows)}
          </div>

          <div class="mini">
            <div class="label">技術 / 今日評估</div>
            <div class="kv"><div class="small">today score</div><div>${stock.today_score ?? "-"}</div></div>
            <div class="kv"><div class="small">趨勢 / 結構 / 時機</div><div>${fmtNum(stock.trend_score)} / ${fmtNum(stock.structure_score)} / ${fmtNum(stock.timing_score)}</div></div>
            <div class="kv"><div class="small">估值 / 資金</div><div>${fmtNum(stock.valuation_score)} / ${fmtNum(stock.money_score)}</div></div>
            <div class="kv"><div class="small">狀態判讀</div><div>${safeText(stock.trend_state || "-")} / ${safeText(stock.structure_state || "-")} / ${safeText(stock.timing_state || "-")}</div></div>
            <div class="kv"><div class="small">1W / 1M線</div><div>${fmtNum(stock.line_1w)} / ${fmtNum(stock.line_1m)}</div></div>
            <div class="kv"><div class="small">3M線 / 年線</div><div>${fmtNum(stock.line_3m ?? stock.line_6m)} / ${fmtNum(stock.line_12m)}</div></div>
            <div class="kv"><div class="small">量比</div><div>${fmtNum(stock.volume_ratio)}</div></div>
            <div class="kv"><div class="small">自動判讀</div><div>${safeText(stock.health_note || "-")}</div></div>
          </div>
        </div>
      `;

      const chartHtml = `
        <div class="chart-box">
          <div class="section-title">價格區間圖</div>
          ${renderLineChart(stock)}
          <div class="small" style="margin-top:8px;">目前先接真價格與代理線：1M 代 MA50、3M 代 MA200、12M 作年線。真 K 線後面再補。</div>
        </div>
      `;

      const detailPositionsHtml = `
        <div class="mini">
          <div class="section-title">多部位展開</div>
          ${details.length ? details.map(d => `
            <div class="position-card">
              <div class="row">
                <div><b>${safeText(d.role || "部位")}</b></div>
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                  <div class="strength-badge ${strengthClass(d.strength)}">${safeText(d.strength || "-")}</div>
                  <div class="badge ${statusClass(d.status_eval)}">${safeText(d.status_eval || "-")}</div>
                </div>
              </div>
              <div class="kv"><div class="small">股數</div><div>${fmtInt(d.quantity)} 股</div></div>
              <div class="kv"><div class="small">成本</div><div>$${fmtNum(d.cost)}</div></div>
              <div class="kv"><div class="small">現價</div><div>$${fmtNum(d.current)}</div></div>
              <div class="kv"><div class="small">損益</div><div class="${moneyClass(d.pnl_amount)}">${Number(d.pnl_amount) >= 0 ? "+" : ""}$${fmtInt(d.pnl_amount)} / ${fmtNum(d.pnl_pct)}%</div></div>
              <div class="kv"><div class="small">來源</div><div>${safeText(d.source_id || "-")} / ${safeText(d.bank || "-")}</div></div>
            </div>
          `).join("") : `<div class="small">無部位明細</div>`}
        </div>
      `;

      const sellSummaryHtml = `
        <div class="mini">
          <div class="section-title">Sell Record Summary</div>
          ${renderSellSummaryTable(sellSummaryRows)}
        </div>
      `;

      const whyValuationHtml = `
        ${renderWhyBlock(stock)}
        <div style="margin-top:14px;">${renderValuationBlock(stock)}</div>
      `;

      panel.innerHTML = `
        <div class="detail-head">
          <div>
            <h2 class="detail-title">${safeText(stock.symbol)} ｜ ${safeText(stock.name || "")}</h2>
            <div class="detail-sub">
              ${safeText(stock.source_type || "-")} ・ ${safeText(stock.category || "-")} ・ ${safeText(stock.sector || "-")} ・ FCN來源：${safeText(stock.source_id || "-")} ・ 更新：${safeText(stock.last_update || "-")}
            </div>
            <div class="detail-tags">
              <div class="strength-badge ${strengthClass(stock.strength)}">強弱：${safeText(stock.strength || "-")}</div>
              <div class="badge ${statusClass(stock.status_eval)}">${safeText(stock.status_eval || "-")}</div>
              ${stock.action_today ? `<div class="badge">${safeText(stock.action_today)}</div>` : ""}
              ${stock.ui_bucket ? `<div class="badge">${safeText(stock.ui_bucket)}</div>` : ""}
            </div>
          </div>
          <div class="badge ${statusClass(stock.status_eval)}">${safeText(stock.status_eval || "-")}</div>
        </div>

        <div class="section-tools">
          <button class="mini-btn" onclick="window.toggleAllSections(true)">全部展開</button>
          <button class="mini-btn" onclick="window.toggleAllSections(false)">全部收合</button>
        </div>

        ${renderSectionBox("sec_overview", "持倉概況 / 技術評估", overviewHtml, true)}
        ${renderSectionBox("sec_trading", "市場評論 / 技術提醒", renderTradingPanel(marketComment), true)}
        ${renderSectionBox("sec_m3", "M3 Market Comment", renderM3MarketCommentBlock(stock), true)}
        ${renderSectionBox("sec_chart", "價格區間圖", chartHtml, true)}
        ${renderSectionBox("sec_forecast_debug", "M6 Price Forecast / v9.1 決策推估", renderForecastDebugPanel(stock), false)}
        ${renderSectionBox("sec_positions", "多部位展開", detailPositionsHtml, true)}
        ${(stock.exposure_alert && stock.exposure_alert.text) ? renderSectionBox("sec_exposure", "曝險警示", `
          <div class="mini warn-card">
            <div class="comment-box">⚠️ ${safeText(stock.exposure_alert.text)}</div>
          </div>
        `, true) : ""}
                ${renderSectionBox("sec_valuation", "Why / Valuation / Final Note", whyValuationHtml, true)}
      `;
    }

    function rerender(){
      const filtered = getFilteredAggregates();
      renderSummary(filtered);
      renderList(filtered);

      const stock = filtered.find(x => x.symbol === selectedSymbol) || filtered[0];
      renderDetail(stock);
    }

    window.toggleSection = function(id){
      const body = document.getElementById(id);
      const icon = document.getElementById(`${id}_icon`);
      if (!body) return;
      body.classList.toggle("is-collapsed");
      if (icon) {
        icon.textContent = body.classList.contains("is-collapsed") ? "▸" : "▾";
      }
    };

    window.toggleAllSections = function(open){
      document.querySelectorAll(".section-body").forEach(body => {
        const id = body.id;
        const icon = document.getElementById(`${id}_icon`);
        if (open) body.classList.remove("is-collapsed");
        else body.classList.add("is-collapsed");
        if (icon) icon.textContent = open ? "▾" : "▸";
      });
    };

    async function init(){
      try {
        const raw = await loadM6Data({
          positionsUrl: "./data/m6/positions.json",
          marketUrl: "./data/market_runtime.json",
          m7TodayUrl: "./data/m7/m7_new_stock_today.json",
          m3OutputUrl: "./data/m3/m3_output.json"
        });

        vm = buildM6ViewModel(raw);

        const marketComments = await loadJson("./data/m6/market_comments.json").catch(() => ({}));
        window.marketComments = marketComments;

        sellRecordsRaw = await loadJson("./data/m6/sell_records.json").catch(() => []);
        sellSummary = buildSellSummary(Array.isArray(sellRecordsRaw) ? sellRecordsRaw : []);

        priceForecastDebug = await loadJson("./data/m6/price_forecast_debug.json").catch(() => null);

        window.vm = vm;
        window.stocks = vm.aggregates;
        window.selectStock = function(symbol){
          selectedSymbol = symbol;
          rerender();
        };

        const items = sortAggregates(vm.aggregates, "risk");
        if (items.length) selectedSymbol = items[0].symbol;

        document.getElementById("searchInput").addEventListener("input", rerender);
        document.getElementById("sourceFilter").addEventListener("change", rerender);
        document.getElementById("statusFilter").addEventListener("change", rerender);
        document.getElementById("sortMode").addEventListener("change", rerender);

        rerender();
      } catch (err) {
        console.error("M6 初始化失敗", err);
        document.getElementById("detailPanel").innerHTML = `
          <div class="mini warn-card">
            <div class="section-title">初始化失敗</div>
            <div class="comment-box">${safeText(String(err))}</div>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
