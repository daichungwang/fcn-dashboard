<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M6 Stocks Dashboard</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:#1e293b;
      --panel-2:#243447;
      --text:#e2e8f0;
      --muted:#94a3b8;
      --green:#22c55e;
      --red:#ef4444;
      --yellow:#facc15;
      --blue:#38bdf8;
      --purple:#a78bfa;
      --border:rgba(255,255,255,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
      background:linear-gradient(180deg,#e0f2fe 0%,#f0f9ff 100%);
      color:#0f172a;
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:16px;
    }
    .hero{
      background:linear-gradient(135deg,#1d4ed8 0%,#0f172a 70%);
      border:1px solid var(--border);
      border-radius:20px;
      padding:18px;
      margin-bottom:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    .hero h1{
      margin:0 0 6px;
      font-size:26px;
    }
    .hero .sub{
      color:#cbd5e1;
      font-size:14px;
    }
    .toolbar{
      display:grid;
      grid-template-columns:1fr 140px 140px;
      gap:10px;
      margin-top:14px;
    }
    .input,.select{
      width:100%;
      border-radius:12px;
      border:1px solid var(--border);
      background:#f0f9ff;
      color:#0f172a;
      padding:12px 14px;
      font-size:14px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:16px;
    }
    .card{
      background:#e0f2fe;
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
      box-shadow:0 8px 24px rgba(0,0,0,.2);
    }
    .summary-card{grid-column:span 2}
    .full{grid-column:1/-1}
    .list-panel{grid-column:span 5}
    .detail-panel{grid-column:span 7}
    .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
    }
    .metric{
      font-size:22px;
      font-weight:800;
      line-height:1.1;
    }
    .small{
      font-size:13px;
      color:var(--muted);
    }
    .green{color:var(--green)}
    .red{color:var(--red)}
    .yellow{color:var(--yellow)}
    .blue{color:var(--blue)}
    .stock-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:640px;
      overflow:auto;
      padding-right:4px;
    }
    .stock-item{
      background:#bae6fd;
      border:1px solid transparent;
      border-radius:14px;
      padding:12px;
      cursor:pointer;
      transition:.15s ease;
    }
    .stock-item:hover{border-color:rgba(56,189,248,.45)}
    .stock-item.active{
      border-color:rgba(56,189,248,.9);
      box-shadow:inset 0 0 0 1px rgba(56,189,248,.35);
    }

    .stock-item.healthy{
      background:linear-gradient(180deg, rgba(34,197,94,.10), rgba(36,52,71,.95));
    }
    .stock-item.watch{
      background:linear-gradient(180deg, rgba(250,204,21,.10), rgba(36,52,71,.95));
    }
    .stock-item.danger{
      background:linear-gradient(180deg, rgba(239,68,68,.12), rgba(36,52,71,.95));
    }
    .strength-badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      font-weight:700;
      border:1px solid var(--border);
      background:#f0f9ff;
    }
    .strength-strong{
      color:#86efac;
      background:rgba(34,197,94,.2);
    }
    .strength-neutral{
      color:#fde68a;
      background:rgba(250,204,21,.25);
    }
    .strength-weak{
      color:#fca5a5;
      background:rgba(239,68,68,.2);
    }
    .rank-no{
      display:inline-flex;
      width:24px;
      height:24px;
      border-radius:999px;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:800;
      background:#f0f9ff;
      border:1px solid var(--border);
      color:#cbd5e1;
      margin-right:8px;
    }
    .detail-tags{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }
    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .name{
      font-size:16px;
      font-weight:700;
    }
    .ticker{
      font-size:12px;
      color:var(--muted);
    }

    .stock-stats{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:6px 12px;
      margin-top:10px;
      font-size:13px;
    }
    .stat-line{
      display:flex;
      justify-content:space-between;
      gap:8px;
      color:#cbd5e1;
    }
    .stat-line .k{
      color:var(--muted);
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      font-weight:700;
      background:#f0f9ff;
      border:1px solid var(--border);
    }
    .badge.red{background:rgba(239,68,68,.12)}
    .badge.yellow{background:rgba(250,204,21,.25); color:#fde68a}
    .badge.green{background:rgba(34,197,94,.12)}
    .detail-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
    }
    .detail-title{
      font-size:28px;
      font-weight:800;
      margin:0;
    }
    .detail-sub{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
    }
    .detail-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px;
      margin-bottom:16px;
    }
    .mini{
      background:#f0f9ff;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
    }
    .kv{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:8px;
      font-size:14px;
      margin:6px 0;
    }
    .chart-box{
      background:#f0f9ff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
      margin-bottom:14px;
    }
    .price-chart{
      position:relative;
      height:240px;
      border-radius:12px;
      overflow:hidden;
      background:
        linear-gradient(to top, rgba(56,189,248,.06), rgba(56,189,248,0)),
        linear-gradient(to bottom, rgba(255,255,255,.04), rgba(255,255,255,0));
      border:1px solid rgba(255,255,255,.05);
    }
    .price-chart svg{
      width:100%;
      height:100%;
      display:block;
    }
    .line-mark{
      position:absolute;
      left:0;
      right:0;
      border-top:1px dashed;
      font-size:11px;
      padding-left:8px;
      color:#cbd5e1;
      pointer-events:none;
    }
    .section-title{
      font-size:16px;
      font-weight:800;
      margin:0 0 10px;
    }
    .strategy{
      line-height:1.65;
      font-size:14px;
    }
    .strategy b{color:#fff}
    @media (max-width: 900px){
      .summary-card,.list-panel,.detail-panel{grid-column:1/-1}
      .toolbar{grid-template-columns:1fr}
      .detail-grid{grid-template-columns:1fr}
      .detail-title{font-size:24px}
      .hero h1{font-size:22px}
    }
  </style>
</head>
<body>

      <div class="sub">振宇持股管理沙盒｜多檔 Dashboard 強化版（排序 / 強弱 / 顏色）</div>
      <div class="toolbar" style="grid-template-columns:1.3fr 1fr 1fr 1fr;">
        <input id="searchInput" class="input" placeholder="搜尋股票代號或名稱，例如 ORCL / COIN" />
        <select id="sourceFilter" class="select">

          <option value="all">全部狀態</option>
          <option value="健康">健康</option>
          <option value="觀察">觀察</option>
          <option value="危險">危險</option>

        <select id="sortMode" class="select">

          <option value="strength">依強弱排序</option>
          <option value="pnl">依損益金額排序</option>
          <option value="return">依損益率排序</option>

    <div class="grid" id="summaryGrid" style="align-items:stretch;"></div>

    <div class="grid" style="margin-top:16px;">
      <div class="card list-panel">
        <div class="section-title">多檔持股總覽</div>
        <div class="small" style="margin-bottom:12px;">點選左側個股，右側會顯示詳情、價格區間與策略。</div>
        <div id="stockList" class="stock-list"></div>

      <div class="card detail-panel">
        <div id="detailPanel"></div>

    </div>
  </div>

let selectedSymbol = "ORCL";

function pnl(stock){
  const diff = stock.current - stock.cost;
  const pct = stock.cost ? (diff / stock.cost) * 100 : 0;
  return { diff, pct };
}

function statusClass(status){
  if (status === "健康") return "green";
  if (status === "觀察") return "yellow";
  return "red";
}


function strengthClass(strength){
  if (strength === "強") return "strength-strong";
  if (strength === "中") return "strength-neutral";
  return "strength-weak";
}

function statusWeight(status){
  if (status === "危險") return 0;
  if (status === "觀察") return 1;
  return 2;
}

function strengthWeight(strength){
  if (strength === "強") return 2;
  if (strength === "中") return 1;
  return 0;
}

function sortStocks(data){
  const mode = document.getElementById("sortMode")?.value || "risk";
  const arr = [...data];
  arr.sort((a,b) => {
    const pa = pnl(a), pb = pnl(b);
    const paAmt = pa.diff * a.quantity;
    const pbAmt = pb.diff * b.quantity;
    if (mode === "risk") {
      return statusWeight(a.status) - statusWeight(b.status) || strengthWeight(a.strength) - strengthWeight(b.strength) || a.symbol.localeCompare(b.symbol);
    }
    if (mode === "strength") {
      return strengthWeight(b.strength) - strengthWeight(a.strength) || statusWeight(a.status) - statusWeight(b.status) || a.symbol.localeCompare(b.symbol);
    }
    if (mode === "pnl") {
      return pbAmt - paAmt;
    }
    if (mode === "return") {
      return pb.pct - pa.pct;
    }
    return a.symbol.localeCompare(b.symbol);
  });
  return arr;
}

function calcSummary(data){
  const totalCost = data.reduce((s, x) => s + x.cost * x.quantity, 0);
  const totalValue = data.reduce((s, x) => s + x.current * x.quantity, 0);
  const totalPnl = totalValue - totalCost;
  return {
    count: data.length,
    totalCost,
    totalValue,
    totalPnl,
    healthy: data.filter(x => x.status === "健康").length,
    watch: data.filter(x => x.status === "觀察").length,
    danger: data.filter(x => x.status === "危險").length
  };
}

function renderSummary(data){
  const s = calcSummary(data);
  const pnlClass = s.totalPnl >= 0 ? "green" : "red";
  document.getElementById("summaryGrid").innerHTML = `
    <div class="card summary-card">
      <div class="label">檔數</div>
      <div class="metric">${s.count}</div>
    </div>
    <div class="card summary-card">
      <div class="label">總成本</div>
      <div class="metric">$${s.totalCost.toFixed(0)}</div>
    </div>
    <div class="card summary-card">
      <div class="label">總市值</div>
      <div class="metric">$${s.totalValue.toFixed(0)}</div>
    </div>
    <div class="card summary-card">
      <div class="label">總損益</div>
      <div class="metric ${pnlClass}">${s.totalPnl >= 0 ? "+" : ""}$${s.totalPnl.toFixed(0)}</div>
    </div>
    <div class="card summary-card">
      <div class="label">健康/觀察/危險</div>
      <div class="metric"><span class="green">${s.healthy}</span>/<span class="yellow">${s.watch}</span>/<span class="red">${s.danger}</span></div>
    </div>
  `;
}

function getFilteredStocks(){
  const search = document.getElementById("searchInput").value.trim().toLowerCase();
  const source = document.getElementById("sourceFilter").value;
  const status = document.getElementById("statusFilter").value;

  let result = stocks.filter(s => {
    const hitSearch = !search || s.symbol.toLowerCase().includes(search) || s.name.toLowerCase().includes(search);
    const hitSource = source === "all" || s.source === source;
    const hitStatus = status === "all" || s.status === status;
    return hitSearch && hitSource && hitStatus;
  });

  result = sortStocks(result);

  if (!result.find(x => x.symbol === selectedSymbol) && result.length) {
    selectedSymbol = result[0].symbol;
  }
  return result;
}

function renderList(data){
  const el = document.getElementById("stockList");
  el.innerHTML = data.map((stock, idx) => {
    const p = pnl(stock);
    const cls = p.diff >= 0 ? "green" : "red";
    const active = stock.symbol === selectedSymbol ? "active" : "";
    const pnlAmt = p.diff * stock.quantity;
    const statusTone = stock.status === "健康" ? "healthy" : stock.status === "觀察" ? "watch" : "danger";
    return `
      <div class="stock-item ${active} ${statusTone}" onclick="selectStock('${stock.symbol}')">
        <div class="row">
          <div>
            <div class="name"><span class="rank-no">${idx + 1}</span>${stock.symbol} <span class="ticker">｜${stock.name}</span></div>
            <div class="small">${stock.source} ・ ${stock.category}</div>
          </div>
          <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
            <div class="strength-badge ${strengthClass(stock.strength)}">強弱：${stock.strength}</div>
            <div class="badge ${statusClass(stock.status)}">${stock.status}</div>
          </div>
        </div>

        <div class="stock-stats">
          <div class="stat-line"><span class="k">股數</span><span>${stock.quantity}</span></div>
          <div class="stat-line"><span class="k">成本</span><span>$${stock.cost.toFixed(2)}</span></div>
          <div class="stat-line"><span class="k">現價</span><span>$${stock.current.toFixed(2)}</span></div>
          <div class="stat-line"><span class="k">價差</span><span class="${cls}">${p.diff >= 0 ? "+" : ""}${p.diff.toFixed(2)}</span></div>
          <div class="stat-line"><span class="k">損益金額</span><span class="${cls}">${pnlAmt >= 0 ? "+" : ""}$${pnlAmt.toFixed(0)}</span></div>
          <div class="stat-line"><span class="k">損益率</span><span class="${cls}">${p.pct >= 0 ? "+" : ""}${p.pct.toFixed(1)}%</span></div>
          <div class="stat-line"><span class="k">單日變化</span><span class="${(stock.delta_1d ?? 0) >= 0 ? 'green' : 'red'}">${(stock.delta_1d ?? 0) >= 0 ? "+" : ""}${(stock.delta_1d ?? 0).toFixed ? (stock.delta_1d ?? 0).toFixed(2) : stock.delta_1d}%</span></div>
        </div>
      </div>
    `;
  }).join("") || `<div class="small">目前沒有符合條件的股票。</div>`;
}

function priceToY(value, min, max, h){
  if (max === min) return h / 2;
  return ((max - value) / (max - min)) * h;
}

function renderLineChart(stock){
  const data = stock.series && stock.series.length ? stock.series : [
    stock.line_12m, stock.line_6m, stock.line_1m, stock.line_1w, stock.current
  ].filter(v => Number.isFinite(v));
  const allRef = [
    ...data,
    stock.cost,
    stock.current,
    ...stock.support,
    ...stock.resistance,
    stock.ma50,
    stock.ma200
  ].filter(v => Number.isFinite(v));
  const min = Math.min(...allRef) * 0.97;
  const max = Math.max(...allRef) * 1.03;
  const w = 880;
  const h = 240;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1 || 1)) * w;
    const y = priceToY(v, min, max, h);
    return `${x},${y}`;
  }).join(" ");
  const fillPts = `0,${h} ${pts} ${w},${h}`;

  const marks = [
    { label:`成本 ${stock.cost.toFixed(2)}`, value:stock.cost, color:"#22c55e" },
    { label:`現價 ${stock.current.toFixed(2)}`, value:stock.current, color:"#ef4444" },
    { label:`1M代MA50 ${stock.line_1m?.toFixed ? stock.line_1m.toFixed(2) : stock.line_1m}`, value:stock.line_1m, color:"#38bdf8" },
    { label:`6M代MA200 ${stock.line_6m?.toFixed ? stock.line_6m.toFixed(2) : stock.line_6m}`, value:stock.line_6m, color:"#7c3aed" },
    { label:`年線 ${stock.line_12m?.toFixed ? stock.line_12m.toFixed(2) : stock.line_12m}`, value:stock.line_12m, color:"#f59e0b" },
    { label:`支撐 ${stock.support[0]}`, value:stock.support[0], color:"#94a3b8" },
    { label:`壓力 ${stock.resistance[0]}`, value:stock.resistance[0], color:"#64748b" }
  ];

  return `
    <div class="price-chart">
      ${marks.map(m => {
        const top = priceToY(m.value, min, max, h);
        return `<div class="line-mark" style="top:${top}px;border-color:${m.color};">${m.label}</div>`;
      }).join("")}
      <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-label="price chart">
        <polyline points="${fillPts}" fill="rgba(56,189,248,.10)" stroke="none"></polyline>
        <polyline points="${pts}" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
      </svg>
    </div>
  `;
}

function renderDetail(stock){
  const p = pnl(stock);
  const cls = p.diff >= 0 ? "green" : "red";
  document.getElementById("detailPanel").innerHTML = `
    <div class="detail-head">
      <div>
        <h2 class="detail-title">${stock.symbol} ｜ ${stock.name}</h2>
        <div class="detail-sub">${stock.source} ・ ${stock.category} ・ FCN來源：${stock.fcn_id} ・ 更新：${stock.last_update || "-"}</div><div class="detail-tags"><div class="strength-badge ${strengthClass(stock.strength)}">強弱：${stock.strength}</div><div class="badge ${statusClass(stock.status)}">${stock.status}</div></div>
      </div>
      <div class="badge ${statusClass(stock.status)}">${stock.status}</div>
    </div>

    <div class="detail-grid">
      <div class="mini">
        <div class="label">持倉概況</div>
        <div class="kv"><div class="small">數量</div><div>${stock.quantity} 股</div></div>
        <div class="kv"><div class="small">成本</div><div>$${stock.cost.toFixed(2)}</div></div>
        <div class="kv"><div class="small">現價</div><div>$${stock.current.toFixed(2)}</div></div>
        <div class="kv"><div class="small">損益</div><div class="${cls}">${p.diff >= 0 ? "+" : ""}$${p.diff.toFixed(2)} / ${p.pct.toFixed(1)}%</div></div>
      </div>
      <div class="mini">
        <div class="label">技術概況</div>
        <div class="kv"><div class="small">趨勢</div><div>${stock.trend}</div></div>
        <div class="kv"><div class="small">RSI</div><div class="${stock.rsi >= 70 ? 'red' : stock.rsi >= 55 ? 'yellow' : 'green'}">${stock.rsi}</div></div>
        <div class="kv"><div class="small">MA50 / MA200</div><div>${stock.ma50} / ${stock.ma200}</div></div>
        <div class="kv"><div class="small">銀行</div><div>${stock.bank}</div></div>
      </div>
    </div>

    <div class="chart-box">
      <div class="section-title">價格區間圖</div>
      ${renderLineChart(stock)}
      <div class="small" style="margin-top:8px;">目前先接真價格與代理線：1M 代 MA50、6M 代 MA200、12M 作年線。真 K 線後面再補。</div>
    </div>

    <div class="detail-grid">
      <div class="mini">
        <div class="section-title">支撐 / 壓力</div>
        <div class="kv"><div class="small">支撐</div><div>${stock.support.join(" / ")}</div></div>
        <div class="kv"><div class="small">壓力</div><div>${stock.resistance.join(" / ")}</div></div>
      </div>
      <div class="mini">
        <div class="section-title">策略摘要</div>
        <div class="strategy">${stock.strategy.summary}</div>
        <div class="kv"><div class="small">目前損益金額</div><div class="${cls}">${(p.diff * stock.quantity) >= 0 ? "+" : ""}$${(p.diff * stock.quantity).toFixed(0)}</div></div>
        <div class="kv"><div class="small">目前損益率</div><div class="${cls}">${p.pct >= 0 ? "+" : ""}${p.pct.toFixed(1)}%</div></div>
        <div class="kv"><div class="small">換股觀察</div><div>${stock.switch_to && stock.switch_to.length ? stock.switch_to.join(" / ") : "目前不需換股"}</div></div>
      </div>
    </div>

    <div class="mini">
      <div class="section-title">三段策略</div>
      <div class="strategy">
        <div><b>保守：</b>${stock.strategy.conservative}</div>
        <div class="small">若現在執行，預估損益金額：<span class="${cls}">${(p.diff * stock.quantity) >= 0 ? "+" : ""}$${(p.diff * stock.quantity).toFixed(0)}</span></div>
        <div style="margin-top:8px;"><b>中性：</b>${stock.strategy.neutral}</div>
        <div class="small">適合先收回部分資金，再保留延伸空間。</div>
        <div style="margin-top:8px;"><b>積極：</b>${stock.strategy.aggressive}</div>
        <div class="small">需接受較大波動，策略意義建立在後續價差擴大。</div>
      </div>
    </div>
  `;
}

function selectStock(symbol){
  selectedSymbol = symbol;
  rerender();
}
window.selectStock = selectStock;

function rerender(){
  const filtered = getFilteredStocks();
  renderSummary(filtered);
  renderList(filtered);
  const stock = filtered.find(s => s.symbol === selectedSymbol) || filtered[0];
  if (stock) renderDetail(stock);
  else document.getElementById("detailPanel").innerHTML = `<div class="small">沒有可顯示的股票。</div>`;
}

document.getElementById("searchInput").addEventListener("input", rerender);
document.getElementById("sourceFilter").addEventListener("change", rerender);
document.getElementById("statusFilter").addEventListener("change", rerender);
document.getElementById("sortMode").addEventListener("change", rerender);

rerender();
</script>
