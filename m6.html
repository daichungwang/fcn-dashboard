<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M6 Stocks Dashboard</title>
  <style>
    :root{
      --bg:#eef6fb;
      --bg-2:#f7fbfe;
      --panel:#ffffff;
      --panel-2:#f8fbfd;
      --text:#0f172a;
      --text-2:#1e293b;
      --muted:#475569;
      --muted-2:#64748b;
      --green:#15803d;
      --red:#dc2626;
      --yellow:#b45309;
      --blue:#0ea5e9;
      --purple:#7c3aed;
      --border:#dbe7f0;
      --shadow:0 10px 28px rgba(15, 23, 42, .08);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
      background:linear-gradient(180deg,var(--bg) 0%, var(--bg-2) 100%);
      color:var(--text);
    }
    .wrap{
      max-width:1440px;
      margin:0 auto;
      padding:16px;
    }
    .hero{
      background:linear-gradient(135deg,#173b8f 0%, #0b1220 100%);
      color:#fff;
      border:1px solid #173b8f;
      border-radius:20px;
      padding:18px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }
    .hero h1{
      margin:0 0 6px;
      font-size:24px;
      font-weight:800;
    }
    .hero .sub{
      color:#dbeafe;
      font-size:14px;
      margin-bottom:14px;
    }
    .toolbar{
      display:grid;
      grid-template-columns:1.2fr 1fr 1fr 1fr;
      gap:12px;
    }
    .input,.select{
      width:100%;
      border-radius:12px;
      border:1px solid var(--border);
      background:#ffffff;
      color:var(--text);
      padding:12px 14px;
      font-size:14px;
      box-shadow:0 1px 2px rgba(15,23,42,.03);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:16px;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
    }
    .summary-card{grid-column:span 2}
    .full{grid-column:1/-1}
    .list-panel{grid-column:span 4}
    .detail-panel{grid-column:span 8}
    .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
      font-weight:700;
      letter-spacing:.2px;
    }
    .metric{
      font-size:22px;
      font-weight:800;
      line-height:1.1;
      color:var(--text);
    }
    .small{
      font-size:13px;
      color:var(--muted-2);
    }
    .green{color:var(--green)}
    .red{color:var(--red)}
    .yellow{color:var(--yellow)}
    .blue{color:var(--blue)}
    .section-title{
      font-size:16px;
      font-weight:800;
      margin:0 0 10px;
    }

    .stock-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:760px;
      overflow:auto;
      padding-right:4px;
    }
    .stock-item{
      background:var(--panel-2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      cursor:pointer;
      transition:.15s ease;
      box-shadow:0 4px 14px rgba(15,23,42,.04);
    }
    .stock-item:hover{
      border-color:rgba(14,165,233,.55);
      transform:translateY(-1px);
    }
    .stock-item.active{
      border-color:rgba(14,165,233,.95);
      box-shadow:inset 0 0 0 1px rgba(14,165,233,.25), 0 8px 18px rgba(14,165,233,.12);
    }
    .stock-item.healthy{background:linear-gradient(180deg,#f0fdf4,#ffffff);}
    .stock-item.watch{background:linear-gradient(180deg,#fffbeb,#ffffff);}
    .stock-item.danger{background:linear-gradient(180deg,#fef2f2,#ffffff);}

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .name{
      font-size:17px;
      font-weight:800;
      color:var(--text);
    }
    .ticker{
      font-size:12px;
      color:var(--muted-2);
      font-weight:600;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      font-weight:800;
      background:#ffffff;
      border:1px solid var(--border);
      color:var(--text-2);
    }
    .badge.red{background:#fee2e2;color:#b91c1c;border-color:#fecaca}
    .badge.yellow{background:#fef3c7;color:#92400e;border-color:#fde68a}
    .badge.green{background:#dcfce7;color:#166534;border-color:#bbf7d0}

    .strength-badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--border);
      background:#ffffff;
    }
    .strength-strong{color:#166534;background:#dcfce7;border-color:#bbf7d0}
    .strength-neutral{color:#92400e;background:#fef3c7;border-color:#fde68a}
    .strength-weak{color:#b91c1c;background:#fee2e2;border-color:#fecaca}

    .rank-no{
      display:inline-flex;
      width:24px;
      height:24px;
      border-radius:999px;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:800;
      background:#e0f2fe;
      border:1px solid #bae6fd;
      color:#075985;
      margin-right:8px;
    }

    .stock-stats{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:6px 12px;
      margin-top:10px;
      font-size:13px;
    }
    .stat-line{
      display:flex;
      justify-content:space-between;
      gap:8px;
      color:var(--text-2);
    }
    .stat-line .k{color:var(--muted)}

    .detail-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
    }
    .detail-title{
      font-size:28px;
      font-weight:800;
      margin:0;
    }
    .detail-sub{
      color:var(--muted-2);
      font-size:13px;
      margin-top:4px;
    }
    .detail-tags{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }

    .detail-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-bottom:16px;
    }
    .mini{
      background:#fbfdff;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
    }
    .kv{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:8px;
      font-size:14px;
      margin:6px 0;
    }

    .chart-box{
      background:#fbfdff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
      margin-bottom:14px;
    }
    .price-chart{
      position:relative;
      height:240px;
      border-radius:12px;
      overflow:hidden;
      background:
        linear-gradient(to top, rgba(14,165,233,.07), rgba(14,165,233,0)),
        linear-gradient(to bottom, rgba(15,23,42,.03), rgba(255,255,255,0));
      border:1px solid var(--border);
    }
    .price-chart svg{
      width:100%;
      height:100%;
      display:block;
    }
    .line-mark{
      position:absolute;
      left:0;
      right:0;
      border-top:1px dashed;
      font-size:11px;
      padding-left:8px;
      color:#64748b;
      pointer-events:none;
    }
    .strategy{
      line-height:1.65;
      font-size:14px;
    }
    .strategy b{color:#0f172a}

    .position-card{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:#ffffff;
      margin-bottom:10px;
    }
    .warn-card{
      background:#fff7ed;
      color:#9a3412;
      border:1px solid #fed7aa;
    }
    .good-card{
      background:#f0fdf4;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .empty{
      padding:24px;
      text-align:center;
      color:var(--muted);
    }

    @media (max-width: 980px){
      .toolbar{grid-template-columns:1fr}
      .summary-card,.list-panel,.detail-panel{grid-column:1/-1}
      .detail-grid{grid-template-columns:1fr}
      .detail-title{font-size:24px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>M6 Stocks Dashboard</h1>
      <div class="sub">振宇持股管理沙盒｜專業版 UI（高對比、清晰決策）｜M6 真資料版</div>
      <div class="toolbar">
        <input id="searchInput" class="input" placeholder="搜尋股票代號或名稱，例如 ORCL / COIN" />
        <select id="sourceFilter" class="select">
          <option value="all">全部來源</option>
          <option value="FCN接股">FCN接股</option>
          <option value="主動買進">主動買進</option>
        </select>
        <select id="statusFilter" class="select">
          <option value="all">全部狀態</option>
          <option value="健康">健康</option>
          <option value="觀察">觀察</option>
          <option value="危險">危險</option>
        </select>
        <select id="sortMode" class="select">
          <option value="risk">依風險排序</option>
          <option value="strength">依強弱排序</option>
          <option value="pnl">依損益金額排序</option>
          <option value="return">依損益率排序</option>
          <option value="score">依 today score 排序</option>
          <option value="symbol">依代號排序</option>
        </select>
      </div>
    </div>

    <div class="grid" id="summaryGrid"></div>

    <div class="card full" style="padding:12px 16px; margin-top:12px;">
      <div class="row" style="flex-wrap:wrap; gap:10px;">
        <div class="small"><b style="color:var(--text)">閱讀原則：</b>白卡看數字、色塊看風險、徽章看強弱；目前已接真價格，1M 代 MA50、6M 代 MA200、12M 作年線。</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <span class="badge green">健康</span>
          <span class="badge yellow">觀察</span>
          <span class="badge red">危險</span>
          <span class="strength-badge strength-strong">強</span>
          <span class="strength-badge strength-neutral">中</span>
          <span class="strength-badge strength-weak">弱</span>
        </div>
      </div>
    </div>

    <div class="grid" style="margin-top:16px;">
      <div class="card list-panel">
        <div class="section-title">多檔持股總覽</div>
        <div class="small" style="margin-bottom:12px;">左邊顯示合併後的持股，右邊展開單一股票的多筆部位與今日評估。</div>
        <div id="stockList" class="stock-list"></div>
      </div>

      <div class="card detail-panel">
        <div id="detailPanel" class="empty">載入中...</div>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      loadM6Data,
      buildM6ViewModel,
      sortAggregates,
      buildPositionDetails
    } from "./js/m6/m6_engine.js";

    let vm = null;
    let selectedSymbol = "";
    let currentAggregates = [];

    function statusClass(status){
      if (status === "健康") return "green";
      if (status === "觀察") return "yellow";
      return "red";
    }

    function statusTone(status){
      if (status === "健康") return "healthy";
      if (status === "觀察") return "watch";
      return "danger";
    }

    function strengthClass(strength){
      if (strength === "強") return "strength-strong";
      if (strength === "中") return "strength-neutral";
      return "strength-weak";
    }

    function moneyClass(value){
      return Number(value) >= 0 ? "green" : "red";
    }

    function fmtNum(value, digits = 2){
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      return n.toFixed(digits);
    }

    function fmtInt(value){
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      return Math.round(n).toString();
    }

    function renderSummary(items){
      const totalCost = items.reduce((s, x) => s + (Number(x.total_cost) || 0), 0);
      const totalValue = items.reduce((s, x) => s + (Number(x.market_value) || 0), 0);
      const totalPnl = totalValue - totalCost;
      const healthy = items.filter(x => x.status_eval === "健康").length;
      const watch = items.filter(x => x.status_eval === "觀察").length;
      const danger = items.filter(x => x.status_eval === "危險").length;

      document.getElementById("summaryGrid").innerHTML = `
        <div class="card summary-card">
          <div class="label">檔數</div>
          <div class="metric">${items.length}</div>
        </div>
        <div class="card summary-card">
          <div class="label">總成本</div>
          <div class="metric">$${fmtInt(totalCost)}</div>
        </div>
        <div class="card summary-card">
          <div class="label">總市值</div>
          <div class="metric">$${fmtInt(totalValue)}</div>
        </div>
        <div class="card summary-card">
          <div class="label">總損益</div>
          <div class="metric ${moneyClass(totalPnl)}">${totalPnl >= 0 ? "+" : ""}$${fmtInt(totalPnl)}</div>
        </div>
        <div class="card summary-card">
          <div class="label">健康 / 觀察 / 危險</div>
          <div class="metric">
            <span class="green">${healthy}</span> /
            <span class="yellow">${watch}</span> /
            <span class="red">${danger}</span>
          </div>
        </div>
        <div class="card summary-card">
          <div class="label">引擎</div>
          <div class="metric blue">AUTO</div>
        </div>
      `;
    }

    function getFilteredAggregates(){
      if (!vm) return [];

      const q = document.getElementById("searchInput").value.trim().toLowerCase();
      const source = document.getElementById("sourceFilter").value;
      const status = document.getElementById("statusFilter").value;
      const sortMode = document.getElementById("sortMode").value;

      let items = [...vm.aggregates].filter(item => {
        const hitSearch =
          !q ||
          (item.symbol || "").toLowerCase().includes(q) ||
          (item.name || "").toLowerCase().includes(q);

        const hitSource =
          source === "all" ||
          (item.source_type || "").includes(source);

        const hitStatus =
          status === "all" ||
          item.status_eval === status;

        return hitSearch && hitSource && hitStatus;
      });

      items = sortAggregates(items, sortMode);

      if (!selectedSymbol && items.length) selectedSymbol = items[0].symbol;
      if (selectedSymbol && !items.find(x => x.symbol === selectedSymbol) && items.length) {
        selectedSymbol = items[0].symbol;
      }

      return items;
    }

    function renderList(items){
      const el = document.getElementById("stockList");

      if (!items.length) {
        el.innerHTML = `<div class="empty">目前沒有符合條件的股票。</div>`;
        return;
      }

      el.innerHTML = items.map((stock, idx) => `
        <div class="stock-item ${statusTone(stock.status_eval)} ${stock.symbol === selectedSymbol ? "active" : ""}"
             onclick="window.selectStock('${stock.symbol}')">
          <div class="row">
            <div>
              <div class="name"><span class="rank-no">${idx + 1}</span>${stock.symbol} <span class="ticker">｜${stock.name || stock.symbol}</span></div>
              <div class="small">${stock.source_type || "-"} ・ ${stock.category || "-"} ・ ${stock.sector || "-"}</div>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
              <div class="strength-badge ${strengthClass(stock.strength)}">強弱：${stock.strength}</div>
              <div class="badge ${statusClass(stock.status_eval)}">${stock.status_eval}</div>
            </div>
          </div>

          <div class="stock-stats">
            <div class="stat-line"><span class="k">股數</span><span>${fmtInt(stock.quantity)}</span></div>
            <div class="stat-line"><span class="k">成本</span><span>$${fmtNum(stock.cost)}</span></div>
            <div class="stat-line"><span class="k">現價</span><span>$${fmtNum(stock.current)}</span></div>
            <div class="stat-line"><span class="k">價差</span><span class="${moneyClass(stock.price_gap)}">${stock.price_gap >= 0 ? "+" : ""}${fmtNum(stock.price_gap)}</span></div>
            <div class="stat-line"><span class="k">損益金額</span><span class="${moneyClass(stock.pnl_amount)}">${stock.pnl_amount >= 0 ? "+" : ""}$${fmtInt(stock.pnl_amount)}</span></div>
            <div class="stat-line"><span class="k">損益率</span><span class="${moneyClass(stock.pnl_pct)}">${stock.pnl_pct >= 0 ? "+" : ""}${fmtNum(stock.pnl_pct)}%</span></div>
            <div class="stat-line"><span class="k">單日變化</span><span class="${moneyClass(stock.delta_1d)}">${stock.delta_1d >= 0 ? "+" : ""}${fmtNum(stock.delta_1d)}%</span></div>
            <div class="stat-line"><span class="k">today score</span><span>${stock.today_score ?? "-"}</span></div>
          </div>
        </div>
      `).join("");
    }

    function priceToY(value, min, max, h){
      if (!Number.isFinite(value)) return h / 2;
      if (max === min) return h / 2;
      return ((max - value) / (max - min)) * h;
    }

    function renderLineChart(stock){
      const series = [
        stock.line_12m,
        stock.line_6m,
        stock.line_1m,
        stock.line_1w,
        stock.current
      ].filter(v => Number.isFinite(Number(v))).map(Number);

      const allRef = [
        ...series,
        Number(stock.cost),
        Number(stock.current),
        Number(stock.line_1m),
        Number(stock.line_6m),
        Number(stock.line_12m)
      ].filter(v => Number.isFinite(v));

      const min = Math.min(...allRef) * 0.95;
      const max = Math.max(...allRef) * 1.05;
      const w = 880;
      const h = 240;

      const pts = series.map((v, i) => {
        const x = (i / Math.max(series.length - 1, 1)) * w;
        const y = priceToY(v, min, max, h);
        return `${x},${y}`;
      }).join(" ");

      const fillPts = `0,${h} ${pts} ${w},${h}`;

      const marks = [
        { label:`成本 ${fmtNum(stock.cost)}`, value:Number(stock.cost), color:"#22c55e" },
        { label:`現價 ${fmtNum(stock.current)}`, value:Number(stock.current), color:"#ef4444" },
        { label:`1M代MA50 ${fmtNum(stock.line_1m)}`, value:Number(stock.line_1m), color:"#38bdf8" },
        { label:`6M代MA200 ${fmtNum(stock.line_6m)}`, value:Number(stock.line_6m), color:"#7c3aed" },
        { label:`年線 ${fmtNum(stock.line_12m)}`, value:Number(stock.line_12m), color:"#f59e0b" }
      ].filter(x => Number.isFinite(x.value));

      return `
        <div class="price-chart">
          ${marks.map(m => {
            const top = priceToY(m.value, min, max, h);
            return `<div class="line-mark" style="top:${top}px;border-color:${m.color};">${m.label}</div>`;
          }).join("")}
          <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
            <polyline points="${fillPts}" fill="rgba(56,189,248,.10)" stroke="none"></polyline>
            <polyline points="${pts}" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
          </svg>
        </div>
      `;
    }

    function renderDetail(stock){
      const panel = document.getElementById("detailPanel");

      if (!stock) {
        panel.innerHTML = `<div class="empty">沒有可顯示的股票。</div>`;
        return;
      }

      const details = buildPositionDetails(
        stock.symbol,
        vm.positions,
        vm.marketRuntime,
        vm.m7TodayMap
      );

      panel.innerHTML = `
        <div class="detail-head">
          <div>
            <h2 class="detail-title">${stock.symbol} ｜ ${stock.name || ""}</h2>
            <div class="detail-sub">
              ${stock.source_type || "-"} ・ ${stock.category || "-"} ・ ${stock.sector || "-"} ・ FCN來源：${stock.source_id || "-"} ・ 更新：${stock.last_update || "-"}
            </div>
            <div class="detail-tags">
              <div class="strength-badge ${strengthClass(stock.strength)}">強弱：${stock.strength}</div>
              <div class="badge ${statusClass(stock.status_eval)}">${stock.status_eval}</div>
              ${stock.action_today ? `<div class="badge">${stock.action_today}</div>` : ""}
              ${stock.ui_bucket ? `<div class="badge">${stock.ui_bucket}</div>` : ""}
            </div>
          </div>
          <div class="badge ${statusClass(stock.status_eval)}">${stock.status_eval}</div>
        </div>

        <div class="detail-grid">
          <div class="mini">
            <div class="label">合併持倉概況</div>
            <div class="kv"><div class="small">數量</div><div>${fmtInt(stock.quantity)} 股</div></div>
            <div class="kv"><div class="small">成本</div><div>$${fmtNum(stock.cost)}</div></div>
            <div class="kv"><div class="small">現價</div><div>$${fmtNum(stock.current)}</div></div>
            <div class="kv"><div class="small">損益</div><div class="${moneyClass(stock.pnl_amount)}">${stock.pnl_amount >= 0 ? "+" : ""}$${fmtInt(stock.pnl_amount)} / ${fmtNum(stock.pnl_pct)}%</div></div>
            <div class="kv"><div class="small">來源</div><div>${stock.source_id || "-"}</div></div>
          </div>

          <div class="mini">
            <div class="label">技術 / 今日評估</div>
            <div class="kv"><div class="small">1W / 1M線</div><div>${fmtNum(stock.line_1w)} / ${fmtNum(stock.line_1m)}</div></div>
            <div class="kv"><div class="small">6M線 / 年線</div><div>${fmtNum(stock.line_6m)} / ${fmtNum(stock.line_12m)}</div></div>
            <div class="kv"><div class="small">量比</div><div>${fmtNum(stock.volume_ratio)}</div></div>
            <div class="kv"><div class="small">today score</div><div>${stock.today_score ?? "-"}</div></div>
            <div class="kv"><div class="small">趨勢 / 結構 / 時機</div><div>${stock.trend_state || "-"} / ${stock.structure_state || "-"} / ${stock.timing_state || "-"}</div></div>
            <div class="kv"><div class="small">自動判讀</div><div>${stock.health_note || "-"}</div></div>
          </div>
        </div>

        <div class="chart-box">
          <div class="section-title">價格區間圖</div>
          ${renderLineChart(stock)}
          <div class="small" style="margin-top:8px;">目前先接真價格與代理線：1M 代 MA50、6M 代 MA200、12M 作年線。真 K 線後面再補。</div>
        </div>

        <div class="mini" style="margin-bottom:14px;">
          <div class="section-title">多部位展開</div>
          ${details.length ? details.map(d => `
            <div class="position-card">
              <div class="row">
                <div><b>${d.role || "部位"}</b></div>
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                  <div class="strength-badge ${strengthClass(d.strength)}">${d.strength}</div>
                  <div class="badge ${statusClass(d.status_eval)}">${d.status_eval}</div>
                </div>
              </div>
              <div class="kv"><div class="small">股數</div><div>${fmtInt(d.quantity)} 股</div></div>
              <div class="kv"><div class="small">成本</div><div>$${fmtNum(d.cost)}</div></div>
              <div class="kv"><div class="small">現價</div><div>$${fmtNum(d.current)}</div></div>
              <div class="kv"><div class="small">損益</div><div class="${moneyClass(d.pnl_amount)}">${d.pnl_amount >= 0 ? "+" : ""}$${fmtInt(d.pnl_amount)} / ${fmtNum(d.pnl_pct)}%</div></div>
              <div class="kv"><div class="small">來源</div><div>${d.source_id || "-"} / ${d.bank || "-"}</div></div>
            </div>
          `).join("") : `<div class="small">無部位明細</div>`}
        </div>

        ${(stock.exposure_alert && stock.exposure_alert.text) ? `
          <div class="mini warn-card" style="margin-bottom:14px;">
            <div class="section-title">曝險警示</div>
            <div class="strategy">⚠️ ${stock.exposure_alert.text}</div>
          </div>
        ` : ""}

        <div class="detail-grid">
          <div class="mini">
            <div class="section-title">Why Yes</div>
            <div class="chip-row">
              ${(stock.why_yes && stock.why_yes.length)
                ? stock.why_yes.map(x => `<span class="badge green">${x}</span>`).join("")
                : `<span class="small">無</span>`
              }
            </div>
          </div>

          <div class="mini">
            <div class="section-title">Why No</div>
            <div class="chip-row">
              ${(stock.why_no && stock.why_no.length)
                ? stock.why_no.map(x => `<span class="badge red">${x}</span>`).join("")
                : `<span class="small">無</span>`
              }
            </div>
          </div>
        </div>

        <div class="mini" style="margin-bottom:14px;">
          <div class="section-title">估值 / 最終說明</div>
          <div class="strategy">
            <div><b>估值說明：</b>${stock.valuation_note || "-"}</div>
            <div style="margin-top:8px;"><b>最終說明：</b>${stock.final_note || "-"}</div>
          </div>
        </div>
      `;
    }

    function rerender(){
      const filtered = getFilteredAggregates();
      currentAggregates = filtered;
      renderSummary(filtered);
      renderList(filtered);

      const stock = filtered.find(x => x.symbol === selectedSymbol) || filtered[0];
      renderDetail(stock);
    }

    async function init(){
      try {
        const raw = await loadM6Data({
          positionsUrl: "./data/positions.json",
          marketUrl: "./data/market_runtime.json",
          m7TodayUrl: "./data/m7/m7_new_stock_today.json"
        });

        vm = buildM6ViewModel(raw);

        const marketComments = await loadJson("./data/m6/market_comments.json").catch(() => ({}));
        window.marketComments = marketComments;
        
        window.vm = vm;
        window.stocks = vm.aggregates;
        window.selectStock = function(symbol){
          selectedSymbol = symbol;
          rerender();
        };

        const items = sortAggregates(vm.aggregates, "risk");
        if (items.length) selectedSymbol = items[0].symbol;

        document.getElementById("searchInput").addEventListener("input", rerender);
        document.getElementById("sourceFilter").addEventListener("change", rerender);
        document.getElementById("statusFilter").addEventListener("change", rerender);
        document.getElementById("sortMode").addEventListener("change", rerender);

        rerender();
      } catch (err) {
        console.error("M6 初始化失敗", err);
        document.getElementById("detailPanel").innerHTML = `
          <div class="mini warn-card">
            <div class="section-title">初始化失敗</div>
            <div class="strategy">${String(err)}</div>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
